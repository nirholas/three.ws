<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Create avatar · 3D Agent</title>
	<link rel="icon" href="/favicon.ico" />
	<meta name="description" content="Create a 3D avatar from a selfie. Use your camera or upload photos." />
	<meta name="robots" content="noindex" />
	<style>
		:root { color-scheme: dark; --accent:#d6ff3d; --accent-ink:#0a0a0a; --bg:#05060a; --panel:#0f1018; --border:#1e1f2b; --text:#eee; --muted:#8a8d98; }
		* { box-sizing: border-box; }
		html, body { margin:0; padding:0; height:100%; }
		body { font: 15px/1.55 -apple-system, system-ui, "Segoe UI", Roboto, sans-serif; color:var(--text); background:var(--bg); min-height:100vh; overflow-x:hidden; }
		body::before {
			content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;
			background:
				radial-gradient(800px 500px at 50% -100px, rgba(106,92,255,.12) 0, transparent 70%),
				radial-gradient(600px 400px at 50% 110%, rgba(214,255,61,.05) 0, transparent 70%),
				#05060a;
		}
		header.topbar {
			display:flex; align-items:center; justify-content:space-between;
			padding:18px 28px; border-bottom:1px solid var(--border);
		}
		.back {
			display:inline-flex; align-items:center; gap:6px; color:var(--muted);
			text-decoration:none; font-size:14px; padding:6px 10px; border-radius:8px;
			transition: background .15s, color .15s;
		}
		.back:hover { background:rgba(255,255,255,.04); color:var(--text); }
		.brand { font-weight:600; letter-spacing:-.01em; font-size:15px; }
		.brand a { color:var(--text); text-decoration:none; }
		.spacer { width:72px; }

		main.stage {
			max-width:1100px; margin:0 auto; padding:48px 24px 80px;
		}
		.heading { display:flex; align-items:center; justify-content:center; gap:10px; margin:8px 0 48px; }
		.heading h1 { font-size:22px; font-weight:500; margin:0; letter-spacing:-.01em; }
		.heading svg { width:22px; height:22px; color:var(--muted); }

		.choice-grid {
			display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
			gap:22px; max-width:820px; margin:0 auto;
		}
		.choice {
			position:relative; display:flex; flex-direction:column; justify-content:flex-end;
			aspect-ratio: 3/4; padding:24px; border-radius:22px; overflow:hidden;
			background:var(--panel); border:1px solid var(--border); cursor:pointer;
			text-align:left; color:inherit; font:inherit;
			transition: transform .18s ease, border-color .18s, box-shadow .18s;
		}
		.choice:hover { transform: translateY(-2px); border-color:#2c2d3d; box-shadow:0 12px 32px rgba(0,0,0,.4); }
		.choice:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
		.choice .illustration {
			position:absolute; inset:0; display:grid; place-items:center;
			background:linear-gradient(180deg, rgba(20,22,34,0) 0%, rgba(5,6,10,.6) 75%, rgba(5,6,10,.92) 100%);
		}
		.choice .illustration svg { width:60%; max-width:220px; opacity:.85; color:#cfd2e0; }
		.choice .label {
			position:relative; display:flex; align-items:flex-end; justify-content:space-between;
			gap:12px; z-index:1;
		}
		.choice .label h2 { margin:0; font-size:22px; font-weight:500; letter-spacing:-.01em; line-height:1.15; }
		.choice .arrow {
			flex:0 0 auto; width:44px; height:44px; border-radius:50%;
			background:#f5f5f5; color:#0a0a0a;
			display:grid; place-items:center;
			transition: transform .18s ease, background .18s;
		}
		.choice:hover .arrow { transform: translateX(4px); background:var(--accent); }
		.choice[data-method="upload"] .illustration {
			background:linear-gradient(180deg, rgba(20,22,34,0) 40%, rgba(5,6,10,.6) 75%, rgba(5,6,10,.92) 100%);
		}

		.hidden-input { display:none; }

		.unsupported {
			margin-top:16px; padding:8px 12px; border-radius:8px;
			background:rgba(255,92,92,.08); border:1px solid rgba(255,92,92,.3);
			color:#ffb3b3; font-size:12px; text-align:center; display:none;
		}
		.unsupported.show { display:block; }

		@media (max-width: 560px) {
			main.stage { padding:24px 16px 64px; }
			.heading h1 { font-size:18px; }
			.choice { aspect-ratio: 4/5; padding:20px; border-radius:18px; }
			.choice .label h2 { font-size:18px; }
		}
	</style>
</head>
<body>
	<header class="topbar">
		<a class="back" href="/" aria-label="Back">
			<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
			<span>Back</span>
		</a>
		<div class="brand"><a href="/">3D Agent</a></div>
		<div class="spacer" aria-hidden="true"></div>
	</header>

	<main class="stage">
		<div class="heading">
			<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 7V5a1 1 0 0 1 1-1h2"/><path d="M4 17v2a1 1 0 0 0 1 1h2"/><path d="M20 7V5a1 1 0 0 0-1-1h-2"/><path d="M20 17v2a1 1 0 0 1-1 1h-2"/><circle cx="12" cy="12" r="3"/></svg>
			<h1>Create new avatar</h1>
		</div>

		<div class="choice-grid" role="group" aria-label="Choose avatar input method">
			<button type="button" class="choice" data-method="camera" aria-label="Use camera to capture selfies">
				<div class="illustration" aria-hidden="true">
					<svg viewBox="0 0 160 200" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
						<circle cx="80" cy="72" r="34" fill="rgba(255,255,255,.04)" />
						<path d="M28 180c0-28 23-46 52-46s52 18 52 46" fill="rgba(255,255,255,.04)" />
						<path d="M24 40 L24 52 M32 40 L40 40" />
						<path d="M136 40 L136 52 M128 40 L120 40" />
						<path d="M24 160 L24 148 M32 160 L40 160" />
						<path d="M136 160 L136 148 M128 160 L120 160" />
					</svg>
				</div>
				<div class="label">
					<h2>Use<br/>camera</h2>
					<span class="arrow" aria-hidden="true">
						<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
					</span>
				</div>
			</button>

			<button type="button" class="choice" data-method="upload" aria-label="Upload photos from device">
				<div class="illustration" aria-hidden="true">
					<svg viewBox="0 0 160 200" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
						<rect x="28" y="52" width="60" height="88" rx="6" fill="rgba(255,255,255,.04)" transform="rotate(-8 58 96)" />
						<rect x="50" y="34" width="60" height="88" rx="6" fill="rgba(255,255,255,.06)" stroke-dasharray="4 4" />
						<rect x="72" y="52" width="60" height="88" rx="6" fill="rgba(255,255,255,.04)" transform="rotate(8 102 96)" />
					</svg>
				</div>
				<div class="label">
					<h2>Upload<br/>from device</h2>
					<span class="arrow" aria-hidden="true">
						<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
					</span>
				</div>
			</button>
		</div>

		<p class="unsupported" id="unsupported-msg">Camera not available on this device — use the upload option instead.</p>
	</main>

	<input type="file" id="upload-input" class="hidden-input" accept="image/jpeg,image/png" multiple />

	<script type="module" src="/src/selfie-capture.js"></script>
</body>
</html>
