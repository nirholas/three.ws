<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent 1 - Sam</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { color: #818cf8; margin-bottom: 20px; }
    .status-panel {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 15px;
    }
    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ef4444;
    }
    .status-indicator.connected { background: #4ade80; }
    .status-indicator.speaking { background: #4ade80; animation: pulse 1s infinite; }
    .status-indicator.listening { background: #60a5fa; animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.7; }
    }
    .btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 8px;
      padding: 12px 25px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn:hover { transform: scale(1.05); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .audio-meter {
      height: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
      margin: 15px 0;
    }
    .audio-level {
      height: 100%;
      background: linear-gradient(90deg, #4ade80, #22d3ee);
      width: 0%;
      transition: width 0.1s ease;
    }
    .log-panel {
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      padding: 15px;
      height: 200px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.85rem;
    }
    .log-panel p { margin-bottom: 5px; color: #9ca3af; }
    .log-panel p.error { color: #ef4444; }
    .log-panel p.success { color: #4ade80; }
    .chat-panel {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 15px;
      margin-top: 20px;
      height: 250px;
      overflow-y: auto;
    }
    .chat-msg { margin-bottom: 10px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; }
    .chat-msg.self { border-left: 3px solid #818cf8; }
    .chat-msg.other { border-left: 3px solid #f472b6; }
    .chat-msg.user { border-left: 3px solid #fbbf24; }
    .turn-status {
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      margin-bottom: 15px;
      text-align: center;
    }
    .turn-status.my-turn { background: rgba(74, 222, 128, 0.2); border: 1px solid #4ade80; }
    .turn-status.waiting { background: rgba(251, 191, 36, 0.2); border: 1px solid #fbbf24; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎤 Agent 1 - Sam</h1>
    
    <div class="turn-status" id="turnStatus">Waiting to connect...</div>
    
    <div class="status-panel">
      <div class="status-row">
        <div class="status-indicator" id="connIndicator"></div>
        <span id="connStatus">Disconnected</span>
        <button class="btn" id="connectBtn">Connect</button>
      </div>
      <div class="status-row">
        <span>Status: </span>
        <strong id="agentStatus">Offline</strong>
      </div>
      <div class="audio-meter">
        <div class="audio-level" id="audioLevel"></div>
      </div>
    </div>
    
    <div class="log-panel" id="logPanel"></div>
    <div class="chat-panel" id="chatPanel"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const AGENT_ID = 0
    const AGENT_NAME = "Sam"
    const SESSION_ENDPOINT = "/session/0"
    
    const socket = io()
    let pc = null
    let dc = null
    let isConnected = false
    let hasTurn = false
    let currentMessageId = null
    let audioContext = null
    let analyser = null
    let isSpeaking = false
    let speakingTimeout = null

    const logPanel = document.getElementById("logPanel")
    const chatPanel = document.getElementById("chatPanel")
    const connectBtn = document.getElementById("connectBtn")
    const connIndicator = document.getElementById("connIndicator")
    const connStatus = document.getElementById("connStatus")
    const agentStatus = document.getElementById("agentStatus")
    const audioLevel = document.getElementById("audioLevel")
    const turnStatus = document.getElementById("turnStatus")

    function log(msg, type = "") {
      const p = document.createElement("p")
      p.className = type
      p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`
      logPanel.appendChild(p)
      logPanel.scrollTop = logPanel.scrollHeight
    }

    function addChat(name, text, type = "") {
      const div = document.createElement("div")
      div.className = "chat-msg " + type
      div.innerHTML = `<strong>${name}:</strong> ${text}`
      chatPanel.appendChild(div)
      chatPanel.scrollTop = chatPanel.scrollHeight
    }

    function setStatus(status) {
      agentStatus.textContent = status.charAt(0).toUpperCase() + status.slice(1)
      socket.emit("statusChange", { agentId: AGENT_ID, status })
      
      connIndicator.className = "status-indicator"
      if (status === "speaking") connIndicator.classList.add("speaking")
      else if (status === "listening") connIndicator.classList.add("listening")
      else if (isConnected) connIndicator.classList.add("connected")
    }

    function updateTurnUI() {
      if (hasTurn) {
        turnStatus.className = "turn-status my-turn"
        turnStatus.textContent = "🎤 Your turn to speak!"
      } else {
        turnStatus.className = "turn-status waiting"
        turnStatus.textContent = "⏳ Waiting for turn..."
      }
    }

    socket.on("connect", () => {
      log("Socket connected", "success")
    })

    socket.on("stateUpdate", (data) => {
      if (data.currentTurn === AGENT_ID) {
        if (!hasTurn) {
          hasTurn = true
          updateTurnUI()
        }
      } else {
        hasTurn = false
        updateTurnUI()
      }
    })

    socket.on("turnGranted", ({ agentId }) => {
      if (agentId === AGENT_ID) {
        hasTurn = true
        updateTurnUI()
        log("Turn granted!", "success")
      }
    })

    socket.on("textComplete", (msg) => {
      if (msg.agentId !== AGENT_ID && msg.agentId >= 0) {
        addChat(msg.name, msg.text, "other")
      } else if (msg.isUser) {
        addChat(msg.name, msg.text, "user")
      }
    })

    socket.on("textToAgent", ({ text, from }) => {
      if (!dc || dc.readyState !== "open") return
      if (AGENT_ID !== 0) return
      
      log("Received text from " + from + ": " + text)
      
      const event = {
        type: "conversation.item.create",
        item: {
          type: "message",
          role: "user",
          content: [{ type: "input_text", text: `[CHAT - ${from}]: ${text}` }]
        }
      }
      dc.send(JSON.stringify(event))
      
      setTimeout(() => {
        dc.send(JSON.stringify({ type: "response.create" }))
      }, 100)
    })

    connectBtn.addEventListener("click", startConnection)

    async function startConnection() {
      try {
        connectBtn.disabled = true
        log("Getting session token...")
        
        const res = await fetch(SESSION_ENDPOINT)
        const data = await res.json()
        const ephemeralKey = data.value
        log("Token received", "success")

        pc = new RTCPeerConnection({
          iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
        })

        pc.ontrack = (e) => {
          log("Audio track received", "success")
          if (e.streams[0]) {
            setupAudioAnalysis(e.streams[0])
            const audio = document.createElement("audio")
            audio.srcObject = e.streams[0]
            audio.autoplay = true
            audio.playsInline = true
            document.body.appendChild(audio)
            audio.play().then(() => {
              log("Audio playback started", "success")
            }).catch(err => {
              log("Audio play error: " + err.message, "error")
              document.addEventListener("click", () => {
                audio.play()
              }, { once: true })
            })
          }
        }

        pc.oniceconnectionstatechange = () => {
          log("ICE state: " + pc.iceConnectionState)
          if (pc.iceConnectionState === "connected" || pc.iceConnectionState === "completed") {
            isConnected = true
            connIndicator.classList.add("connected")
            connStatus.textContent = "Connected"
            socket.emit("agentConnect", { agentId: AGENT_ID })
            setStatus("idle")
          } else if (["failed", "disconnected", "closed"].includes(pc.iceConnectionState)) {
            isConnected = false
            connIndicator.classList.remove("connected")
            connStatus.textContent = "Disconnected"
            socket.emit("agentDisconnect", { agentId: AGENT_ID })
          }
        }

        const stream = await navigator.mediaDevices.getUserMedia({ audio: true })
        stream.getTracks().forEach(track => pc.addTrack(track, stream))
        log("Microphone access granted", "success")

        dc = pc.createDataChannel("oai-events")
        dc.onopen = () => {
          log("Data channel open", "success")
          setTimeout(() => {
            try {
              dc.send(JSON.stringify({
                type: "response.create",
                response: { instructions: "Greet the room warmly in one or two sentences. Mention you're here with @doi to talk about three.ws and invite people to jump in." }
              }))
              log("Sent greet trigger", "success")
            } catch (e) { log("greet trigger failed: " + e.message, "error") }
          }, 1500)
        }
        dc.onmessage = handleDataChannelMessage

        const offer = await pc.createOffer()
        await pc.setLocalDescription(offer)

        const sdpRes = await fetch("https://api.openai.com/v1/realtime/calls?model=gpt-realtime", {
          method: "POST",
          body: offer.sdp,
          headers: {
            Authorization: "Bearer " + ephemeralKey,
            "Content-Type": "application/sdp"
          }
        })

        const answerSdp = await sdpRes.text()
        await pc.setRemoteDescription({ type: "answer", sdp: answerSdp })
        log("Connection established!", "success")
        connectBtn.textContent = "Connected"

      } catch (err) {
        log("Error: " + err.message, "error")
        connectBtn.disabled = false
      }
    }

    function handleDataChannelMessage(e) {
      try {
        const msg = JSON.parse(e.data)
        
        if (msg.type === "input_audio_buffer.speech_started") {
          setStatus("listening")
          log("Listening to input...")
        } 
        else if (msg.type === "input_audio_buffer.speech_stopped") {
          if (!isSpeaking) setStatus("idle")
        }
        else if (msg.type === "response.created") {
          socket.emit("requestTurn", { agentId: AGENT_ID })
          currentMessageId = Date.now().toString()
          log("Response started")
        }
        else if (msg.type === "response.audio_transcript.delta") {
          if (msg.delta) {
            socket.emit("textDelta", { 
              agentId: AGENT_ID, 
              delta: msg.delta,
              messageId: currentMessageId
            })
          }
        }
        else if (msg.type === "response.audio_transcript.done") {
          if (msg.transcript) {
            socket.emit("textComplete", {
              agentId: AGENT_ID,
              text: msg.transcript,
              messageId: currentMessageId
            })
            addChat(AGENT_NAME, msg.transcript, "self")
            log("Response complete")
          }
        }
        else if (msg.type === "response.done") {
          log("Response done event")
        }
        else if (msg.type === "conversation.item.created" && msg.item?.role === "user") {
          const content = msg.item.content || []
          let text = ""
          content.forEach(c => {
            if (c.transcript) text += c.transcript
            if (c.text) text += c.text
          })
          if (text.trim()) {
            log("User said: " + text)
          }
        }
      } catch (err) {
        log("Parse error", "error")
      }
    }

    function setupAudioAnalysis(stream) {
      audioContext = new (window.AudioContext || window.webkitAudioContext)()
      analyser = audioContext.createAnalyser()
      analyser.fftSize = 256
      analyser.smoothingTimeConstant = 0.3
      
      const source = audioContext.createMediaStreamSource(stream)
      source.connect(analyser)
      
      const dataArray = new Uint8Array(analyser.frequencyBinCount)
      const SPEAK_THRESHOLD = 0.04
      const SILENCE_DURATION = 500
      
      setInterval(() => {
        if (!analyser) return
        analyser.getByteFrequencyData(dataArray)
        
        let sum = 0
        for (let i = 3; i < 25; i++) sum += dataArray[i]
        const level = (sum / 22) / 255
        
        audioLevel.style.width = Math.min(level * 150, 100) + "%"
        socket.emit("audioLevel", { agentId: AGENT_ID, level })

        if (level > SPEAK_THRESHOLD) {
          if (!isSpeaking) {
            isSpeaking = true
            setStatus("speaking")
            log("Speaking detected (audio)")
          }
          if (speakingTimeout) {
            clearTimeout(speakingTimeout)
            speakingTimeout = null
          }
        } else if (isSpeaking && !speakingTimeout) {
          speakingTimeout = setTimeout(() => {
            isSpeaking = false
            setStatus("idle")
            socket.emit("releaseTurn", { agentId: AGENT_ID })
            log("Stopped speaking (silence)")
            speakingTimeout = null
          }, SILENCE_DURATION)
        }
      }, 33)
    }

    window.addEventListener("beforeunload", () => {
      socket.emit("agentDisconnect", { agentId: AGENT_ID })
    })
  </script>
</body>
</html>
