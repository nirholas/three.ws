<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f10"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <!-- Stylised 3D cube wireframe representing the three.ws -->
  <!-- Front face -->
  <polygon points="88,96 168,96 168,168 88,168" fill="none" stroke="url(#glow)" stroke-width="5" stroke-linejoin="round"/>
  <!-- Top face (parallelogram) -->
  <polygon points="88,96 128,72 208,72 168,96" fill="none" stroke="url(#glow)" stroke-width="5" stroke-linejoin="round"/>
  <!-- Right face -->
  <polygon points="168,96 208,72 208,144 168,168" fill="none" stroke="url(#glow)" stroke-width="5" stroke-linejoin="round"/>
  <!-- Inner glow dot — the "agent" -->
  <circle cx="128" cy="132" r="16" fill="#818cf8" opacity="0.85"/>
  <circle cx="128" cy="132" r="8" fill="#e0e7ff"/>
</svg>
