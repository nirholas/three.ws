name: Solana Mobile (Seeker) release

on:
  push:
    tags:
      - 'seeker-v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build & sign only — skip dApp Store submit'
        type: boolean
        default: true
      version_name:
        description: 'Override appVersionName (e.g. 1.0.1)'
        type: string
        default: ''

permissions:
  contents: read

concurrency:
  group: seeker-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build signed APK${{ inputs.dry_run && '' || ' + submit' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: solana-mobile
    env:
      DAPP_STORE_DRYRUN: ${{ inputs.dry_run && '1' || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.SEEKER_RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::SEEKER_RELEASE_KEYSTORE_BASE64 secret is missing"
            exit 1
          fi
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > android.keystore
          test -s android.keystore

      - name: Override version if requested
        if: ${{ inputs.version_name != '' }}
        env:
          VN: ${{ inputs.version_name }}
        run: |
          node -e "
            const fs=require('fs');
            const p='twa/twa-manifest.json';
            const j=JSON.parse(fs.readFileSync(p,'utf8'));
            j.appVersionName=process.env.VN;
            j.appVersionCode=(j.appVersionCode||0)+1;
            fs.writeFileSync(p, JSON.stringify(j,null,2)+'\n');
            console.log('version → ' + j.appVersionName + ' (' + j.appVersionCode + ')');
          "

      - name: Build signed APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/solana-mobile/android.keystore
          KEYSTORE_PASSWORD: ${{ secrets.SEEKER_RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SEEKER_RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SEEKER_RELEASE_KEY_PASSWORD }}
        run: bash scripts/build-apk.sh

      - name: Verify APK signature
        run: |
          APK=build/three-ws-release.apk
          test -s "$APK" || { echo "::error::APK missing"; exit 1; }
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner verify --print-certs "$APK"

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: three-ws-seeker-${{ github.ref_name }}
          path: solana-mobile/build/three-ws-release.apk
          retention-days: 90
          if-no-files-found: error

      - name: Upload assetlinks.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: assetlinks-${{ github.ref_name }}
          path: public/.well-known/assetlinks.json
          retention-days: 365
          if-no-files-found: error

      - name: Write Solana keypair
        if: ${{ !inputs.dry_run }}
        env:
          SOLANA_KEYPAIR_JSON: ${{ secrets.SEEKER_PUBLISHER_KEYPAIR }}
        run: |
          if [ -z "$SOLANA_KEYPAIR_JSON" ]; then
            echo "::error::SEEKER_PUBLISHER_KEYPAIR secret is missing"
            exit 1
          fi
          mkdir -p $HOME/.config/solana
          printf '%s' "$SOLANA_KEYPAIR_JSON" > $HOME/.config/solana/publisher.json
          chmod 600 $HOME/.config/solana/publisher.json

      - name: Publish to Solana dApp Store
        if: ${{ !inputs.dry_run }}
        env:
          SOLANA_KEYPAIR: /home/runner/.config/solana/publisher.json
          SOLANA_RPC_URL: ${{ secrets.SEEKER_PUBLISHER_RPC_URL }}
          DAPP_STORE_API_KEY: ${{ secrets.SEEKER_DAPP_STORE_API_KEY }}
        run: bash scripts/publish.sh
