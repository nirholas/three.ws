<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Pump.fun Live</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="description" content="Pump.fun live feed widget." />
		<meta name="robots" content="noindex" />
		<style>
						* { margin: 0; padding: 0; box-sizing: border-box; }
			body {
				background: #0a0a0a;
				color: #00ff41;
				font-family: 'Courier New', monospace;
				font-size: 13px;
				line-height: 1.5;
				padding: 0;
			}
			#root {
				height: 100vh;
				overflow-y: auto;
			}
			.entry {
				border-bottom: 1px solid #111;
				padding: 8px;
				animation: fadeIn 0.3s ease;
			}
			@keyframes fadeIn {
				from { opacity: 0; transform: translateY(-4px); }
				to { opacity: 1; transform: translateY(0); }
			}
			.entry .name { color: #ffcc00; font-weight: bold; font-size: 15px; }
			.entry .symbol { color: #ff9900; font-weight: bold; }
			.entry a { color: #4a9eff; text-decoration: none; }
			.entry a:hover { text-decoration: underline; }
			.entry .token-row { display: flex; align-items: center; gap: 10px; }
			.entry .token-img { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #333; object-fit: cover; background: #111; }
			.entry .token-details { flex: 1; min-width: 0; }
			.entry .meta-row { display: flex; gap: 12px; flex-wrap: wrap; font-size: 11px; color: #666; margin-top: 3px; }
			.entry .mcap { color: #b366ff; font-weight: bold; }
		</style>
	</head>
	<body>
		<div id="root"></div>
		<script type="module">
			// Coming soon
			document.getElementById('root').innerHTML = '<h1>Coming soon</h1>';
		</script>
	</body>
</html>
