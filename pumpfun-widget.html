<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Pump.fun Live</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="description" content="Pump.fun live feed widget." />
		<meta name="robots" content="noindex" />
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				height: 100%;
				width: 100%;
				background: transparent;
				overflow: hidden;
				font-family: system-ui, sans-serif;
			}
			#stage {
				position: absolute;
				inset: 0;
			}
			#stage canvas {
				display: block;
				width: 100% !important;
				height: 100% !important;
			}
			#stage .gui-wrap,
			#stage .gui-toggle,
			#stage .annotation-canvas {
				display: none !important;
			}
			#stage .model-info {
				display: none !important;
			}
			#name-plate {
				position: absolute;
				left: 12px;
				bottom: 10px;
				z-index: 2;
				pointer-events: none;
				font-size: 11px;
				color: rgba(255, 255, 255, 0.55);
				letter-spacing: 0.04em;
				text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
			}
			#chain-plate {
				position: absolute;
				right: 12px;
				bottom: 10px;
				z-index: 2;
				pointer-events: none;
				font-size: 10px;
				color: rgba(255, 255, 255, 0.4);
				letter-spacing: 0.08em;
				text-transform: uppercase;
				text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
			}
			#open-link {
				position: absolute;
				right: 12px;
				top: 10px;
				z-index: 3;
				font-size: 10px;
				color: rgba(255, 255, 255, 0.55);
				letter-spacing: 0.05em;
				text-decoration: none;
				padding: 4px 8px;
				border-radius: 4px;
				background: rgba(0, 0, 0, 0.35);
				backdrop-filter: blur(4px);
			}
			#open-link:hover {
				color: rgba(255, 255, 255, 0.9);
				background: rgba(0, 0, 0, 0.5);
			}
			#loading {
				position: absolute;
				inset: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				color: rgba(255, 255, 255, 0.5);
				font-size: 12px;
			}
			#loading::after {
				content: '';
				width: 18px;
				height: 18px;
				margin-left: 8px;
				border: 2px solid rgba(255, 255, 255, 0.15);
				border-top-color: rgba(255, 255, 255, 0.5);
				border-radius: 50%;
				animation: spin 0.8s linear infinite;
			}
			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}
			#error,
			#blocked {
				position: absolute;
				inset: 0;
				display: none;
				align-items: center;
				justify-content: center;
				color: rgba(255, 255, 255, 0.55);
				font-size: 12px;
				padding: 1rem;
				text-align: center;
				flex-direction: column;
				gap: 6px;
			}
			#blocked a {
				color: rgba(180, 200, 255, 0.9);
				text-decoration: none;
			}
			body.bg-dark {
				background: #0b0d10;
			}
			body.bg-light {
				background: #f5f5f5;
			}
			body.bg-light #name-plate {
				color: rgba(0, 0, 0, 0.65);
				text-shadow: none;
			}
			body.bg-light #chain-plate {
				color: rgba(0, 0, 0, 0.45);
				text-shadow: none;
			}
			body.bg-light #open-link {
				color: rgba(0, 0, 0, 0.65);
				background: rgba(255, 255, 255, 0.6);
			}
		</style>
	</head>
	<body>
		<div id="root"></div>
		<script type="module">
			// Coming soon
			document.getElementById('root').innerHTML = '<h1>Coming soon</h1>';
		</script>
	</body>
</html>
