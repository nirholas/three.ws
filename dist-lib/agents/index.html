<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Agents Directory — three.ws</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			html,
			body {
				font-family:
					-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu',
					'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
				background: linear-gradient(135deg, #0f0f23 0%, #1a0f3a 100%);
				color: #e0e0e0;
				min-height: 100vh;
				overflow-x: hidden;
			}

			header {
				background: rgba(15, 15, 35, 0.95);
				border-bottom: 1px solid rgba(255, 255, 255, 0.1);
				padding: 2rem 1rem;
				text-align: center;
			}

			header h1 {
				font-size: 2.5rem;
				margin-bottom: 0.5rem;
				background: linear-gradient(135deg, #00d9ff, #7c3aed);
				background-clip: text;
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
			}

			header p {
				font-size: 1rem;
				color: #a0a0a0;
			}

			.container {
				max-width: 1400px;
				margin: 2rem auto;
				padding: 0 1rem;
			}

			.controls {
				display: flex;
				flex-wrap: wrap;
				gap: 1rem;
				margin-bottom: 2rem;
				align-items: center;
			}

			.search-box {
				flex: 1;
				min-width: 250px;
				padding: 0.75rem 1rem;
				background: rgba(255, 255, 255, 0.05);
				border: 1px solid rgba(255, 255, 255, 0.1);
				border-radius: 8px;
				color: #e0e0e0;
				font-size: 1rem;
			}

			.search-box::placeholder {
				color: #666;
			}

			.search-box:focus {
				outline: none;
				border-color: #00d9ff;
				background: rgba(0, 217, 255, 0.05);
			}

			.filter-group {
				display: flex;
				gap: 0.5rem;
				flex-wrap: wrap;
			}

			.filter-label {
				font-size: 0.85rem;
				font-weight: 600;
				text-transform: uppercase;
				color: #999;
				align-self: center;
			}

			.filter-chip {
				padding: 0.5rem 1rem;
				background: rgba(255, 255, 255, 0.05);
				border: 1px solid rgba(255, 255, 255, 0.1);
				border-radius: 20px;
				cursor: pointer;
				font-size: 0.9rem;
				color: #a0a0a0;
				transition: all 0.2s ease;
			}

			.filter-chip:hover {
				background: rgba(255, 255, 255, 0.1);
			}

			.filter-chip.active {
				background: linear-gradient(135deg, #00d9ff, #7c3aed);
				border-color: transparent;
				color: #fff;
				font-weight: 600;
			}

			.sort-select {
				padding: 0.5rem 1rem;
				background: rgba(255, 255, 255, 0.05);
				border: 1px solid rgba(255, 255, 255, 0.1);
				border-radius: 8px;
				color: #e0e0e0;
				cursor: pointer;
				font-size: 0.9rem;
			}

			.sort-select:focus {
				outline: none;
				border-color: #00d9ff;
			}

			.sort-select option {
				background: #0f0f23;
				color: #e0e0e0;
			}

			.agent-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
				gap: 1.5rem;
				margin-bottom: 2rem;
			}

			.agent-card {
				background: rgba(255, 255, 255, 0.03);
				border: 1px solid rgba(255, 255, 255, 0.1);
				border-radius: 12px;
				overflow: hidden;
				cursor: pointer;
				transition: all 0.3s ease;
				display: flex;
				flex-direction: column;
			}

			.agent-card:hover {
				border-color: rgba(0, 217, 255, 0.5);
				background: rgba(0, 217, 255, 0.05);
				transform: translateY(-4px);
				box-shadow: 0 8px 24px rgba(0, 217, 255, 0.15);
			}

			.card-avatar {
				width: 100%;
				aspect-ratio: 1;
				background: rgba(255, 255, 255, 0.02);
				display: flex;
				align-items: center;
				justify-content: center;
				overflow: hidden;
			}

			.card-avatar img {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}

			.avatar-placeholder {
				font-size: 3rem;
				opacity: 0.3;
			}

			.card-content {
				padding: 1.25rem;
				flex: 1;
				display: flex;
				flex-direction: column;
			}

			.card-name {
				font-size: 1.1rem;
				font-weight: 600;
				margin-bottom: 0.5rem;
				color: #fff;
				line-height: 1.3;
			}

			.card-desc {
				font-size: 0.85rem;
				color: #a0a0a0;
				margin-bottom: 1rem;
				line-height: 1.4;
				flex: 1;
			}

			.card-meta {
				display: flex;
				gap: 0.5rem;
				flex-wrap: wrap;
				font-size: 0.75rem;
			}

			.chain-badge {
				background: rgba(124, 58, 237, 0.2);
				border: 1px solid rgba(124, 58, 237, 0.5);
				padding: 0.3rem 0.6rem;
				border-radius: 4px;
				color: #c4b5fd;
			}

			.agent-id {
				background: rgba(0, 217, 255, 0.1);
				border: 1px solid rgba(0, 217, 255, 0.3);
				padding: 0.3rem 0.6rem;
				border-radius: 4px;
				color: #00d9ff;
				font-family: 'Monaco', 'Courier New', monospace;
			}

			.empty-state {
				text-align: center;
				padding: 4rem 2rem;
			}

			.empty-state h2 {
				font-size: 1.5rem;
				margin-bottom: 1rem;
				color: #fff;
			}

			.empty-state p {
				font-size: 1rem;
				color: #a0a0a0;
				margin-bottom: 2rem;
			}

			.cta-button {
				padding: 0.75rem 1.5rem;
				background: linear-gradient(135deg, #00d9ff, #7c3aed);
				border: none;
				border-radius: 8px;
				color: #fff;
				font-weight: 600;
				cursor: pointer;
				transition: all 0.2s ease;
				text-decoration: none;
				display: inline-block;
			}

			.cta-button:hover {
				transform: scale(1.05);
				box-shadow: 0 8px 24px rgba(0, 217, 255, 0.3);
			}

			.pagination {
				display: flex;
				justify-content: center;
				align-items: center;
				gap: 1rem;
				margin-top: 2rem;
				padding: 2rem;
				flex-wrap: wrap;
			}

			.pagination-button {
				padding: 0.5rem 1rem;
				background: rgba(255, 255, 255, 0.05);
				border: 1px solid rgba(255, 255, 255, 0.1);
				border-radius: 8px;
				color: #e0e0e0;
				cursor: pointer;
				transition: all 0.2s ease;
			}

			.pagination-button:hover:not(:disabled) {
				background: rgba(0, 217, 255, 0.1);
				border-color: #00d9ff;
				color: #00d9ff;
			}

			.pagination-button:disabled {
				opacity: 0.3;
				cursor: not-allowed;
			}

			.pagination-info {
				color: #a0a0a0;
				font-size: 0.9rem;
			}

			.loading {
				text-align: center;
				padding: 2rem;
				color: #a0a0a0;
			}

			.loading::after {
				content: '';
				display: inline-block;
				margin-left: 0.5rem;
				width: 1rem;
				height: 1rem;
				border: 2px solid rgba(0, 217, 255, 0.3);
				border-top-color: #00d9ff;
				border-radius: 50%;
				animation: spin 0.8s linear infinite;
			}

			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}

			@media (max-width: 768px) {
				header h1 {
					font-size: 1.75rem;
				}

				.controls {
					flex-direction: column;
				}

				.search-box {
					min-width: 100%;
				}

				.agent-grid {
					grid-template-columns: 1fr;
				}
			}
		</style>
	</head>
	<body>
		<header>
			<h1>Agent Directory</h1>
			<p>Discover registered agents across the ecosystem</p>
		</header>

		<div class="container">
			<div class="controls">
				<input
					type="text"
					id="search"
					class="search-box"
					placeholder="Search by name, ID, or description…"
				/>
				<div class="filter-group">
					<span class="filter-label">Chain:</span>
					<button class="filter-chip active" data-filter="all">All</button>
					<button class="filter-chip" data-filter="8453">Base</button>
					<button class="filter-chip" data-filter="84532">Base Sepolia</button>
					<button class="filter-chip" data-filter="10">Optimism</button>
					<button class="filter-chip" data-filter="137">Polygon</button>
				</div>
				<select id="sort" class="sort-select">
					<option value="newest">Newest First</option>
					<option value="oldest">Oldest First</option>
					<option value="name">Alphabetical</option>
				</select>
			</div>

			<div id="loading" class="loading" style="display: none">Loading agents</div>
			<div id="agents" class="agent-grid"></div>

			<div id="empty-state" class="empty-state" style="display: none">
				<h2>No agents found</h2>
				<p>Be the first to register your agent on-chain.</p>
				<a href="/create" class="cta-button">Create Agent</a>
			</div>

			<div id="pagination" class="pagination" style="display: none">
				<button id="prev-btn" class="pagination-button">← Previous</button>
				<span id="page-info" class="pagination-info"></span>
				<button id="next-btn" class="pagination-button">Next →</button>
			</div>
		</div>

		<script type="module" src="./boot.js"></script>
	</body>
</html>
