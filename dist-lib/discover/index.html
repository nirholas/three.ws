<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>On-chain Agents · three.ws</title>
		<meta
			name="description"
			content="Discover ERC-8004 agents you own across every supported chain."
		/>
		<link rel="icon" href="/favicon.ico" />
		<link rel="stylesheet" href="/discover/discover.css" />
	</head>
	<body>
		<header class="discover-header">
			<div class="discover-header__brand"><a href="/">three.ws</a></div>
			<nav class="discover-header__nav" aria-label="Page navigation">
				<a href="/">Home</a>
				<a href="/dashboard">Dashboard</a>
			</nav>
		</header>

		<main class="discover-main" id="discover-main">
			<h1 class="discover-title">On-chain Agents</h1>
			<p class="discover-subtitle">Agents we found in your linked wallets</p>

			<div
				id="discover-error"
				class="discover-error-banner"
				hidden
				role="alert"
				aria-live="polite"
			></div>

			<div
				id="discover-grid"
				class="discover-grid"
				role="list"
				aria-label="Discovered agents"
				aria-live="polite"
				aria-busy="true"
			></div>
		</main>

		<script type="module" src="/discover/discover.js"></script>
	</body>
</html>
