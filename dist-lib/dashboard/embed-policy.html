<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Embed policy · 3D Agent</title>
<link rel="icon" href="/favicon.ico">
<style>
	:root { color-scheme: dark; --accent:#6a5cff; --accent2:#ff5ca8; --border:#22222e; --bg:#0b0b10; --panel:#14141c; }
	* { box-sizing: border-box; }
	body { font:15px/1.55 -apple-system,system-ui,Segoe UI,Roboto,sans-serif; color:#eee; margin:0; background:var(--bg); min-height:100vh; }
	a { color:#9a8cff; text-decoration:none; }
	header { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:5; }
	.brand { font-weight:600; letter-spacing:-.01em; }
	main { padding:28px; max-width:720px; margin:0 auto; }
	h1 { font-size:22px; margin:0 0 6px; letter-spacing:-.01em; }
	.sub { color:#888; margin:0 0 22px; font-size:14px; }
	.card { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:20px; }
	label { display:block; margin:14px 0 6px; font-size:13px; color:#bbb; }
	input, select, textarea { background:#0f0f17; border:1px solid var(--border); color:#eee; padding:9px 11px; border-radius:8px; font-size:14px; font-family:inherit; width:100%; }
	textarea { min-height:120px; font-family: ui-monospace, SF Mono, Menlo, monospace; font-size:13px; }
	input:focus, textarea:focus, select:focus { outline:none; border-color:var(--accent); }
	.row { display:flex; gap:10px; align-items:center; }
	.btn { padding:9px 14px; border-radius:9px; border:0; font-size:13px; font-weight:600; cursor:pointer; background:var(--accent); color:#fff; }
	.btn.sec { background:#222230; color:#ddd; }
	.btn.danger { background:#3a1f24; color:#ff9c9c; }
	.muted { color:#888; font-size:13px; }
	.err { padding:12px; background:rgba(255,92,92,.1); border:1px solid rgba(255,92,92,.3); border-radius:8px; color:#ffb3b3; margin-bottom:14px; }
	.ok  { padding:12px; background:rgba(92,255,140,.07); border:1px solid rgba(92,255,140,.2); border-radius:8px; color:#b6f2c6; margin-bottom:14px; }
	code { font-family: ui-monospace, SF Mono, Menlo, monospace; background:#0f0f17; border:1px solid var(--border); border-radius:4px; padding:1px 6px; font-size:12px; }
	.actions { display:flex; gap:10px; margin-top:22px; }
	hr { border:0; border-top:1px solid var(--border); margin:22px 0; }
</style>
</head>
<body>
<header>
	<div class="brand"><a href="/dashboard">← Dashboard</a></div>
	<div class="muted"><span id="agent-name">Agent</span></div>
</header>
<main>
	<h1>Embed policy</h1>
	<p class="sub">Control which sites can iframe <code id="embed-url"></code>. An unset policy allows embedding everywhere (today's default).</p>

	<div id="status"></div>

	<div class="card">
		<label for="mode">Policy mode</label>
		<select id="mode">
			<option value="off">Off — allow all embeds</option>
			<option value="allowlist">Allowlist — only these hosts</option>
			<option value="denylist">Denylist — everywhere except these hosts</option>
		</select>

		<div id="hosts-wrap">
			<label for="hosts">Hosts (one per line)</label>
			<textarea id="hosts" placeholder="example.com&#10;*.substack.com"></textarea>
			<div class="muted" style="margin-top:6px">One host per line. Use <code>*.example.com</code> to match all subdomains.</div>
		</div>

		<div class="actions">
			<button class="btn" id="save">Save</button>
			<button class="btn sec" id="reload">Reload</button>
			<button class="btn danger" id="clear" style="margin-left:auto">Clear policy</button>
		</div>
	</div>

	<hr>

	<div class="muted">
		Signed-in owners can preview the embed bypassing this policy by appending <code>?preview=1</code> to the embed URL.
	</div>
</main>
<script type="module">
const params  = new URL(location.href).searchParams;
const agentId = params.get('agent');
const statusEl = document.getElementById('status');
const modeSel  = document.getElementById('mode');
const hostsEl  = document.getElementById('hosts');
const wrap     = document.getElementById('hosts-wrap');
const nameEl   = document.getElementById('agent-name');
const urlEl    = document.getElementById('embed-url');

if (!agentId) {
	statusEl.innerHTML = '<div class="err">Missing <code>?agent=ID</code> in URL.</div>';
	throw new Error('no agent id');
}
urlEl.textContent = `/agent/${agentId}/embed`;

async function api(method, path, body) {
	const res = await fetch(path, {
		method,
		credentials: 'include',
		headers: body ? { 'content-type': 'application/json' } : {},
		body: body ? JSON.stringify(body) : undefined,
	});
	const ct = res.headers.get('content-type') || '';
	const data = ct.includes('application/json') ? await res.json() : null;
	if (!res.ok) throw Object.assign(new Error((data && data.error_description) || res.statusText), { status: res.status });
	return data;
}

function setStatus(html) { statusEl.innerHTML = html; }
function updateVisibility() { wrap.style.display = modeSel.value === 'off' ? 'none' : ''; }

async function loadMe() {
	try {
		await api('GET', '/api/auth/me');
	} catch {
		location.href = '/login?next=' + encodeURIComponent(location.pathname + location.search);
		throw new Error('redirecting');
	}
}

async function loadAgent() {
	try {
		const { agent } = await api('GET', `/api/agents/${agentId}`);
		nameEl.textContent = agent.name || 'Agent';
	} catch (e) {
		setStatus(`<div class="err">Could not load agent: ${escapeHtml(e.message)}</div>`);
	}
}

async function loadPolicy() {
	try {
		const { policy } = await api('GET', `/api/agents/${agentId}/embed-policy`);
		if (!policy) {
			modeSel.value = 'off';
			hostsEl.value = '';
		} else {
			modeSel.value = policy.mode === 'denylist' ? 'denylist' : 'allowlist';
			hostsEl.value = (policy.hosts || []).join('\n');
		}
		updateVisibility();
	} catch (e) {
		setStatus(`<div class="err">Could not load policy: ${escapeHtml(e.message)}</div>`);
	}
}

async function save() {
	setStatus('');
	if (modeSel.value === 'off') {
		try {
			await api('DELETE', `/api/agents/${agentId}/embed-policy`);
			setStatus('<div class="ok">Policy cleared. All hosts can embed this agent.</div>');
		} catch (e) { setStatus(`<div class="err">${escapeHtml(e.message)}</div>`); }
		return;
	}
	const hosts = hostsEl.value.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
	try {
		await api('PUT', `/api/agents/${agentId}/embed-policy`, { mode: modeSel.value, hosts });
		setStatus('<div class="ok">Policy saved.</div>');
	} catch (e) {
		setStatus(`<div class="err">${escapeHtml(e.message)}</div>`);
	}
}

async function clearPolicy() {
	if (!confirm('Clear the embed policy? Any site will be able to embed this agent.')) return;
	try {
		await api('DELETE', `/api/agents/${agentId}/embed-policy`);
		modeSel.value = 'off';
		hostsEl.value = '';
		updateVisibility();
		setStatus('<div class="ok">Policy cleared.</div>');
	} catch (e) { setStatus(`<div class="err">${escapeHtml(e.message)}</div>`); }
}

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

modeSel.addEventListener('change', updateVisibility);
document.getElementById('save').addEventListener('click', save);
document.getElementById('reload').addEventListener('click', loadPolicy);
document.getElementById('clear').addEventListener('click', clearPolicy);

(async () => {
	await loadMe();
	await loadAgent();
	await loadPolicy();
})();
</script>
</body>
</html>
