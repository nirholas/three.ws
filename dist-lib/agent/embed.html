<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<title>Agent</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="description" content="Embedded 3D agent avatar." />
	<meta name="robots" content="noindex" />
	<style>
		html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: transparent; overflow: hidden; font-family: system-ui, sans-serif; }
		#stage { position: absolute; inset: 0; }
		#stage canvas { display: block; width: 100% !important; height: 100% !important; }
		#stage .gui-wrap, #stage .gui-toggle, #stage .annotation-canvas { display: none !important; }
		#stage .model-info { display: none !important; }
		#name-plate {
			position: absolute; left: 12px; bottom: 10px; z-index: 2; pointer-events: none;
			font-size: 11px; color: rgba(255,255,255,0.55); letter-spacing: 0.04em;
			text-shadow: 0 1px 2px rgba(0,0,0,0.6);
		}
		#error {
			position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
			color: rgba(255,255,255,0.4); font-size: 12px; padding: 1rem; text-align: center;
		}
		body.bg-dark  { background: #0b0d10; }
		body.bg-light { background: #f5f5f5; }
	</style>
</head>
<body>
	<div id="stage"></div>
	<div id="name-plate"></div>
	<div id="error"></div>

	<script type="module">
		import { Viewer }         from '/src/viewer.js';
		import { AgentIdentity }  from '/src/agent-identity.js';
		import { AgentAvatar }    from '/src/agent-avatar.js';
		import { protocol }       from '/src/agent-protocol.js';

		const params    = new URL(location.href).searchParams;
		const bg        = params.get('bg') || 'transparent';
		if (bg === 'dark')  document.body.classList.add('bg-dark');
		if (bg === 'light') document.body.classList.add('bg-light');

		const plateOn   = params.get('name') !== '0';
		const parts     = location.pathname.split('/').filter(Boolean);
		const agentId   = parts[parts.indexOf('agent') + 1];

		async function main() {
			const identity = new AgentIdentity({ agentId, autoLoad: false });
			await identity.load();

			if (plateOn && identity.name) {
				document.getElementById('name-plate').textContent = identity.name;
			}

			if (!identity.avatarId) throw new Error('agent has no avatar body');

			const resp = await fetch(`/api/avatars/${identity.avatarId}`, { credentials: 'include' });
			if (!resp.ok) throw new Error(`avatar ${resp.status}`);
			const { avatar } = await resp.json();
			const glbUrl = avatar?.url;
			if (!glbUrl) throw new Error('no avatar url');

			const stage  = document.getElementById('stage');
			const viewer = new Viewer(stage, { kiosk: true });
			if (bg === 'transparent') {
				viewer.renderer?.setClearAlpha(0);
				if (viewer.scene) viewer.scene.background = null;
			}
			await viewer.load(glbUrl, '', new Map());

			const avatarCtl = new AgentAvatar(viewer, protocol, identity);
			avatarCtl.attach();

			// Expose to host via postMessage bridge
			window.addEventListener('message', (ev) => {
				const msg = ev.data;
				if (!msg || msg.__agent !== agentId) return;
				if (msg.type === 'action' && msg.action) protocol.emit(msg.action);
			});
			parent?.postMessage({ __agent: agentId, type: 'ready', name: identity.name }, '*');
		}

		main().catch(err => {
			const el = document.getElementById('error');
			el.textContent = err.message || 'Could not load agent';
			el.style.display = 'flex';
		});
	</script>
</body>
</html>
