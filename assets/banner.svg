<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" width="900" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#060612"/>
      <stop offset="100%" stop-color="#0c0c20"/>
    </linearGradient>
    <linearGradient id="tg" x1="72" y1="0" x2="580" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <linearGradient id="lg" x1="72" y1="0" x2="792" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00d4ff" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#ff6b35" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40,0 L0,0 L0,40" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="160" rx="14" fill="url(#bg)"/>
  <rect width="900" height="160" rx="14" fill="url(#grid)"/>

  <!-- Corner brackets -->
  <polyline points="20,42 20,20 42,20" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.45"/>
  <polyline points="858,42 858,20 880,20" fill="none" stroke="#ff6b35" stroke-width="2" opacity="0.45"/>
  <polyline points="20,118 20,140 42,140" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.45"/>
  <polyline points="858,118 858,140 880,140" fill="none" stroke="#ff6b35" stroke-width="2" opacity="0.45"/>

  <!-- Orbiting system (right side) -->
  <g transform="translate(818, 80)">
    <!-- Static orbit rings -->
    <circle r="50" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.1"/>
    <circle r="33" fill="none" stroke="#ff6b35" stroke-width="0.5" opacity="0.1"/>

    <!-- Slow dashed outer ring -->
    <circle r="50" fill="none" stroke="#00d4ff" stroke-width="1" stroke-dasharray="10,16" opacity="0.22">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="22s" repeatCount="indefinite"/>
    </circle>

    <!-- Fast dashed inner ring -->
    <circle r="33" fill="none" stroke="#ff6b35" stroke-width="1" stroke-dasharray="6,10" opacity="0.22">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="14s" repeatCount="indefinite"/>
    </circle>

    <!-- Outer orbiting dot (cyan) -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
      <circle cx="50" cy="0" r="5" fill="#00d4ff" filter="url(#glow)" opacity="0.95"/>
    </g>

    <!-- Inner orbiting dot (orange) -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="90" to="-270" dur="4s" repeatCount="indefinite"/>
      <circle cx="33" cy="0" r="3.5" fill="#ff6b35" filter="url(#softglow)" opacity="0.95"/>
    </g>

    <!-- Center pulsing dot -->
    <circle r="4" fill="#ffffff" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.15;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="8" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.1">
      <animate attributeName="r" values="4;12;4" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Title -->
  <text x="72" y="82" font-family="SF Pro Display, Inter, system-ui, -apple-system, sans-serif" font-size="66" font-weight="800" letter-spacing="5" fill="url(#tg)" filter="url(#glow)">three.ws</text>

  <!-- Subtitle -->
  <text x="75" y="114" font-family="SF Pro Text, Inter, system-ui, sans-serif" font-size="12.5" fill="#6a7f94" letter-spacing="2.5">BROWSER-NATIVE · DRAG &amp; DROP · glTF / GLB · WebGL 2.0 · THREE.JS r176</text>

  <!-- Bottom accent line -->
  <rect x="72" y="148" width="720" height="1.5" rx="0.75" fill="url(#lg)"/>

  <!-- Version pill -->
  <rect x="74" y="126" width="54" height="16" rx="4" fill="none" stroke="#00d4ff" stroke-opacity="0.35" stroke-width="1"/>
  <text x="101" y="138" text-anchor="middle" font-family="SF Mono, Fira Code, Consolas, monospace" font-size="9" fill="#00d4ff" opacity="0.65">v 1.5.1</text>

  <!-- MIT pill -->
  <rect x="136" y="126" width="38" height="16" rx="4" fill="none" stroke="#ff6b35" stroke-opacity="0.35" stroke-width="1"/>
  <text x="155" y="138" text-anchor="middle" font-family="SF Mono, Fira Code, Consolas, monospace" font-size="9" fill="#ff6b35" opacity="0.65">MIT</text>

  <!-- Open Source pill -->
  <rect x="182" y="126" width="74" height="16" rx="4" fill="none" stroke="#a855f7" stroke-opacity="0.35" stroke-width="1"/>
  <text x="219" y="138" text-anchor="middle" font-family="SF Mono, Fira Code, Consolas, monospace" font-size="9" fill="#a855f7" opacity="0.65">Open Source</text>
</svg>
