<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
		<title>3D walkaround · three.ws</title>
		<meta name="description" content="A WASD + mobile-joystick walkaround scene with real physics (Rapier) and navmesh pathfinding (Recast). Click anywhere on the ground to autopilot your agent there." />
		<link rel="canonical" href="https://three.ws/walkaround" />
		<meta property="og:title" content="3D walkaround · three.ws" />
		<meta property="og:description" content="WASD + joystick walkaround scene with real Rapier physics and Recast navmesh pathfinding. Click ground to autopilot." />
		<meta property="og:url" content="https://three.ws/walkaround" />
		<meta name="twitter:card" content="summary_large_image" />
		<link rel="stylesheet" href="/style.css" />
		<link rel="stylesheet" href="/nav.css" />
		<style>
			:root { color-scheme: dark; }
			html, body { height: 100%; }
			body { background: #05060a; color: #eee; font: 15px/1.5 -apple-system, system-ui, sans-serif; margin: 0; overflow: hidden; }
			.stage { position: fixed; inset: 0; display: flex; flex-direction: column; }
			.head { padding: 14px 22px; display: flex; align-items: center; gap: 14px; background: rgba(8,9,15,0.8); border-bottom: 1px solid #1e1f2b; backdrop-filter: blur(8px); z-index: 5; }
			.head a { color: #8a8d98; text-decoration: none; font-size: 13px; }
			.head a:hover { color: #d6ff3d; }
			.head h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: -0.005em; }
			.head .spacer { flex: 1; }
			.head button { background: rgba(255,255,255,0.06); color: #eee; border: 1px solid #1e1f2b; border-radius: 9px; padding: 6px 10px; font: inherit; font-size: 12px; cursor: pointer; }
			.head button.active { background: #d6ff3d; color: #0a0a0a; border-color: #d6ff3d; }
			.canvas-host { flex: 1; position: relative; }
			canvas.world { display: block; width: 100%; height: 100%; touch-action: none; }
			.hud { position: absolute; top: 12px; left: 12px; padding: 8px 12px; background: rgba(8,9,15,0.7); border: 1px solid #1e1f2b; border-radius: 9px; font-family: ui-monospace, monospace; font-size: 11.5px; color: #8a8d98; line-height: 1.5; pointer-events: none; }
			.hud b { color: #d6ff3d; }
			.controls-help { position: absolute; bottom: 12px; right: 12px; padding: 8px 12px; background: rgba(8,9,15,0.7); border: 1px solid #1e1f2b; border-radius: 9px; font-size: 12px; color: #8a8d98; line-height: 1.5; pointer-events: none; max-width: 240px; }
			.controls-help kbd { display: inline-block; padding: 1px 6px; background: #1e1f2b; border-radius: 4px; color: #d6ff3d; font-family: ui-monospace, monospace; font-size: 11px; margin-right: 2px; }
			.joystick-host { position: absolute; bottom: 24px; left: 24px; width: 130px; height: 130px; touch-action: none; }
			.boot { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(5,6,10,0.92); z-index: 4; font-size: 14px; color: #8a8d98; }
			.boot .spinner { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #d6ff3d; animation: pulse 0.9s ease-in-out infinite; margin-right: 10px; vertical-align: middle; }
			@keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
			@media (max-width: 720px) {
				.controls-help { display: none; }
			}
		</style>
	</head>
	<body>
		<div class="stage">
			<header class="head">
				<a href="/">three.ws</a>
				<h1>3D walkaround</h1>
				<div class="spacer"></div>
				<button id="toggleNavmesh">Show navmesh</button>
				<button id="toggleAutopilot" class="active">Click-to-walk: on</button>
			</header>
			<div class="canvas-host" id="canvas-host">
				<canvas class="world" id="world"></canvas>
				<div class="hud" id="hud">
					<div>physics · <b id="hud-rapier">loading</b></div>
					<div>navmesh · <b id="hud-recast">loading</b></div>
					<div>pos · <b id="hud-pos">—</b></div>
					<div>FPS · <b id="hud-fps">—</b></div>
				</div>
				<div class="controls-help">
					<div><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> walk</div>
					<div><kbd>Shift</kbd> run</div>
					<div>Click ground to autopilot</div>
					<div>Drag to orbit camera</div>
				</div>
				<div class="joystick-host" id="joystick-host"></div>
				<div class="boot" id="boot"><span class="spinner"></span>Loading physics + navmesh…</div>
			</div>
		</div>

		<script type="module">
			import * as THREE from 'three';
			import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
			import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
			import RAPIER from '@dimforge/rapier3d-compat';
			import { init as initRecast, NavMesh, NavMeshQuery } from '@recast-navigation/core';
			import { threeToSoloNavMesh } from '@recast-navigation/three';
			import nipplejs from 'nipplejs';

			const $ = (id) => document.getElementById(id);
			const canvas = $('world');
			const host = $('canvas-host');
			const hud = { rapier: $('hud-rapier'), recast: $('hud-recast'), pos: $('hud-pos'), fps: $('hud-fps') };

			const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
			renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
			renderer.outputColorSpace = THREE.SRGBColorSpace;
			renderer.shadowMap.enabled = true;
			renderer.shadowMap.type = THREE.PCFSoftShadowMap;

			const scene = new THREE.Scene();
			scene.background = new THREE.Color(0x0b0d14);
			scene.fog = new THREE.Fog(0x0b0d14, 25, 90);

			const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 200);
			camera.position.set(8, 8, 10);

			const controls = new OrbitControls(camera, canvas);
			controls.target.set(0, 1, 0);
			controls.enableDamping = true;
			controls.minDistance = 3;
			controls.maxDistance = 30;
			controls.maxPolarAngle = Math.PI / 2.05;

			scene.add(new THREE.HemisphereLight(0xaab5ff, 0x0a0c15, 0.6));
			const sun = new THREE.DirectionalLight(0xffe8c2, 1.8);
			sun.position.set(15, 22, 10);
			sun.castShadow = true;
			sun.shadow.mapSize.set(2048, 2048);
			sun.shadow.camera.left = -20;
			sun.shadow.camera.right = 20;
			sun.shadow.camera.top = 20;
			sun.shadow.camera.bottom = -20;
			sun.shadow.camera.near = 1;
			sun.shadow.camera.far = 60;
			sun.shadow.bias = -0.0008;
			scene.add(sun);

			function resize() {
				const w = host.clientWidth, h = host.clientHeight;
				renderer.setSize(w, h, false);
				camera.aspect = w / h;
				camera.updateProjectionMatrix();
			}
			resize();
			window.addEventListener('resize', resize);

			const FLOOR_HALF = 18;
			const floorGeom = new THREE.PlaneGeometry(FLOOR_HALF * 2, FLOOR_HALF * 2);
			const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1f2b, roughness: 0.92, metalness: 0 });
			const floor = new THREE.Mesh(floorGeom, floorMat);
			floor.rotation.x = -Math.PI / 2;
			floor.receiveShadow = true;
			floor.name = 'floor';
			scene.add(floor);

			const grid = new THREE.GridHelper(FLOOR_HALF * 2, 36, 0x2a3045, 0x161a26);
			grid.position.y = 0.001;
			scene.add(grid);

			const obstacles = [];
			function addBox(x, y, z, w, h, d, color = 0x2a304a) {
				const mesh = new THREE.Mesh(
					new THREE.BoxGeometry(w, h, d),
					new THREE.MeshStandardMaterial({ color, roughness: 0.7, metalness: 0.1 }),
				);
				mesh.position.set(x, y, z);
				mesh.castShadow = true;
				mesh.receiveShadow = true;
				mesh.name = 'obstacle';
				scene.add(mesh);
				obstacles.push({ mesh, size: { w, h, d } });
				return mesh;
			}
			// A small enclosed plaza with a few obstacles.
			addBox(0, 1, -6, 14, 2, 0.5);
			addBox(0, 1, 6, 14, 2, 0.5);
			addBox(-7, 1, 0, 0.5, 2, 12);
			addBox(7, 1, 0, 0.5, 2, 12);
			addBox(-2.5, 0.5, -1.5, 2, 1, 2, 0x33405f);
			addBox(2, 0.5, 2, 1.5, 1, 1.5, 0x33405f);
			addBox(-3, 1.5, 3, 1, 3, 1, 0x4a3045);
			addBox(3.5, 1.5, -3, 1, 3, 1, 0x4a3045);

			const avatarRoot = new THREE.Group();
			scene.add(avatarRoot);
			let avatarMixer = null;
			let avatarReady = false;
			let walkAction = null;

			new GLTFLoader().load('/avatars/default.glb', (gltf) => {
				const model = gltf.scene;
				model.traverse((n) => { if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; } });
				avatarRoot.add(model);
				if (gltf.animations?.length) {
					avatarMixer = new THREE.AnimationMixer(model);
					const walkClip = gltf.animations.find((a) => /walk|run|loco/i.test(a.name)) || gltf.animations[0];
					walkAction = avatarMixer.clipAction(walkClip);
					walkAction.play();
					walkAction.setEffectiveWeight(0);
				}
				avatarReady = true;
			});

			let physics = null;
			let kcc = null;
			let avatarBody = null;
			let avatarCollider = null;
			const avatarHeight = 1.7;
			const avatarRadius = 0.35;

			async function initPhysics() {
				await RAPIER.init();
				const world = new RAPIER.World({ x: 0, y: -20, z: 0 });

				const floorBody = world.createRigidBody(RAPIER.RigidBodyDesc.fixed().setTranslation(0, -0.05, 0));
				world.createCollider(RAPIER.ColliderDesc.cuboid(FLOOR_HALF, 0.05, FLOOR_HALF), floorBody);

				for (const o of obstacles) {
					const body = world.createRigidBody(
						RAPIER.RigidBodyDesc.fixed().setTranslation(o.mesh.position.x, o.mesh.position.y, o.mesh.position.z),
					);
					world.createCollider(RAPIER.ColliderDesc.cuboid(o.size.w / 2, o.size.h / 2, o.size.d / 2), body);
				}

				avatarBody = world.createRigidBody(
					RAPIER.RigidBodyDesc.kinematicPositionBased().setTranslation(0, avatarHeight / 2, 4),
				);
				avatarCollider = world.createCollider(
					RAPIER.ColliderDesc.capsule(avatarHeight / 2 - avatarRadius, avatarRadius),
					avatarBody,
				);

				kcc = world.createCharacterController(0.05);
				kcc.setApplyImpulsesToDynamicBodies(false);
				kcc.enableAutostep(0.4, 0.2, true);
				kcc.enableSnapToGround(0.4);
				kcc.setSlideEnabled(true);
				kcc.setMaxSlopeClimbAngle(50 * Math.PI / 180);

				physics = { world, gravity: { x: 0, y: -20, z: 0 } };
				hud.rapier.textContent = `Rapier ${RAPIER.version()} · ready`;
			}

			let navMesh = null;
			let navQuery = null;
			let navmeshHelper = null;
			let navmeshVisible = false;

			async function initNavmesh() {
				await initRecast();
				const collisionMeshes = [floor, ...obstacles.map((o) => o.mesh)];
				const { success, navMesh: nm } = threeToSoloNavMesh(collisionMeshes, {
					cs: 0.25,
					ch: 0.2,
					walkableRadius: 2,
					walkableClimb: 2,
					walkableHeight: 8,
					walkableSlopeAngle: 50,
				});
				if (!success || !nm) {
					hud.recast.textContent = 'failed';
					return;
				}
				navMesh = nm;
				navQuery = new NavMeshQuery(navMesh);

				const { NavMeshHelper } = await import('@recast-navigation/three');
				navmeshHelper = new NavMeshHelper(navMesh, {
					navMeshMaterial: new THREE.MeshBasicMaterial({
						color: 0xd6ff3d, transparent: true, opacity: 0.18, depthWrite: false,
					}),
				});
				navmeshHelper.visible = false;
				navmeshHelper.position.y = 0.02;
				scene.add(navmeshHelper);
				hud.recast.textContent = 'Recast · ready';
			}

			let pendingPath = null;
			let pathIndex = 0;

			function autopilotTo(target) {
				if (!navQuery) return;
				const startPos = avatarRoot.position;
				const start = navQuery.findClosestPoint({ x: startPos.x, y: startPos.y, z: startPos.z });
				const end = navQuery.findClosestPoint({ x: target.x, y: target.y, z: target.z });
				if (!start.success || !end.success) return;
				const result = navQuery.computePath(start.point, end.point);
				if (!result.success || !result.path?.length) return;
				pendingPath = result.path.map((p) => new THREE.Vector3(p.x, p.y, p.z));
				pathIndex = 0;
			}

			$('toggleNavmesh').addEventListener('click', (e) => {
				navmeshVisible = !navmeshVisible;
				if (navmeshHelper) navmeshHelper.visible = navmeshVisible;
				e.currentTarget.classList.toggle('active', navmeshVisible);
				e.currentTarget.textContent = navmeshVisible ? 'Hide navmesh' : 'Show navmesh';
			});

			let autopilotEnabled = true;
			$('toggleAutopilot').addEventListener('click', (e) => {
				autopilotEnabled = !autopilotEnabled;
				e.currentTarget.classList.toggle('active', autopilotEnabled);
				e.currentTarget.textContent = `Click-to-walk: ${autopilotEnabled ? 'on' : 'off'}`;
				if (!autopilotEnabled) pendingPath = null;
			});

			const raycaster = new THREE.Raycaster();
			canvas.addEventListener('click', (e) => {
				if (!autopilotEnabled) return;
				const rect = canvas.getBoundingClientRect();
				const ndc = new THREE.Vector2(
					((e.clientX - rect.left) / rect.width) * 2 - 1,
					-((e.clientY - rect.top) / rect.height) * 2 + 1,
				);
				raycaster.setFromCamera(ndc, camera);
				const hits = raycaster.intersectObject(floor, false);
				if (hits.length) autopilotTo(hits[0].point);
			});

			const keys = new Set();
			const KEYMAP = { KeyW: 'fwd', ArrowUp: 'fwd', KeyS: 'back', ArrowDown: 'back', KeyA: 'left', ArrowLeft: 'left', KeyD: 'right', ArrowRight: 'right', ShiftLeft: 'run', ShiftRight: 'run' };
			window.addEventListener('keydown', (e) => {
				const m = KEYMAP[e.code];
				if (m) { keys.add(m); pendingPath = null; }
			});
			window.addEventListener('keyup', (e) => { const m = KEYMAP[e.code]; if (m) keys.delete(m); });

			const joystick = nipplejs.create({
				zone: $('joystick-host'),
				mode: 'static',
				position: { left: '50%', top: '50%' },
				color: '#d6ff3d',
				size: 110,
				restOpacity: 0.45,
			});
			let joyVec = { x: 0, y: 0, active: false };
			joystick.on('move', (_e, data) => {
				const ang = data.angle.radian;
				const f = Math.min(1, data.force);
				joyVec = { x: Math.cos(ang) * f, y: Math.sin(ang) * f, active: true };
				pendingPath = null;
			});
			joystick.on('end', () => { joyVec = { x: 0, y: 0, active: false }; });

			const tmpDir = new THREE.Vector3();
			const tmpRight = new THREE.Vector3();
			const tmpMove = new THREE.Vector3();
			let yaw = 0;

			let lastTime = performance.now();
			let frames = 0;
			let fpsAcc = 0;

			function tick() {
				requestAnimationFrame(tick);
				const now = performance.now();
				const dt = Math.min((now - lastTime) / 1000, 0.05);
				lastTime = now;
				frames++;
				fpsAcc += dt;
				if (fpsAcc >= 0.5) { hud.fps.textContent = Math.round(frames / fpsAcc); frames = 0; fpsAcc = 0; }

				controls.update();

				camera.getWorldDirection(tmpDir);
				tmpDir.y = 0; tmpDir.normalize();
				tmpRight.crossVectors(tmpDir, new THREE.Vector3(0, 1, 0)).normalize();

				let inX = 0, inZ = 0;
				if (keys.has('fwd')) inZ += 1;
				if (keys.has('back')) inZ -= 1;
				if (keys.has('right')) inX += 1;
				if (keys.has('left')) inX -= 1;
				if (joyVec.active) { inX = joyVec.x; inZ = joyVec.y; }

				const speed = (keys.has('run') ? 7.5 : 4.0);
				tmpMove.set(0, 0, 0);
				if (inX || inZ) {
					tmpMove.copy(tmpDir).multiplyScalar(inZ).add(tmpRight.clone().multiplyScalar(inX));
					if (tmpMove.lengthSq() > 1) tmpMove.normalize();
					tmpMove.multiplyScalar(speed * dt);
					pendingPath = null;
				}

				if (pendingPath && pendingPath[pathIndex]) {
					const target = pendingPath[pathIndex];
					const here = avatarRoot.position;
					const dx = target.x - here.x;
					const dz = target.z - here.z;
					const dist = Math.hypot(dx, dz);
					if (dist < 0.3) {
						pathIndex++;
						if (pathIndex >= pendingPath.length) pendingPath = null;
					} else {
						const inv = 1 / dist;
						tmpMove.set(dx * inv, 0, dz * inv).multiplyScalar(speed * dt);
					}
				}

				if (physics && kcc && avatarBody && avatarCollider) {
					tmpMove.y -= 20 * dt;
					kcc.computeColliderMovement(avatarCollider, tmpMove);
					const corrected = kcc.computedMovement();
					const pos = avatarBody.translation();
					const next = { x: pos.x + corrected.x, y: pos.y + corrected.y, z: pos.z + corrected.z };
					avatarBody.setNextKinematicTranslation(next);
					physics.world.step();

					const newPos = avatarBody.translation();
					avatarRoot.position.set(newPos.x, newPos.y - avatarHeight / 2, newPos.z);

					const horizSpeed = Math.hypot(corrected.x, corrected.z);
					if (horizSpeed > 0.005) {
						const targetYaw = Math.atan2(corrected.x, corrected.z);
						const diff = ((targetYaw - yaw + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
						yaw += diff * Math.min(1, dt * 12);
						avatarRoot.rotation.y = yaw;
					}

					if (avatarMixer) {
						avatarMixer.update(dt);
						if (walkAction) {
							const targetW = horizSpeed > 0.005 ? 1 : 0;
							const w = walkAction.getEffectiveWeight();
							walkAction.setEffectiveWeight(w + (targetW - w) * 0.2);
							walkAction.setEffectiveTimeScale(Math.max(0.5, horizSpeed * 80));
						}
					}

					hud.pos.textContent = `${newPos.x.toFixed(1)}, ${newPos.z.toFixed(1)}`;
				}

				renderer.render(scene, camera);
			}

			(async () => {
				try {
					await Promise.all([initPhysics(), initNavmesh()]);
					$('boot').style.display = 'none';
					tick();
				} catch (err) {
					$('boot').textContent = 'Boot failed: ' + (err?.message || err);
					console.error(err);
				}
			})();
		</script>
	</body>
</html>
