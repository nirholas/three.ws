<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>three.ws — Give Your AI a Body</title>
		<meta name="robots" content="noindex" />
		<link rel="stylesheet" href="/fonts/fonts.css" />
		<style>
			:root { color-scheme: dark; }
			*, *::before, *::after { box-sizing: border-box; }
			html, body { height: 100%; margin: 0; background: #04050d; color: #eee; font: 15px/1.5 'Inter', -apple-system, system-ui, sans-serif; }

			/* Canvas sits above all HTML — pointer-events:none so clicks pass through */
			#avatar-canvas {
				position: fixed;
				top: 0; left: 0;
				width: 100vw; height: 100vh;
				pointer-events: none;
				z-index: 999;
			}

			/* Page content — left column, visible through transparent canvas */
			.page {
				position: relative;
				z-index: 10;
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				justify-content: center;
				padding: 100px 56px 60px;
				max-width: 520px;
			}

			.eyebrow {
				display: inline-flex; align-items: center; gap: 9px;
				font-size: 11px; font-weight: 600;
				letter-spacing: 0.17em; text-transform: uppercase;
				color: #d6ff3d; margin-bottom: 24px;
				font-family: 'Space Grotesk', 'Inter', sans-serif;
			}
			.eyebrow-dot {
				width: 7px; height: 7px; border-radius: 50%;
				background: #d6ff3d; box-shadow: 0 0 8px rgba(214,255,61,0.7);
				animation: blink 2.2s ease-in-out infinite;
			}
			@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

			.hero-title {
				font-family: 'Space Grotesk', 'Inter', sans-serif;
				font-size: clamp(38px, 4.5vw, 68px);
				font-weight: 800; letter-spacing: -0.03em;
				line-height: 1.04; margin: 0 0 20px; color: #fff;
			}
			.hero-title em { color: #d6ff3d; font-style: normal; }

			.hero-sub {
				color: #555870; font-size: 15.5px; line-height: 1.7;
				max-width: 38ch; margin: 0 0 44px;
			}

			/* Physical 3D buttons */
			.cta-row { display: flex; flex-direction: column; gap: 14px; align-items: flex-start; }

			.btn {
				display: inline-flex; align-items: center; gap: 10px;
				padding: 16px 32px; border: none; border-radius: 14px;
				font: 700 15px/1 'Inter', inherit; cursor: pointer; text-decoration: none;
				user-select: none;
				/* GSAP squishes downward into the page, not into its own center */
				transform-origin: bottom center;
				will-change: transform;
			}
			.btn-primary {
				background: linear-gradient(160deg, #e2ff5a, #c8ef2c);
				color: #0a0b0f;
				box-shadow: 0 8px 0 0 #7a9600, 0 10px 28px rgba(214,255,61,0.28);
			}
			.btn-primary:hover { filter: brightness(1.07); }
			.btn-ghost {
				background: rgba(255,255,255,0.05); color: #bbb;
				border: 1.5px solid rgba(255,255,255,0.1);
				box-shadow: 0 5px 0 0 rgba(255,255,255,0.04);
			}

			/* Nav */
			.nav {
				position: fixed; top: 0; left: 0; right: 0; z-index: 20;
				display: flex; align-items: center; gap: 16px; padding: 14px 28px;
				background: rgba(4,5,13,0.55); backdrop-filter: blur(14px);
				border-bottom: 1px solid rgba(255,255,255,0.04);
			}
			.nav .brand { font: 700 15px/1 'Space Grotesk','Inter',sans-serif; color:#fff; text-decoration:none; display:flex; align-items:center; gap:7px; }
			.brand-dot { width:8px; height:8px; border-radius:50%; background:linear-gradient(135deg,#d6ff3d,#aacc00); box-shadow:0 0 10px rgba(214,255,61,0.6); }
			.nav a.link { color:#555870; text-decoration:none; font-size:13px; margin-left:auto; }
			.nav a.link:hover { color:#d6ff3d; }
		</style>
	</head>
	<body>
		<div class="nav">
			<a href="/" class="brand">
				<img src="/three.svg" width="20" height="20" alt="" />
				<span class="brand-dot"></span>
				three.ws
			</a>
			<a href="/demos/" class="link">← lab</a>
		</div>

		<div class="page">
			<div class="eyebrow">
				<span class="eyebrow-dot"></span>
				<span>The 3D layer for onchain AI agents</span>
			</div>
			<h1 class="hero-title"><span id="sit-line">Give your AI</span><br />a <em>body.</em></h1>
			<p class="hero-sub">
				Born in 3D. Raised on-chain. Yours forever.
				Your AI has been a chatbox long enough — give it a body,
				a personality, and a permanent home.
			</p>
			<div class="cta-row">
				<a href="/create" class="btn btn-primary" id="cta-btn">
					<span>Build your agent — free</span>
					<span>→</span>
				</a>
				<a href="#" class="btn btn-ghost">
					<span>Watch it live</span>
					<span style="opacity:.4">↓</span>
				</a>
			</div>
		</div>

		<!-- Transparent overlay canvas — avatar renders above all HTML -->
		<canvas id="avatar-canvas"></canvas>

		<script type="module">
			import * as THREE from 'three';
			import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
			import { gsap } from 'https://cdn.jsdelivr.net/npm/gsap@3.12.5/+esm';

			const canvas  = document.getElementById('avatar-canvas');
			const ctaBtn  = document.getElementById('cta-btn');
			const sitLine = document.getElementById('sit-line');

			// ── Renderer: alpha:true → transparent background ─────────────────
			const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
			renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
			renderer.outputColorSpace = THREE.SRGBColorSpace;
			renderer.toneMapping = THREE.ACESFilmicToneMapping;
			renderer.toneMappingExposure = 1.1;

			const scene = new THREE.Scene();
			// scene.background intentionally NOT set → transparent

			// ── OrthographicCamera: 1 world unit = PX_PER_UNIT pixels ────────
			// This makes screen→world mapping trivially exact: no perspective math.
			const PX_PER_UNIT = 120; // avatar (1.8u tall) = 216px on screen

			const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 100);
			camera.position.z = 10;

			function updateFrustum() {
				const hw = window.innerWidth  / PX_PER_UNIT / 2;
				const hh = window.innerHeight / PX_PER_UNIT / 2;
				camera.left   = -hw; camera.right  = hw;
				camera.top    =  hh; camera.bottom = -hh;
				camera.updateProjectionMatrix();
			}

			// DOM rect → world position (standard NDC + unproject pipeline)
			// Works for any DOM element regardless of camera type.
			const _v3 = new THREE.Vector3();
			function domToWorld(screenX, screenY) {
				_v3.set(
					 (screenX / window.innerWidth)  * 2 - 1,
					-(screenY / window.innerHeight) * 2 + 1,
					0
				);
				_v3.unproject(camera);
				return { x: _v3.x, y: _v3.y };
			}

			function resize() {
				renderer.setSize(window.innerWidth, window.innerHeight, false);
				updateFrustum();
			}
			window.addEventListener('resize', () => { resize(); placeAtStart(); });
			resize();

			// ── Lights ────────────────────────────────────────────────────────
			scene.add(new THREE.AmbientLight(0xffffff, 0.6));
			const key = new THREE.DirectionalLight(0xfff4dc, 2.0);
			key.position.set(3, 6, 5);
			scene.add(key);
			const rim = new THREE.DirectionalLight(0x4060ff, 0.6);
			rim.position.set(-4, 3, -2);
			scene.add(rim);
			const fill = new THREE.DirectionalLight(0xffeedd, 0.4);
			fill.position.set(0, 2, 7);
			scene.add(fill);

			// ── Avatar ────────────────────────────────────────────────────────
			let avatar = null, mixer = null, rootBone = null, baseRootPos = null;
			let sitAction = null, standupAction = null, fallAction = null;
			let phase = 'loading';                   // loading → sitting → standingUp → jumping → resting
			let startW = { x: 0, y: 0 };             // sit/stand anchor (above the text)
			let seqT = 0, landed = false, jumpTarget = { x: 0, y: 0 };

			const STAND_S     = 2.566;  // standup clip duration
			const JUMP_S      = 2.933;  // jumpdown3 clip duration
			const SIT_DWELL_S = 2.4;    // how long he sits before standing
			const LAND_P      = 0.84;   // jump fraction where feet make contact
			const PEAK_U      = 0.55;   // arc peak in world units
			const JUMP_YAW    = 0.22;   // ~12° peak yaw mid-flight (face-forward at both ends)
			// cz.glb origin is at the feet (verified in /demos/button-jump.html), so
			// these stay 0 by default. Bump them if the visible feet/butt sit off.
			const FEET_OFFSET_PX = 0;
			const SIT_OFFSET_PX  = 0;

			function smoothstep(t) { return t * t * (3 - 2 * t); }

			// Sit anchor: perched on the right edge of "Give your AI".
			// SIT_OFFSET_PX shifts the GLB origin DOWN in screen px so the visible
			// butt rests on the text rather than the origin landing on the text.
			function getSitWorld() {
				const rect = sitLine.getBoundingClientRect();
				const sx = rect.right - rect.height * 0.4;
				const sy = rect.top + SIT_OFFSET_PX;
				return domToWorld(sx, sy);
			}
			// Jump target: visible feet land on the top edge of the button.
			// FEET_OFFSET_PX shifts the origin DOWN so feet (which sit above origin
			// for this GLB) align to rect.top instead of clearing it.
			function getButtonWorld() {
				const rect = ctaBtn.getBoundingClientRect();
				return domToWorld(rect.left + rect.width / 2, rect.top + FEET_OFFSET_PX);
			}

			function placeAtStart() {
				if (!avatar) return;
				startW = getSitWorld();
				if (phase === 'sitting' || phase === 'loading') {
					avatar.position.set(startW.x, startW.y, 0);
				}
			}

			function fireSquish() {
				// Kill any in-flight tween so rapid re-fires don't stack
				gsap.killTweensOf(ctaBtn);
				// Compress: fast slam downward, transform-origin:bottom center → squishes into page
				gsap.to(ctaBtn, {
					scaleY: 0.7,
					scaleX: 1.05,
					duration: 0.1,
					ease: 'power4.out',
					onComplete: () => {
						// Recoil: elastic bounce back to rest
						gsap.to(ctaBtn, {
							scaleY: 1,
							scaleX: 1,
							duration: 0.8,
							ease: 'elastic.out(1.2, 0.3)',
						});
					},
				});
			}

			function startSit() {
				if (!sitAction) return;
				phase = 'sitting';
				placeAtStart();
				fallAction?.stop();
				standupAction?.stop();
				// Face the camera the entire cycle — no turning around
				gsap.killTweensOf(avatar.rotation);
				avatar.rotation.set(0, 0, 0);
				sitAction.reset().play();
				setTimeout(startStandup, SIT_DWELL_S * 1000);
			}

			function startStandup() {
				if (!standupAction || phase !== 'sitting') return;
				phase = 'standingUp';
				// Crossfade sit → standup, no rotation change
				standupAction.reset();
				standupAction.crossFadeFrom(sitAction, 0.2, false).play();
				setTimeout(triggerJump, (STAND_S - 0.15) * 1000);
			}

			function triggerJump() {
				if (!avatar || !fallAction || phase === 'jumping') return;

				// Re-read both endpoints fresh so the trajectory is always layout-correct
				startW     = getSitWorld();      // where we ACTUALLY jump from (avatar's current rest)
				jumpTarget = getButtonWorld();   // where the feet need to land

				phase = 'jumping'; seqT = 0; landed = false;
				fallAction.reset();
				fallAction.crossFadeFrom(standupAction, 0.15, false).play();
			}

			function updateSeq(dt) {
				if (phase !== 'jumping' || !avatar) return;
				seqT += dt;
				const p    = Math.min(seqT / JUMP_S, 1);
				const ease = smoothstep(p);

				// Animate BOTH axes between startW (sit anchor) and jumpTarget (button)
				const x   = startW.x + (jumpTarget.x - startW.x) * ease;
				const arc = PEAK_U * 4 * p * (1 - p);
				const y   = startW.y + (jumpTarget.y - startW.y) * ease + arc;

				avatar.position.set(x, y, 0);

				// Subtle in-flight yaw — peaks mid-arc, returns to 0 by landing.
				// Sign follows horizontal travel direction so he looks where he's going.
				const dir = Math.sign(jumpTarget.x - startW.x);
				avatar.rotation.y = JUMP_YAW * dir * Math.sin(Math.PI * p);

				// Only squish when the avatar is actually CLOSE to the button (in screen px).
				// Belt-and-braces: if the trajectory math is ever wrong, the squish stays silent
				// instead of "telekinetically" firing from across the screen.
				if (!landed && p >= LAND_P) {
					const dxPx = Math.abs(avatar.position.x - jumpTarget.x) * PX_PER_UNIT;
					const dyPx = Math.abs(avatar.position.y - jumpTarget.y) * PX_PER_UNIT;
					if (dxPx < 80 && dyPx < 80) {
						landed = true;
						fireSquish();
					}
				}

				if (p >= 1) {
					phase = 'resting';
					setTimeout(() => {
						const fromX = avatar.position.x;
						const fromY = avatar.position.y;
						const back  = getSitWorld();
						startW = back;
						// Settle yaw back to 0 just in case the trajectory ended mid-arc
						avatar.rotation.y = 0;
						const t0 = performance.now();
						(function slide(now) {
							const sp = Math.min((now - t0) / 700, 1);
							avatar.position.x = fromX + (back.x - fromX) * smoothstep(sp);
							avatar.position.y = fromY + (back.y - fromY) * smoothstep(sp);
							if (sp < 1) requestAnimationFrame(slide);
							else {
								avatar.position.set(back.x, back.y, 0);
								startSit();
							}
						})(performance.now());
					}, 1600);
				}
			}

			// Click skips straight to the jump (still must crossfade from current pose)
			ctaBtn.addEventListener('click', e => {
				e.preventDefault();
				if (phase === 'sitting' || phase === 'standingUp') triggerJump();
			});

			// ── Load avatar + animations ──────────────────────────────────────
			new GLTFLoader().load('/avatars/cz.glb', gltf => {
				avatar = gltf.scene;
				avatar.traverse(n => {
					if (!rootBone && /^(Hips|Root|mixamorig:?Hips)$/i.test(n.name))
						rootBone = n;
				});
				// Yaw is choreographed per-phase: facing camera while seated, rotates
				// toward the jump direction during standup.
				avatar.rotation.y = 0;
				scene.add(avatar);

				mixer = new THREE.AnimationMixer(avatar);

				Promise.all([
					fetch('/animations/clips/sitidle.json').then(r => r.json()),
					fetch('/animations/clips/standup.json').then(r => r.json()),
					fetch('/animations/clips/jumpdown3.json').then(r => r.json()),
				]).then(([sitJson, standJson, jumpJson]) => {
					sitAction = mixer.clipAction(THREE.AnimationClip.parse(sitJson));
					sitAction.setLoop(THREE.LoopRepeat, Infinity);

					standupAction = mixer.clipAction(THREE.AnimationClip.parse(standJson));
					standupAction.setLoop(THREE.LoopOnce, 1);
					standupAction.clampWhenFinished = true;

					fallAction = mixer.clipAction(THREE.AnimationClip.parse(jumpJson));
					fallAction.setLoop(THREE.LoopOnce, 1);
					fallAction.clampWhenFinished = true;

					if (rootBone) baseRootPos = rootBone.position.clone();

					// Lock root bone every frame so animation root motion never drifts the avatar
					const _r = renderer.render.bind(renderer);
					renderer.render = (sc, cam) => {
						try {
							if (rootBone && baseRootPos) rootBone.position.copy(baseRootPos);
						} catch (_) {}
						_r(sc, cam);
					};

					// Begin the cycle: sit on the text, stand up, jump to the button
					startSit();
				});
			});

			// ── Render loop ───────────────────────────────────────────────────
			const clock = new THREE.Clock();
			(function tick() {
				requestAnimationFrame(tick);
				try {
					const dt = Math.min(clock.getDelta(), 0.05);
					mixer?.update(dt);
					updateSeq(dt);
					renderer.render(scene, camera);
				} catch (_) {}
			})();
		</script>
	</body>
</html>
