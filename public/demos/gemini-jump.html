<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Tactile button (Gemini concept) · three.ws lab</title>
		<meta name="robots" content="noindex" />
		<link rel="stylesheet" href="/style.css" />
		<link rel="stylesheet" href="/nav.css" />
		<link rel="stylesheet" href="/fonts/fonts.css" />
		<style>
			:root { color-scheme: dark; }
			*, *::before, *::after { box-sizing: border-box; }
			html, body { height: 100%; margin: 0; }
			body {
				background: #05060a;
				color: #eee;
				font: 15px/1.5 -apple-system, system-ui, sans-serif;
				overflow-x: hidden;
			}
			.crumb { padding: 14px 24px 0; font-size: 13px; }
			.crumb a { color: #8a8d98; text-decoration: none; }
			.crumb a:hover { color: #d6ff3d; }

			.hero {
				max-width: 760px;
				margin: 0 auto;
				padding: 8px 24px 56px;
				display: flex;
				flex-direction: column;
				align-items: center;
				text-align: center;
			}

			.stage-wrap {
				position: relative;
				width: 100%;
				height: clamp(360px, 58vh, 560px);
				overflow: hidden;
				border-radius: 18px;
				background: radial-gradient(ellipse at center bottom, #0d1018 0%, #05060a 70%);
			}
			#stage-canvas {
				display: block;
				width: 100%;
				height: 100%;
			}

			/* Loading + status pill */
			.loading-veil {
				position: absolute; inset: 0;
				display: flex; align-items: center; justify-content: center;
				background: rgba(8,9,15,0.6); pointer-events: none;
				transition: opacity 0.4s;
			}
			.loading-veil.hidden { opacity: 0; }
			.spinner {
				width: 10px; height: 10px; border-radius: 50%;
				background: #d6ff3d; margin-right: 10px;
				animation: pulse 0.8s ease-in-out infinite;
			}
			@keyframes pulse { 0%,100%{opacity:.25} 50%{opacity:1} }
			.loading-veil span { font-size: 13px; color: #8a8d98; }
			.status-pill {
				position: absolute; top: 14px; right: 14px;
				background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
				padding: 4px 10px; border-radius: 999px;
				font-size: 11px; color: #8a8d98; font-family: ui-monospace, monospace;
				pointer-events: none;
			}

			.text-block {
				margin-top: 32px;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 14px;
			}
			.eyebrow {
				display: inline-flex; align-items: center; gap: 8px;
				font-size: 11.5px; letter-spacing: 0.15em; text-transform: uppercase;
				color: #d6ff3d;
			}
			.eyebrow-dot {
				display: inline-block; width: 6px; height: 6px;
				border-radius: 50%; background: #d6ff3d;
			}
			.title {
				font-size: clamp(40px, 6vw, 72px);
				font-weight: 700; letter-spacing: -0.025em;
				line-height: 1.04; margin: 0;
			}
			.title em { color: #d6ff3d; font-style: normal; }
			.sub {
				color: #8a8d98; font-size: 16px; line-height: 1.55;
				max-width: 44ch; margin: 0;
			}

			#trigger-btn {
				margin-top: 10px;
				background: #d6ff3d;
				color: #0a0b0f;
				border: none;
				padding: 16px 32px;
				font: 700 16px/1 inherit;
				border-radius: 30px;
				cursor: pointer;
				transition: transform 0.1s ease, filter 0.15s;
				box-shadow: 0 8px 0 0 rgba(160, 200, 0, 1);
			}
			#trigger-btn:hover { filter: brightness(1.06); }
			#trigger-btn:active {
				transform: translateY(8px);
				box-shadow: 0 0 0 0 rgba(160, 200, 0, 1);
			}

			.hint {
				margin-top: 8px;
				font-size: 12px;
				color: #4a4b5a;
			}
		</style>
	</head>
	<body>
		<header><div id="nav-container"></div></header>
		<p class="crumb"><a href="/demos/">← lab</a></p>

		<section class="hero">
			<div class="stage-wrap">
				<canvas id="stage-canvas"></canvas>
				<div class="loading-veil" id="loading-veil">
					<div class="spinner"></div>
					<span>loading avatar…</span>
				</div>
				<div class="status-pill" id="status"></div>
			</div>

			<div class="text-block">
				<div class="eyebrow">
					<span class="eyebrow-dot"></span>
					<span>three.ws · tactile concept</span>
				</div>
				<h1 class="title">Give your AI<br />a <em>body.</em></h1>
				<p class="sub">
					Click the button. The avatar leaps onto a heavy 3D target, with
					a volume-preserving squish on impact and an elastic recoil.
				</p>
				<button id="trigger-btn" type="button">Trigger jump →</button>
				<p class="hint">Click to send the avatar in</p>
			</div>
		</section>

		<script src="/nav.js" defer></script>
		<script type="module" src="/src/gemini-jump.js"></script>
	</body>
</html>
