<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Pump.fun live feed — three.ws demo</title>
	<style>
		:root { color-scheme: dark; }
		html, body { margin: 0; height: 100%; background: #0a0a0a; color: #f0f0f0;
			font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
		header { padding: 14px 20px; border-bottom: 1px solid #1f1f1f;
			display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
		header h1 { margin: 0; font-size: 16px; font-weight: 600; }
		header .desc { color: #888; font-size: 13px; }
		header .ctl { margin-left: auto; display: flex; gap: 8px; align-items: center; }
		header select, header input[type="text"], header button {
			background: #161616; color: #f0f0f0; border: 1px solid #2a2a2a;
			border-radius: 6px; padding: 6px 10px; font-size: 13px; }
		header button { cursor: pointer; }
		header button:hover { background: #222; }
		main { position: relative; height: calc(100% - 56px); }
		#stage { position: absolute; inset: 0; }
		iframe { width: 100%; height: 100%; border: 0; display: block; background: #0a0a0a; }
		.notice { position: absolute; left: 16px; bottom: 16px; max-width: 360px;
			background: #161616; border: 1px solid #2a2a2a; border-radius: 8px;
			padding: 10px 12px; font-size: 12px; color: #aaa; z-index: 10; }
		.notice b { color: #f0f0f0; }
		a { color: #8b5cf6; }
	</style>
</head>
<body>
	<header>
		<h1>✦ Pump.fun Live Feed</h1>
		<span class="desc">3D agent narrates pump.fun activity in real time.</span>
		<div class="ctl">
			<label style="font-size:12px;color:#888">Filter mint
				<input id="ctl-mint" type="text" placeholder="(any)" size="22" />
			</label>
			<select id="ctl-kind">
				<option value="all">All events</option>
				<option value="claims">Claims only</option>
				<option value="graduations">Graduations only</option>
			</select>
			<select id="ctl-tier" title="Minimum tier for claim cards">
				<option value="">Tier: any</option>
				<option value="notable">Notable+</option>
				<option value="influencer">Influencer+</option>
				<option value="mega">Mega only</option>
			</select>
			<button id="ctl-narrate" type="button" data-on="1">Narration: on</button>
			<button id="ctl-reload" type="button">Apply</button>
		</div>
	</header>
	<main>
		<div id="stage">
			<iframe id="agent" src="/app#widget=wdgt_demo_pumpfun&kiosk=true" allow="autoplay"></iframe>
		</div>
		<div class="notice">
			<b>Heads up:</b> set <code>PUMPFUN_BOT_URL</code> in your environment to enable the live feed.
			Without it the SSE stream returns <code>503</code> and no cards arrive. See
			<a href="/docs/solana-pumpfun.md">solana-pumpfun.md</a>.
		</div>
	</main>
	<script>
		const iframe = document.getElementById('agent');

		// Build hash from current toolbar state.
		const params = new URLSearchParams(location.search);
		const $kind = document.getElementById('ctl-kind');
		const $tier = document.getElementById('ctl-tier');
		const $narr = document.getElementById('ctl-narrate');
		$kind.value = params.get('kind') || 'all';
		$tier.value = params.get('minTier') || '';
		const narrate = params.get('narrate') !== '0';
		$narr.dataset.on = narrate ? '1' : '0';
		$narr.textContent = narrate ? 'Narration: on' : 'Narration: off';

		document.getElementById('ctl-narrate').addEventListener('click', (e) => {
			const on = e.target.dataset.on !== '1';
			e.target.dataset.on = on ? '1' : '0';
			e.target.textContent = on ? 'Narration: on' : 'Narration: off';
		});

		document.getElementById('ctl-reload').addEventListener('click', () => {
			const u = new URL(location.href);
			u.searchParams.set('kind', $kind.value);
			if ($tier.value) u.searchParams.set('minTier', $tier.value);
			else u.searchParams.delete('minTier');
			u.searchParams.set('narrate', $narr.dataset.on === '1' ? '1' : '0');
			location.href = u.toString();
		});

		// Live mint focus — postMessage into the iframe so the widget filters
		// without reloading. The widget listens for a CustomEvent on its
		// container; we proxy via the iframe's window.
		document.getElementById('ctl-mint').addEventListener('input', (e) => {
			const mint = e.target.value.trim() || null;
			iframe.contentWindow?.postMessage(
				{ type: 'pumpfun-feed:focus-mint', mint },
				'*',
			);
		});
	</script>
</body>
</html>
