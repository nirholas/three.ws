<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>PumpFun migrations · three.ws</title>
	<link rel="icon" href="/favicon.ico" />
	<style>
		:root { color-scheme: dark; --accent: #6a5cff; --border: #1f1f29; --bg: #0a0a0f; --panel: #14141c; --muted: #888; }
		* { box-sizing: border-box; }
		html, body { margin: 0; height: 100%; background: var(--bg); color: #eee;
			font: 14px/1.55 -apple-system, system-ui, Segoe UI, Roboto, sans-serif; }
		header { padding: 10px 18px; border-bottom: 1px solid var(--border);
			display: flex; align-items: center; gap: 12px; flex-wrap: wrap; background: var(--panel); }
		header h1 { margin: 0; font-size: 15px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
		.dot { width: 8px; height: 8px; border-radius: 50%; background: #555; box-shadow: 0 0 0 0 currentColor; }
		.dot.live { background: #4ade80; animation: pulse 1.6s ease-in-out infinite; }
		.dot.connecting { background: #fbbf24; }
		.dot.down { background: #f87171; }
		@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
		.status-pill { font-size: 11px; color: var(--muted); display: inline-flex; align-items: center; gap: 6px;
			padding: 3px 8px; border: 1px solid var(--border); border-radius: 999px; }
		header .desc { color: var(--muted); font-size: 12px; }
		header .ctl { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
		header label { font-size: 12px; color: var(--muted); display: inline-flex; align-items: center; gap: 6px; }
		header input[type="text"], header select, header button {
			background: #161620; color: #eee; border: 1px solid #2a2a36;
			border-radius: 6px; padding: 6px 10px; font-size: 13px; }
		header button { cursor: pointer; }
		header button:hover { background: #20202c; }
		header button.toggle[data-on="0"] { color: var(--muted); }
		#ctl-avatar-wrap { display: inline-flex; align-items: center; gap: 6px; }
		#ctl-avatar-url { width: 0; padding: 0; border-width: 0; overflow: hidden; transition: width 0.2s, padding 0.2s, border-width 0.2s; }
		#ctl-avatar-url.visible { width: 160px; padding: 6px 10px; border-width: 1px; }
		main { position: relative; height: calc(100% - 48px); display: grid; grid-template-columns: 1fr 360px; }
		#stage { position: relative; }
		iframe { width: 100%; height: 100%; border: 0; display: block; background: var(--bg); }
		#side { border-left: 1px solid var(--border); background: var(--panel); display: flex; flex-direction: column; overflow: hidden; }
		#side h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
			color: var(--muted); margin: 12px 16px 6px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; }
		#agent-card { padding: 4px 16px 12px; border-bottom: 1px solid var(--border); }
		#feed-wrap { flex: 1; min-height: 0; display: flex; flex-direction: column; }
		#feed { flex: 1; overflow-y: auto; padding: 0 12px 12px; }
		.kv { display: flex; justify-content: space-between; padding: 3px 0; font-size: 13px; gap: 8px; }
		.kv span:first-child { color: var(--muted); }
		.kv code { font-size: 11px; background: #1a1a24; padding: 1px 5px; border-radius: 3px; }
		.signal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 0 16px 12px; }
		.signal { background: #1a1a24; border: 1px solid #232330; border-radius: 6px; padding: 8px; }
		.signal .v { font-size: 18px; font-weight: 600; }
		.signal .l { font-size: 11px; color: var(--muted); margin-top: 2px; }
		.signal.neg { border-color: #4a1f23; background: #1f1418; }
		.empty { color: var(--muted); font-size: 12px; padding: 8px 16px; }
		a { color: #9a8cff; text-decoration: none; }
		a:hover { text-decoration: underline; }
		.warn { background: #2a1f0d; border: 1px solid #463a14; padding: 8px 10px; border-radius: 6px;
			color: #fbbf24; font-size: 12px; margin: 12px 16px; }

		/* Event cards */
		.evt { border: 1px solid #232330; background: #15151d; border-radius: 8px; padding: 10px 12px; margin: 6px 0;
			animation: evt-in 0.35s ease; font-size: 12px; }
		.evt.first { border-color: #1f4232; background: #0e1f17; }
		.evt.fake { border-color: #4a1f23; background: #1f1418; }
		.evt.grad { border-color: #2c1f4a; background: #18142a; }
		.evt-row { display: flex; justify-content: space-between; gap: 6px; align-items: baseline; }
		.evt-kind { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
		.evt-tier { font-size: 10px; color: #fbbf24; }
		.evt-title { font-weight: 700; font-size: 13px; margin: 3px 0 2px; }
		.evt-who { font-weight: 600; font-size: 13px; margin-top: 3px; word-break: break-all; }
		.evt-amt { font-size: 12px; color: #cbd5e1; }
		.evt-take { font-size: 11px; color: var(--muted); margin-top: 4px; font-style: italic; }
		.evt-time { font-size: 10px; color: #555; }
		.evt-links { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 4px; }
		.evt-links a { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #1e1e2c; border: 1px solid #2a2a3c; color: #9a8cff; text-decoration: none; }
		.evt-links a:hover { background: #26263a; }
		.evt-meta { margin-top: 5px; font-size: 10px; color: #555; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
		.evt-meta a { color: #666; text-decoration: none; }
		.evt-meta a:hover { color: #9a8cff; }
		.evt-mint { font-size: 9px; color: #444; word-break: break-all; margin-top: 4px; font-family: monospace; }
		.evt-desc { font-size: 11px; color: #8a8a9a; margin: 2px 0; }
		.evt-section { margin-top: 6px; padding-top: 6px; border-top: 1px solid #1e1e2c; }
		.evt-row2 { display: flex; gap: 10px; flex-wrap: wrap; margin: 3px 0; font-size: 11px; color: #cbd5e1; }
		.evt-stat { color: var(--muted); }
		.evt-gh { font-size: 11px; margin: 2px 0; }
		.evt-repo { font-size: 11px; background: #1a1a24; border-radius: 4px; padding: 4px 7px; margin-top: 4px; }
		.evt-repo-name { font-weight: 600; color: #9a8cff; }
		.evt-topics { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 3px; }
		.evt-topic { font-size: 9px; padding: 1px 5px; background: #1f1f30; border: 1px solid #2a2a3c; border-radius: 10px; color: #7a7aaa; }
		@keyframes evt-in { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

		@media (max-width: 720px) { main { grid-template-columns: 1fr; } #side { display: none; } }
	</style>
</head>
<body>
	<header>
		<h1>✦ PumpFun migrations</h1>
		<span class="status-pill" id="status-pill"><span class="dot connecting" id="status-dot"></span><span id="status-label">connecting…</span></span>
		<div class="ctl">
			<input id="ctl-asset" type="text" placeholder="Solana asset pubkey (optional)" size="22" />
			<input id="ctl-mint" type="text" placeholder="Filter mint…" size="18" />
			<select id="ctl-kind" title="Event type">
				<option value="all">All events</option>
				<option value="mint">New tokens</option>
				<option value="graduation">Graduations</option>
				<option value="claims">Claims only</option>
			</select>
			<select id="ctl-tier" title="Minimum tier">
				<option value="">Any tier</option>
				<option value="notable">Notable+</option>
				<option value="influencer">Influencer+</option>
				<option value="mega">Mega only</option>
			</select>
			<div id="ctl-avatar-wrap">
				<select id="ctl-avatar" title="Avatar">
					<option value="/avatars/cz.glb">CZ avatar</option>
					<option value="/avatars/default.glb">Default avatar</option>
					<option value="custom">Custom URL…</option>
				</select>
				<input id="ctl-avatar-url" type="text" placeholder="https://…/avatar.glb" />
			</div>
			<button id="ctl-narrate" class="toggle" type="button" data-on="1" title="Toggle agent narration">🔊 Narration</button>
		</div>
	</header>
	<main>
		<div id="stage">
			<iframe id="agent" allow="autoplay" title="3D agent"></iframe>
		</div>
		<aside id="side">
			<h2>Agent</h2>
			<div id="agent-card"><div class="empty">Default narrator avatar. Paste a Solana asset pubkey above to bind a specific agent.</div></div>
			<div id="signals-section" hidden>
				<h2>Reputation signals</h2>
				<div class="signal-grid" id="signals"></div>
			</div>
			<div id="feed-wrap">
				<h2><span id="feed-title">Live feed</span></h2>
				<div id="feed"><div class="empty">Waiting for events…</div></div>
			</div>
		</aside>
	</main>
	<script>
		const url = new URL(location.href);
		const $ = (id) => document.getElementById(id);
		const iframe = $('agent');

		const PRESET_AVATARS = ['/avatars/cz.glb', '/avatars/default.glb'];
		const params = {
			asset: url.searchParams.get('asset') || '',
			mint: url.searchParams.get('mint') || '',
			kind: url.searchParams.get('kind') || 'all',
			minTier: url.searchParams.get('minTier') || '',
			network: url.searchParams.get('network') || 'mainnet',
			narrate: url.searchParams.get('narrate') !== '0',
			avatar: url.searchParams.get('avatar') || '/avatars/cz.glb',
		};
		$('ctl-asset').value = params.asset;
		$('ctl-mint').value = params.mint;
		$('ctl-kind').value = params.kind;
		$('ctl-tier').value = params.minTier;
		$('ctl-narrate').dataset.on = params.narrate ? '1' : '0';

		// Init avatar picker
		const avatarSelect = $('ctl-avatar');
		const avatarUrlInput = $('ctl-avatar-url');
		if (PRESET_AVATARS.includes(params.avatar)) {
			avatarSelect.value = params.avatar;
		} else {
			avatarSelect.value = 'custom';
			avatarUrlInput.value = params.avatar;
			avatarUrlInput.classList.add('visible');
		}
		avatarSelect.addEventListener('change', () => {
			if (avatarSelect.value === 'custom') {
				avatarUrlInput.classList.add('visible');
				avatarUrlInput.focus();
			} else {
				avatarUrlInput.classList.remove('visible');
				params.avatar = avatarSelect.value;
				syncURL();
				mountAgent();
			}
		});
		avatarUrlInput.addEventListener('change', () => {
			const v = avatarUrlInput.value.trim();
			if (v) { params.avatar = v; syncURL(); mountAgent(); }
		});

		function setStatus(state, label) {
			const dot = $('status-dot');
			dot.className = 'dot ' + state;
			$('status-label').textContent = label;
		}

		function syncURL() {
			const u = new URL(location.href);
			const set = (k, v) => v ? u.searchParams.set(k, v) : u.searchParams.delete(k);
			set('asset', params.asset);
			set('mint', params.mint);
			set('kind', params.kind === 'all' ? '' : params.kind);
			set('minTier', params.minTier);
			set('narrate', params.narrate ? '' : '0');
			set('avatar', params.avatar === '/avatars/cz.glb' ? '' : params.avatar);
			history.replaceState(null, '', u.toString());
		}

		async function mountAgent() {
			const cfgPart = `&type=pumpfun-feed&kind=${encodeURIComponent(params.kind)}` +
				(params.minTier ? `&minTier=${encodeURIComponent(params.minTier)}` : '') +
				(params.narrate ? '' : '&narrate=0');
			let modelHash = '&model=' + encodeURIComponent(params.avatar || '/avatars/cz.glb');
			const widgetId = 'wdgt_demo_pumpfun';
			if (params.asset) {
				try {
					const r = await fetch(`/api/agents/solana-card?asset=${encodeURIComponent(params.asset)}`);
					if (r.ok) {
						const card = await r.json();
						renderAgentCard(card);
						const avatarUrl = card?.identity?.avatar_url || card?.avatar_url;
						if (avatarUrl) modelHash = `&model=${encodeURIComponent(avatarUrl)}`;
					}
					const repR = await fetch(`/api/agents/solana-reputation?asset=${encodeURIComponent(params.asset)}&network=${params.network}`);
					if (repR.ok) renderSignals(await repR.json());
				} catch {}
			} else {
				$('agent-card').innerHTML = `<div class="empty">Custom avatar narrator. Paste a Solana asset pubkey above to bind a different agent.</div>`;
				$('signals-section').hidden = true;
			}
			iframe.src = `/app#widget=${widgetId}&kiosk=true${cfgPart}${modelHash}`;
		}

		function renderAgentCard(card) {
			const id = card?.identity || {};
			$('agent-card').innerHTML = `
				<div class="kv"><span>Name</span><strong>${escapeHtml(card?.name || '—')}</strong></div>
				<div class="kv"><span>Network</span><code>${escapeHtml(id.network || '—')}</code></div>
				<div class="kv"><span>Asset</span><code>${shortKey(id.asset_pubkey || '')}</code></div>
				${id.owner ? `<div class="kv"><span>Owner</span><code>${shortKey(id.owner)}</code></div>` : ''}
				${id.passport_url ? `<div class="kv"><span>Passport</span><a href="${attr(id.passport_url)}" target="_blank">open ↗</a></div>` : ''}
			`;
		}

		function renderSignals(rep) {
			const pf = rep?.pumpfun_signals || { count: 0, weight: 0, by_kind: {} };
			const section = $('signals-section');
			const el = $('signals');
			if (!pf.count) { section.hidden = true; return; }
			section.hidden = false;
			const cards = [
				`<div class="signal"><div class="v">${pf.count}</div><div class="l">total signals</div></div>`,
				`<div class="signal ${pf.weight < 0 ? 'neg' : ''}"><div class="v">${pf.weight >= 0 ? '+' : ''}${pf.weight.toFixed(2)}</div><div class="l">aggregate weight</div></div>`,
				...Object.entries(pf.by_kind).map(([k, info]) =>
					`<div class="signal ${info.weight < 0 ? 'neg' : ''}"><div class="v">${info.count}</div><div class="l">${escapeHtml(k.replace('_', ' '))}</div></div>`),
			];
			el.innerHTML = cards.join('');
		}

		// ── Live event feed (host-side, mirrors what the iframe receives) ────
		let es = null;
		const TIER_BADGE = { mega: '🔥🔥', influencer: '🔥', notable: '⭐' };
		const MAX_EVENTS = 30;

		function eventMatchesMint(ev) {
			if (!params.mint) return true;
			return ev?.mint === params.mint || ev?.token_mint === params.mint;
		}

		function fmtUsd(n) {
			if (n == null) return '';
			return '$' + Number(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
		}
		function fmtSol(n) {
			if (n == null) return '';
			return Number(n).toFixed(3) + ' SOL';
		}
		function timeAgo(ts) {
			if (!ts) return '';
			const s = Math.floor(Date.now() / 1000) - ts;
			if (s < 60) return s + 's ago';
			if (s < 3600) return Math.floor(s / 60) + 'm ago';
			return Math.floor(s / 3600) + 'h ago';
		}
		function toolLinks(mint) {
			const m = encodeURIComponent(mint);
			return [
				['pump.fun', `https://pump.fun/coin/${mint}`],
				['DEX', `https://dexscreener.com/solana/${mint}`],
				['Axiom', `https://axiom.trade/meme/${mint}`],
				['GMGN', `https://gmgn.ai/sol/token/${mint}`],
				['BullX', `https://bullx.io/terminal?chainId=1399811149&address=${mint}`],
				['Photon', `https://photon-sol.tinyastro.io/en/r/@bonk/${mint}`],
			].map(([label, url]) => `<a href="${attr(url)}" target="_blank" rel="noopener">${label}</a>`).join('');
		}

		function renderMint(ev) {
			const mint = ev.mint || '';
			const mcSol = ev.market_cap_sol != null ? Number(ev.market_cap_sol).toFixed(2) + ' SOL' : '';
			const mcUsd = ev.market_cap_usd != null ? fmtUsd(ev.market_cap_usd) : '';
			const mcStr = [mcUsd, mcSol].filter(Boolean).join(' / ');
			const buyStr = ev.initial_buy_sol ? `${fmtSol(ev.initial_buy_sol)}${ev.initial_buy_usd ? ' (' + fmtUsd(ev.initial_buy_usd) + ')' : ''}` : '';
			const social = [
				ev.twitter ? `<a href="https://twitter.com/${encodeURIComponent(ev.twitter.replace('@',''))}" target="_blank" rel="noopener">𝕏 ${escapeHtml(ev.twitter)}</a>` : '',
				ev.telegram ? `<a href="${attr(ev.telegram)}" target="_blank" rel="noopener">TG</a>` : '',
				ev.website ? `<a href="${attr(ev.website)}" target="_blank" rel="noopener">🌐</a>` : '',
			].filter(Boolean).join(' ');
			return `<div class="evt">
				<div class="evt-row">
					<span class="evt-kind">🌱 new token</span>
					<span class="evt-time">${escapeHtml(timeAgo(ev.created_at))}</span>
				</div>
				<div class="evt-title">${escapeHtml(ev.name || '—')} — $${escapeHtml(ev.symbol || '?')}</div>
				${ev.description ? `<div class="evt-desc">${escapeHtml(ev.description.slice(0, 100))}</div>` : ''}
				${mcStr ? `<div class="evt-amt">💎 MC: ${escapeHtml(mcStr)}${buyStr ? ' &nbsp;·&nbsp; initial: ' + escapeHtml(buyStr) : ''}</div>` : ''}
				<div class="evt-links">${toolLinks(mint)}${social ? ' ' + social : ''}</div>
				${ev.creator ? `<div class="evt-meta"><span>dev: <code>${shortKey(ev.creator)}</code></span></div>` : ''}
				<div class="evt-mint">${escapeHtml(mint)}</div>
				${ev.signature ? `<div class="evt-meta"><a href="https://solscan.io/tx/${encodeURIComponent(ev.signature)}" target="_blank" rel="noopener">TX ↗</a></div>` : ''}
			</div>`;
		}

		function renderGraduation(ev) {
			const mint = ev.mint || '';
			return `<div class="evt grad">
				<div class="evt-row"><span class="evt-kind">🎓 graduation → Raydium</span></div>
				<div class="evt-title">${escapeHtml(ev.name || ev.symbol || '—')}${ev.symbol ? ' — $' + escapeHtml(ev.symbol) : ''}</div>
				<div class="evt-links">${toolLinks(mint)}</div>
				<div class="evt-mint">${escapeHtml(mint)}</div>
				${ev.signature ? `<div class="evt-meta"><a href="https://solscan.io/tx/${encodeURIComponent(ev.signature)}" target="_blank" rel="noopener">TX ↗</a></div>` : ''}
			</div>`;
		}

		function renderClaim(ev) {
			const mint = ev.mint || ev.token_mint || '';
			const isFirst = ev.first_time_claim;
			const isFake = ev.fake_claim;
			const cls = isFake ? 'fake' : isFirst ? 'first' : '';
			const tier = ev.tier ? `${TIER_BADGE[ev.tier] || ''} ${ev.tier}` : '';
			const mcUsd = ev.usd_market_cap ?? ev.market_cap;
			const athUsd = ev.ath_market_cap ?? ev.ath;

			// Claim header
			let kindLabel = isFirst ? '🚨🚨🚨 FIRST CREATOR FEE CLAIM' : '💸 creator fee claim';

			// GitHub repo section
			const repoHtml = ev.repo_name ? `
				<div class="evt-repo">
					<div class="evt-repo-name">🐙 ${escapeHtml(ev.repo_name)}</div>
					${ev.repo_description ? `<div style="color:#8a8a9a;font-size:11px;margin-top:2px">${escapeHtml(ev.repo_description.slice(0,120))}</div>` : ''}
					<div class="evt-row2" style="margin-top:4px">
						${ev.repo_language ? `<span>🔤 ${escapeHtml(ev.repo_language)}</span>` : ''}
						${ev.repo_stars != null ? `<span>⭐ ${ev.repo_stars}</span>` : ''}
						${ev.repo_forks != null ? `<span>🍴 ${ev.repo_forks}</span>` : ''}
						${ev.repo_last_push ? `<span class="evt-stat">push ${escapeHtml(ev.repo_last_push)}</span>` : ''}
					</div>
					${ev.repo_topics?.length ? `<div class="evt-topics">${ev.repo_topics.map(t => `<span class="evt-topic">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
				</div>` : '';

			// GitHub dev section
			const ghUser = ev.github_user;
			const ghHtml = ghUser ? `
				<div class="evt-section">
					<div class="evt-gh">👨‍💻 <strong>${escapeHtml(ev.github_name || ghUser)}</strong> (<a href="https://github.com/${encodeURIComponent(ghUser)}" target="_blank" rel="noopener">@${escapeHtml(ghUser)}</a>)
					${ev.github_twitter ? ` &nbsp;·&nbsp; <a href="https://twitter.com/${encodeURIComponent(ev.github_twitter)}" target="_blank" rel="noopener">𝕏 ${escapeHtml(ev.github_twitter)}</a>` : ''}</div>
					<div class="evt-row2">
						${ev.github_repos != null ? `<span>📦 ${ev.github_repos} repos</span>` : ''}
						${ev.github_followers != null ? `<span>👁 ${ev.github_followers} followers</span>` : ''}
						${ev.github_account_age ? `<span class="evt-stat">${escapeHtml(ev.github_account_age)}</span>` : ''}
						${ev.github_location ? `<span class="evt-stat">📍 ${escapeHtml(ev.github_location)}</span>` : ''}
					</div>
					${ev.github_bio ? `<div class="evt-desc" style="margin-top:2px">${escapeHtml(ev.github_bio.slice(0,100))}</div>` : ''}
					${repoHtml}
				</div>` : '';

			// Creator token history
			const creatorTokens = ev.creator_tokens?.length
				? ev.creator_tokens.map(t => `${t.symbol ? '$' + escapeHtml(t.symbol) : '?'}${t.mc ? ' [' + fmtUsd(t.mc) + ']' : ''}`).join(' · ')
				: '';
			const creatorHtml = ev.creator_launches != null ? `
				<div class="evt-section">
					<div class="evt-gh">🧑‍💻 dev: <code>${shortKey(ev.claimer || ev.creator || '')}</code> &nbsp;·&nbsp; 🚀 ${ev.creator_launches} launches${ev.creator_graduated ? ' &nbsp;·&nbsp; 🎓 ' + ev.creator_graduated + ' graduated' : ''}</div>
					${creatorTokens ? `<div class="evt-desc" style="margin-top:2px">${creatorTokens}</div>` : ''}
				</div>` : '';

			// Trade links
			const tradeLinks = mint ? `<div class="evt-links">${toolLinks(mint)}</div>` : '';

			return `<div class="evt ${cls}">
				<div class="evt-row">
					<span class="evt-kind">${kindLabel}</span>
					${tier ? `<span class="evt-tier">${escapeHtml(tier)}</span>` : ''}
				</div>
				<div class="evt-title">${escapeHtml(ev.token_name || ev.name || '—')} — $${escapeHtml(ev.token_symbol || ev.symbol || '?')}</div>
				<div class="evt-row2">
					${mcUsd != null ? `<span>💎 MC: ${fmtUsd(mcUsd)}</span>` : ''}
					${ev.bonding_curve_pct != null ? `<span class="evt-stat">curve ${ev.bonding_curve_pct}%</span>` : ''}
					${athUsd != null ? `<span>🏆 ATH: ${fmtUsd(athUsd)}</span>` : ''}
					${ev.age ? `<span class="evt-stat">created ${escapeHtml(ev.age)}</span>` : ''}
				</div>
				<div class="evt-section">
					<div class="evt-row2">
						${ev.amount_sol != null ? `<span>💸 ${fmtSol(ev.amount_sol)}${ev.amount_usd != null ? ' (' + fmtUsd(ev.amount_usd) + ')' : ''}</span>` : ''}
						${ev.claim_number != null ? `<span class="evt-stat">claim #${ev.claim_number}</span>` : ''}
					</div>
					${ev.claim_type ? `<div class="evt-desc">${escapeHtml(ev.claim_type)}</div>` : ''}
					${ev.lifetime_sol != null ? `<div class="evt-desc">lifetime: ${fmtSol(ev.lifetime_sol)}${ev.lifetime_usd != null ? ' (' + fmtUsd(ev.lifetime_usd) + ')' : ''}</div>` : ''}
				</div>
				${ghHtml}
				${creatorHtml}
				${ev.signals ? `<div class="evt-section"><div class="evt-desc">⚡ ${escapeHtml(ev.signals)}</div></div>` : ''}
				${ev.ai_take ? `<div class="evt-desc evt-take" style="margin-top:6px">${escapeHtml(ev.ai_take)}</div>` : ''}
				${tradeLinks}
				<div class="evt-mint">${escapeHtml(mint)}</div>
				<div class="evt-meta">
					${ev.tx_signature || ev.signature ? `<a href="https://solscan.io/tx/${encodeURIComponent(ev.tx_signature || ev.signature)}" target="_blank" rel="noopener">TX ↗</a>` : ''}
					${mint ? `<a href="https://pump.fun/coin/${encodeURIComponent(mint)}" target="_blank" rel="noopener">pump.fun</a>` : ''}
				</div>
			</div>`;
		}

		function pushEvent(html) {
			const feed = $('feed');
			if (feed.querySelector('.empty')) feed.innerHTML = '';
			feed.insertAdjacentHTML('afterbegin', html);
			while (feed.children.length > MAX_EVENTS) feed.lastChild?.remove();
		}

		function connectFeed() {
			if (es) { try { es.close(); } catch {} }
			const qs = new URLSearchParams();
			qs.set('kind', params.kind);
			if (params.minTier) qs.set('minTier', params.minTier);
			setStatus('connecting', 'connecting…');
			es = new EventSource(`/api/agents/pumpfun-feed?${qs.toString()}`, { withCredentials: true });
			es.addEventListener('open', () => setStatus('live', 'live'));
			es.addEventListener('error', () => {
				if (es.readyState === EventSource.CLOSED) setStatus('down', 'disconnected');
				else setStatus('connecting', 'reconnecting…');
			});
			es.addEventListener('claim', (msg) => {
				const ev = safeJson(msg.data); if (!ev || !eventMatchesMint(ev)) return;
				pushEvent(renderClaim(ev));
			});
			es.addEventListener('graduation', (msg) => {
				const ev = safeJson(msg.data); if (!ev || !eventMatchesMint(ev)) return;
				pushEvent(renderGraduation(ev));
			});
			es.addEventListener('mint', (msg) => {
				const ev = safeJson(msg.data); if (!ev || !eventMatchesMint(ev)) return;
				pushEvent(renderMint(ev));
			});
		}

		function safeJson(s) { try { return JSON.parse(s); } catch { return null; } }
		function shortKey(s) { s = String(s || ''); return s.length > 12 ? `${s.slice(0,4)}…${s.slice(-4)}` : s; }
		function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
		function attr(s) { return escapeHtml(s); }

		// ── Filter changes apply instantly. Mint filter only re-filters; asset/kind/tier remount. ──
		$('ctl-mint').addEventListener('input', (e) => {
			params.mint = e.target.value.trim();
			syncURL();
			iframe.contentWindow?.postMessage({ type: 'pumpfun-feed:focus-mint', mint: params.mint || null }, '*');
		});

		$('ctl-narrate').addEventListener('click', (e) => {
			params.narrate = e.currentTarget.dataset.on !== '1';
			e.currentTarget.dataset.on = params.narrate ? '1' : '0';
			syncURL();
			iframe.contentWindow?.postMessage({ type: 'pumpfun-feed:set-narrate', on: params.narrate }, '*');
		});

		let kindTimer;
		const onFilterChange = () => {
			clearTimeout(kindTimer);
			kindTimer = setTimeout(() => {
				params.kind = $('ctl-kind').value;
				params.minTier = $('ctl-tier').value;
				params.asset = $('ctl-asset').value.trim();
				syncURL();
				connectFeed();
				mountAgent();
			}, 200);
		};
		$('ctl-kind').addEventListener('change', onFilterChange);
		$('ctl-tier').addEventListener('change', onFilterChange);
		$('ctl-asset').addEventListener('change', onFilterChange);

		// Initial load
		connectFeed();

		mountAgent();
	</script>
</body>
</html>
