<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D-Agent Embed Example</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
        }
        h1 {
            margin: 20px;
        }
        textarea {
            width: 80%;
            max-width: 500px;
            padding: 10px;
            font-family: monospace;
            white-space: pre;
            overflow-x: auto;
        }
        .container {
            width: 80%;
            height: 60%;
            max-width: 800px;
            border: 1px solid #ccc;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>3D-Agent Embed Example</h1>
    <p>Copy this HTML snippet to embed an agent on your website.</p>
    <textarea readonly rows="4"><iframe
    src="https://three.ws/agent/{YOUR_AGENT_ID}/embed"
    width="100%"
    height="100%"
    frameborder="0"
></iframe></textarea>
    
    <h2>Live Preview</h2>
    <div class="container">
        <iframe
            src="https://three.ws/agent/d1b244de-9728-4a96-a68f-a212f8666579/embed"
            width="100%"
            height="100%"
            frameborder="0"
        ></iframe>
    </div>
</body>
</html>
