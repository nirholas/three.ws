<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in with three.ws</title>
<link rel="icon" href="/favicon.ico" />
<style>
	:root {
		color-scheme: light dark;
		--bg: #0c0d10;
		--bg-elev: #15171c;
		--border: #26282f;
		--text: #f2f3f5;
		--text-dim: #8a8d96;
		--accent: #6aa6ff;
		--accent-strong: #4d8df0;
		--danger: #ef4444;
	}
	* { box-sizing: border-box; }
	html, body {
		margin: 0;
		padding: 0;
		background: var(--bg);
		color: var(--text);
		font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
		min-height: 100vh;
	}
	.wrap {
		max-width: 460px;
		margin: 0 auto;
		padding: 28px 20px 60px;
	}
	.brand {
		font-size: 13px;
		letter-spacing: 0.06em;
		text-transform: uppercase;
		color: var(--text-dim);
		margin-bottom: 18px;
	}
	.brand strong { color: var(--text); font-weight: 600; }
	h1 {
		font-size: 22px;
		font-weight: 600;
		margin: 0 0 8px;
		line-height: 1.3;
	}
	.tenant {
		color: var(--accent);
		font-weight: 600;
	}
	.lede {
		color: var(--text-dim);
		font-size: 14px;
		line-height: 1.55;
		margin: 0 0 24px;
	}
	.avatars {
		display: grid;
		grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
		gap: 10px;
		margin: 0 0 20px;
	}
	.avatar-card {
		background: var(--bg-elev);
		border: 1px solid var(--border);
		border-radius: 10px;
		padding: 8px;
		cursor: pointer;
		text-align: center;
		transition: border-color 120ms, transform 120ms;
	}
	.avatar-card.selected {
		border-color: var(--accent);
		box-shadow: 0 0 0 1px var(--accent) inset;
	}
	.avatar-card:hover { transform: translateY(-1px); }
	.avatar-card img {
		width: 100%;
		aspect-ratio: 1 / 1;
		object-fit: cover;
		border-radius: 6px;
		background: #1d2026;
		display: block;
	}
	.avatar-card .name {
		font-size: 12px;
		margin-top: 6px;
		color: var(--text);
		overflow: hidden;
		text-overflow: ellipsis;
		white-space: nowrap;
	}
	.actions {
		display: flex;
		gap: 8px;
		margin-top: 22px;
	}
	button {
		flex: 1;
		padding: 11px 14px;
		border: 1px solid var(--border);
		background: var(--bg-elev);
		color: var(--text);
		border-radius: 9px;
		font: inherit;
		font-weight: 600;
		cursor: pointer;
		transition: background 120ms, border-color 120ms;
	}
	button.primary {
		background: var(--accent);
		border-color: var(--accent);
		color: #06203b;
	}
	button.primary:hover { background: var(--accent-strong); }
	button:disabled { opacity: 0.5; cursor: not-allowed; }
	.empty, .error {
		padding: 14px;
		background: var(--bg-elev);
		border: 1px solid var(--border);
		border-radius: 9px;
		font-size: 14px;
		color: var(--text-dim);
		line-height: 1.5;
	}
	.empty a { color: var(--accent); text-decoration: none; }
	.empty a:hover { text-decoration: underline; }
	.error { border-color: var(--danger); color: var(--danger); }
	.scopes {
		margin: 18px 0;
		padding: 12px 14px;
		background: var(--bg-elev);
		border: 1px solid var(--border);
		border-radius: 9px;
		font-size: 13px;
		color: var(--text-dim);
	}
	.scopes ul { margin: 6px 0 0; padding-left: 18px; }
	.scopes li { margin: 3px 0; }
	.signin-redir {
		display: block;
		margin-top: 20px;
		color: var(--accent);
		font-size: 14px;
		text-decoration: none;
	}
</style>
</head>
<body>
<div class="wrap" id="root">
	<div class="brand"><strong>three.ws</strong> · Persona Hub</div>
	<h1 id="title">Sign in with three.ws</h1>
	<p class="lede" id="lede">Loading…</p>
	<div id="content"></div>
</div>

<script type="module">
	const params = new URLSearchParams(location.search);
	const tenantParam = params.get('tenant') || '';
	const stateParam = params.get('state') || '';

	const $title = document.getElementById('title');
	const $lede = document.getElementById('lede');
	const $content = document.getElementById('content');

	function tenantHostLabel(origin) {
		try { return new URL(origin).host; } catch (_) { return origin; }
	}

	function renderError(msg) {
		$content.innerHTML = `<div class="error">${msg}</div>`;
	}

	function renderEmpty() {
		$content.innerHTML = `
			<div class="empty">
				You don't have a three.ws avatar yet.
				<br><br>
				<a href="/create?return_to=${encodeURIComponent(location.href)}">Create one first →</a>
			</div>
		`;
	}

	function renderConsent({ avatars, tenantOrigin }) {
		const host = tenantHostLabel(tenantOrigin);
		$title.innerHTML = `Authorize <span class="tenant">${host}</span>`;
		$lede.textContent = `Choose the avatar to share. ${host} will receive its URL and thumbnail. Your other avatars stay private.`;

		const cards = avatars.map((a, i) => `
			<div class="avatar-card ${i === 0 ? 'selected' : ''}" data-id="${a.id}">
				${a.thumbnail_url ? `<img src="${a.thumbnail_url}" alt="">` : `<img alt="">`}
				<div class="name">${a.name || 'Untitled'}</div>
			</div>
		`).join('');

		$content.innerHTML = `
			<div class="avatars">${cards}</div>
			<div class="scopes">
				${host} will be granted:
				<ul>
					<li>persona:read — your three.ws user id</li>
					<li>avatar:read — selected avatar URL + thumbnail</li>
				</ul>
				Valid for 24 hours.
			</div>
			<div class="actions">
				<button id="cancel">Cancel</button>
				<button class="primary" id="authorize">Authorize</button>
			</div>
		`;

		let selectedId = avatars[0].id;
		$content.querySelectorAll('.avatar-card').forEach((el) => {
			el.addEventListener('click', () => {
				$content.querySelectorAll('.avatar-card').forEach((c) => c.classList.remove('selected'));
				el.classList.add('selected');
				selectedId = el.dataset.id;
			});
		});

		document.getElementById('cancel').addEventListener('click', () => {
			postToOpener({ event: 'cancelled' });
			window.close();
		});

		document.getElementById('authorize').addEventListener('click', async () => {
			const btn = document.getElementById('authorize');
			btn.disabled = true;
			btn.textContent = 'Authorizing…';
			try {
				const res = await fetch('/api/auth/persona/issue', {
					method: 'POST',
					credentials: 'include',
					headers: { 'content-type': 'application/json' },
					body: JSON.stringify({ tenant_origin: tenantOrigin, avatar_id: selectedId }),
				});
				const data = await res.json();
				if (!res.ok) {
					renderError(data.error_description || 'authorization failed');
					return;
				}
				postToOpener({ event: 'authorized', token: data.token, avatar: data.avatar, expires_in: data.expires_in });
				window.close();
			} catch (err) {
				renderError(err.message || 'authorization failed');
			}
		});
	}

	function postToOpener(payload) {
		if (!window.opener) return;
		try {
			window.opener.postMessage({ source: 'three-ws-persona', state: stateParam, ...payload }, tenantParam);
		} catch (_) {}
	}

	async function start() {
		if (!tenantParam) {
			renderError('missing ?tenant= query param — embed origin required');
			return;
		}
		let tenantOrigin;
		try {
			const u = new URL(tenantParam);
			tenantOrigin = `${u.protocol}//${u.host}`;
		} catch (_) {
			renderError('invalid tenant origin');
			return;
		}

		let me;
		try {
			const res = await fetch('/api/auth/persona/me', { credentials: 'include' });
			if (res.status === 401) {
				location.href = `/login?return_to=${encodeURIComponent(location.href)}`;
				return;
			}
			me = await res.json();
			if (!res.ok) {
				renderError(me.error_description || 'failed to load avatars');
				return;
			}
		} catch (err) {
			renderError(err.message || 'network error');
			return;
		}

		if (!me.avatars?.length) {
			renderEmpty();
			return;
		}

		renderConsent({ avatars: me.avatars, tenantOrigin });
	}

	start();
</script>
</body>
</html>
