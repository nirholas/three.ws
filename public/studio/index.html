<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Widget Studio - three.ws</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/home.css" />
  <link rel="icon" href="/favicon.ico" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #6a5cff;
      --border: #2a2a36;
      --bg: #0a0a0f;
      --panel: #14141c;
      --muted: #888;
      --header-h: 64px;
    }
    body {
      background-color: var(--bg);
      color: #eee;
      font-family: 'Inter', sans-serif;
      padding-top: var(--header-h);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
    }
    .main-content {
      flex: 1;
      display: flex;
      padding: 2rem;
      gap: 2rem;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }
    .config-panel {
      width: 380px;
      flex-shrink: 0;
      background-color: var(--panel);
      padding: 1.5rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      height: fit-content;
    }
    .preview-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .preview-box {
      flex: 1;
      min-height: 400px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: 
        linear-gradient(45deg, #1a1a24 25%, transparent 25%), 
        linear-gradient(-45deg, #1a1a24 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #1a1a24 75%),
        linear-gradient(-45deg, transparent 75%, #1a1a24 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      padding: 2rem;
      transition: background-color 0.3s ease;
    }
    .preview-box.light {
        background-color: #f0f0f0;
    }
    .preview-box.dark {
        background-color: #111;
    }
    .code-box {
      background-color: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
    }
    h1, h2, h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      margin-top: 0;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #ccc;
    }
    input[type="text"],
    select {
      width: 100%;
      box-sizing: border-box;
      background-color: #0a0a0f;
      border: 1px solid var(--border);
      color: #eee;
      padding: 0.6rem 0.8rem;
      border-radius: 6px;
      font-size: 1rem;
    }
    input[type="text"]:focus,
    select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(106, 92, 255, 0.3);
    }
    .toggle-group {
      display: flex;
      gap: 0.5rem;
    }
    .toggle-group button {
      flex: 1;
      padding: 0.6rem;
      background-color: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }
    .toggle-group button:hover {
        border-color: #4a4a58;
        color: #fff;
    }
    .toggle-group button.active {
      background-color: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    textarea {
      width: 100%;
      box-sizing: border-box;
      height: 150px;
      background-color: #0a0a0f;
      border: 1px solid var(--border);
      color: #eee;
      padding: 0.8rem;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.9rem;
      resize: none;
    }
    .copy-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background-color: #2a2a36;
      color: #ccc;
      border: none;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .copy-btn:hover {
      background-color: #3a3a4a;
    }
    .code-wrapper {
      position: relative;
    }
    #widget-preview-container {
      transition: all 0.2s ease-in-out;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body class="home-page">
  <header>
		<h1>
			<a href="/" aria-label="three.ws home"><img class="wordmark-logo" src="/three.svg" alt="" aria-hidden="true" /><span class="wordmark-dot" aria-hidden="true"></span>three.ws</a>
		</h1>
		<nav class="home-nav" aria-label="Primary">
			<ul class="nav-root" role="menubar">
				<li class="nav-item" role="none"><a href="/discover" role="menuitem">Discover</a></li>
        <li class="nav-item" role="none"><a href="/studio" role="menuitem">Widget Studio</a></li>
				<li class="nav-item" role="none"><a href="/chat" role="menuitem">Chat</a></li>
				<li class="nav-item" role="none"><a href="/docs" role="menuitem">Docs</a></li>
				<li class="nav-item" role="none"><a href="/login" class="nav-cta" id="home-nav-cta" role="menuitem">Get started</a></li>
			</ul>
		</nav>
	</header>

  <main class="main-content">
    <aside class="config-panel">
      <h2>Widget Studio</h2>
      
      <div class="form-group">
        <label for="agent-id">Agent ID</label>
        <input type="text" id="agent-id" value="041cb44a-3c58-4d56-b083-d5234563456a">
      </div>

      <div class="form-group">
        <label>Preview Background</label>
        <div class="toggle-group" id="bg-selector">
          <button class="active" data-value="transparent">Transparent</button>
          <button data-value="dark">Dark</button>
          <button data-value="light">Light</button>
        </div>
      </div>

      <div class="form-group">
        <label>Nameplate</label>
        <div class="toggle-group" id="nameplate-selector">
          <button class="active" data-value="true">Visible</button>
          <button data-value="false">Hidden</button>
        </div>
      </div>

      <div class="form-group">
        <label for="widget-width">Width</label>
        <input type="text" id="widget-width" value="100%">
      </div>
      
      <div class="form-group">
        <label for="widget-height">Height</label>
        <input type="text" id="widget-height" value="480px">
      </div>

    </aside>

    <section class="preview-area">
      <div class="preview-box" id="preview-box">
        <div id="widget-preview-container" style="width: 100%; height: 480px;">
          <!-- The widget will be dynamically inserted here -->
        </div>
      </div>
      <div class="code-box">
        <h3>Embed Code</h3>
        <div class="code-wrapper">
          <textarea id="code-snippet" readonly></textarea>
          <button class="copy-btn" id="copy-button">Copy</button>
        </div>
      </div>
    </section>
  </main>
  
  <script src="/dist/widget.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const agentIdInput = document.getElementById('agent-id');
      const bgSelector = document.getElementById('bg-selector');
      const nameplateSelector = document.getElementById('nameplate-selector');
      const widthInput = document.getElementById('widget-width');
      const heightInput = document.getElementById('widget-height');
      const previewContainer = document.getElementById('widget-preview-container');
      const previewBox = document.getElementById('preview-box');
      const codeSnippet = document.getElementById('code-snippet');
      const copyButton = document.getElementById('copy-button');

      function updateWidget() {
        const agentId = agentIdInput.value.trim();
        const background = bgSelector.querySelector('.active').dataset.value;
        const nameplate = nameplateSelector.querySelector('.active').dataset.value;
        const width = widthInput.value.trim();
        const height = heightInput.value.trim();

        if (!agentId) {
          previewContainer.innerHTML = '<p style="color: var(--muted); text-align: center;">Please enter an Agent ID</p>';
          codeSnippet.value = '';
          return;
        }

        // Update preview container style
        previewContainer.style.width = width;
        previewContainer.style.height = height;

        // Update preview box background
        previewBox.classList.remove('light', 'dark');
        if (background === 'light' || background === 'dark') {
            previewBox.classList.add(background);
        }

        // Determine widget background for the actual widget
        const widgetBackground = (background === 'transparent') ? 'transparent' : 'transparent'; // Let the host page background show through

        // Create and update widget element
        const widgetElement = document.createElement('div');
        widgetElement.className = 'threews-widget';
        widgetElement.dataset.agentId = agentId;
        
        // Use the selected background for the iframe for accurate preview
        const widgetBgParam = bgSelector.querySelector('.active').dataset.value;
        if(widgetBgParam !== 'transparent') {
            widgetElement.dataset.background = widgetBgParam;
        }

        if (nameplate === 'false') {
          widgetElement.dataset.nameplate = nameplate;
        }
        
        previewContainer.innerHTML = '';
        previewContainer.appendChild(widgetElement);

        // Manually trigger initialization if widget.js is already loaded
        if (window.initializeWidget) {
            window.initializeWidget(widgetElement);
        }

        // Update code snippet
        let snippet = `<div class="threews-widget" data-agent-id="${agentId}"`;
        if (widgetBgParam !== 'transparent') {
          snippet += ` data-background="${widgetBgParam}"`;
        }
        if (nameplate === 'false') {
          snippet += ` data-nameplate="false"`;
        }
        snippet += ` style="width: ${width}; height: ${height};"></div>\n`;
        snippet += `<script src="https://3d-agent.vercel.app/dist/widget.js" defer><\/script>`;
        codeSnippet.value = snippet;
      }

      function setupToggle(container) {
        container.addEventListener('click', (e) => {
          if (e.target.tagName === 'BUTTON') {
            container.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
            updateWidget();
          }
        });
      }

      agentIdInput.addEventListener('input', updateWidget);
      widthInput.addEventListener('input', updateWidget);
      heightInput.addEventListener('input', updateWidget);

      setupToggle(bgSelector);
      setupToggle(nameplateSelector);

      copyButton.addEventListener('click', () => {
        codeSnippet.select();
        document.execCommand('copy');
        copyButton.textContent = 'Copied!';
        setTimeout(() => {
          copyButton.textContent = 'Copy';
        }, 2000);
      });

      // Initial call
      updateWidget();
    });
  </script>
</body>
</html>
