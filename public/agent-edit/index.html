<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>Edit Persona · three.ws</title>
		<link rel="icon" href="/favicon.ico" />
		<style>
			:root {
				color-scheme: dark;
				--accent: #6a5cff;
				--accent2: #ff5ca8;
				--border: #22222e;
				--bg: #0b0b10;
				--panel: #14141c;
			}
			* {
				box-sizing: border-box;
			}
			body {
				font:
					15px/1.55 -apple-system,
					system-ui,
					Segoe UI,
					Roboto,
					sans-serif;
				color: #eee;
				margin: 0;
				background: var(--bg);
				min-height: 100vh;
			}
			a {
				color: #9a8cff;
				text-decoration: none;
			}

			header {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 12px 24px;
				border-bottom: 1px solid var(--border);
				position: sticky;
				top: 0;
				background: var(--bg);
				z-index: 10;
			}
			.header-left {
				display: flex;
				align-items: center;
				gap: 14px;
			}
			.brand {
				font-weight: 600;
				letter-spacing: -0.01em;
				color: #eee;
				text-decoration: none;
			}
			.header-title {
				font-size: 14px;
				color: #888;
			}
			.header-actions {
				display: flex;
				gap: 8px;
				align-items: center;
			}

			.layout {
				display: grid;
				grid-template-columns: 1fr 440px;
				height: calc(100vh - 53px);
			}
			.preview-pane {
				border-right: 1px solid var(--border);
				position: relative;
				background: #080810;
			}
			.preview-pane iframe {
				width: 100%;
				height: 100%;
				border: 0;
				display: block;
			}
			.preview-loading {
				position: absolute;
				inset: 0;
				display: grid;
				place-items: center;
				color: #555;
				font-size: 13px;
			}

			.editor-pane {
				overflow-y: auto;
				padding: 22px 24px 60px;
			}

			h2 {
				font-size: 16px;
				font-weight: 600;
				margin: 0 0 4px;
			}
			.sub {
				color: #888;
				font-size: 13px;
				margin: 0 0 20px;
			}

			.form-group {
				margin-bottom: 18px;
			}
			label {
				display: block;
				font-size: 13px;
				font-weight: 500;
				color: #bbb;
				margin-bottom: 6px;
			}
			.label-row {
				display: flex;
				justify-content: space-between;
				align-items: baseline;
			}
			.char-count {
				font-size: 11px;
				color: #555;
			}
			input[type='text'],
			textarea,
			select {
				width: 100%;
				background: #0f0f17;
				border: 1px solid var(--border);
				color: #eee;
				padding: 9px 11px;
				border-radius: 8px;
				font-size: 14px;
				font-family: inherit;
			}
			input[type='text']:focus,
			textarea:focus,
			select:focus {
				outline: none;
				border-color: var(--accent);
			}
			textarea {
				resize: vertical;
			}
			textarea.mono {
				font-family:
					ui-monospace,
					SF Mono,
					Menlo,
					monospace;
				font-size: 13px;
			}

			.slider-wrap {
				display: flex;
				align-items: center;
				gap: 10px;
			}
			.slider-label {
				font-size: 11px;
				color: #666;
				white-space: nowrap;
			}
			input[type='range'] {
				flex: 1;
				accent-color: var(--accent);
			}
			.slider-value {
				font-size: 12px;
				color: #aaa;
				min-width: 36px;
				text-align: right;
			}

			.radio-group {
				display: flex;
				gap: 10px;
			}
			.radio-group label {
				display: flex;
				align-items: center;
				gap: 6px;
				font-weight: 400;
				color: #ccc;
				cursor: pointer;
			}
			.radio-group input {
				width: auto;
				accent-color: var(--accent);
			}

			.catchphrase-list {
				display: flex;
				flex-direction: column;
				gap: 6px;
			}
			.catchphrase-row {
				display: flex;
				gap: 6px;
			}
			.catchphrase-row input {
				flex: 1;
			}
			.catchphrase-row button {
				padding: 0 10px;
				background: #1a1a24;
				border: 1px solid var(--border);
				color: #888;
				border-radius: 8px;
				cursor: pointer;
				font-size: 16px;
				line-height: 1;
			}
			.catchphrase-row button:hover {
				color: #fff;
				border-color: #444;
			}
			.add-catchphrase {
				margin-top: 6px;
				background: none;
				border: 1px dashed var(--border);
				color: #666;
				border-radius: 8px;
				padding: 7px;
				width: 100%;
				cursor: pointer;
				font-size: 13px;
			}
			.add-catchphrase:hover {
				border-color: #555;
				color: #aaa;
			}

			.chip-input-wrap {
				display: flex;
				flex-wrap: wrap;
				gap: 6px;
				background: #0f0f17;
				border: 1px solid var(--border);
				border-radius: 8px;
				padding: 7px 9px;
				min-height: 40px;
			}
			.chip-input-wrap:focus-within {
				border-color: var(--accent);
			}
			.chip {
				display: inline-flex;
				align-items: center;
				gap: 4px;
				background: #20202c;
				border: 1px solid #2c2c3e;
				border-radius: 99px;
				padding: 2px 8px 2px 10px;
				font-size: 12px;
				color: #ccc;
			}
			.chip button {
				background: none;
				border: 0;
				color: #888;
				cursor: pointer;
				font-size: 13px;
				line-height: 1;
				padding: 0 1px;
			}
			.chip button:hover {
				color: #ff5c5c;
			}
			.chip-text-input {
				flex: 1;
				min-width: 80px;
				background: none;
				border: 0;
				color: #eee;
				font-size: 13px;
				padding: 2px 3px;
				outline: none;
			}

			.templates {
				display: flex;
				gap: 8px;
				margin-bottom: 20px;
				flex-wrap: wrap;
			}
			.template-btn {
				padding: 7px 13px;
				background: #14141c;
				border: 1px solid var(--border);
				color: #aaa;
				border-radius: 99px;
				cursor: pointer;
				font-size: 13px;
				font-family: inherit;
			}
			.template-btn:hover {
				border-color: #6a5cff;
				color: #fff;
			}

			.section-divider {
				border: 0;
				border-top: 1px solid var(--border);
				margin: 22px 0;
			}

			.btn {
				padding: 9px 18px;
				border-radius: 9px;
				border: 0;
				font-size: 13px;
				font-weight: 600;
				cursor: pointer;
				background: var(--accent);
				color: #fff;
			}
			.btn:hover {
				filter: brightness(1.1);
			}
			.btn:disabled {
				opacity: 0.5;
				cursor: not-allowed;
				filter: none;
			}
			.btn.sec {
				background: #1e1e2c;
				color: #ccc;
				border: 1px solid var(--border);
			}
			.btn.sec:hover {
				background: #252534;
			}

			.toast {
				position: fixed;
				bottom: 24px;
				left: 50%;
				transform: translateX(-50%);
				background: #1a1a2e;
				border: 1px solid var(--accent);
				color: #eee;
				padding: 10px 20px;
				border-radius: 10px;
				font-size: 13px;
				z-index: 100;
				opacity: 0;
				transition: opacity 0.2s;
				pointer-events: none;
			}
			.toast.show {
				opacity: 1;
			}
			.toast.err {
				border-color: #cc4040;
				background: #1e1010;
			}

			.forbidden {
				display: grid;
				place-items: center;
				height: 100%;
				color: #888;
				font-size: 14px;
				text-align: center;
				padding: 40px;
			}
			.forbidden h2 {
				color: #ff5c5c;
				margin-bottom: 8px;
			}

			.reset-btn {
				font-size: 12px;
				color: #888;
				background: none;
				border: 0;
				cursor: pointer;
				text-decoration: underline;
			}
			.reset-btn:hover {
				color: #aaa;
			}

			/* ── Voice picker ──────────────────────────────────────────────────────── */
			.vp-toggle {
				display: flex;
				gap: 6px;
				margin-bottom: 10px;
			}
			.vp-toggle-btn {
				flex: 1;
				padding: 7px;
				background: #0f0f17;
				border: 1px solid var(--border);
				color: #888;
				border-radius: 8px;
				cursor: pointer;
				font-size: 13px;
				font-family: inherit;
				text-align: center;
				transition:
					background 0.15s,
					border-color 0.15s,
					color 0.15s;
			}
			.vp-toggle-btn.active {
				background: rgba(106, 92, 255, 0.15);
				border-color: rgba(106, 92, 255, 0.5);
				color: #eee;
			}
			.vp-toggle-btn:disabled {
				opacity: 0.35;
				cursor: not-allowed;
			}
			.vp-list {
				border: 1px solid var(--border);
				border-radius: 8px;
				max-height: 260px;
				overflow-y: auto;
			}
			.vp-group-label {
				padding: 4px 10px;
				font-size: 11px;
				color: rgba(255, 255, 255, 0.2);
				text-transform: uppercase;
				letter-spacing: 0.07em;
				background: rgba(255, 255, 255, 0.02);
				border-bottom: 1px solid rgba(255, 255, 255, 0.04);
			}
			.vp-item {
				display: flex;
				align-items: center;
				gap: 8px;
				padding: 8px 10px;
				border-bottom: 1px solid rgba(255, 255, 255, 0.04);
				cursor: pointer;
				transition: background 0.1s;
			}
			.vp-item:last-child {
				border-bottom: none;
			}
			.vp-item:hover {
				background: rgba(255, 255, 255, 0.04);
			}
			.vp-item.selected {
				background: rgba(106, 92, 255, 0.1);
			}
			.vp-radio {
				width: 13px;
				height: 13px;
				border-radius: 50%;
				border: 1.5px solid #555;
				flex-shrink: 0;
				position: relative;
			}
			.vp-item.selected .vp-radio {
				border-color: var(--accent);
				background: var(--accent);
			}
			.vp-item.selected .vp-radio::after {
				content: '';
				width: 5px;
				height: 5px;
				border-radius: 50%;
				background: #fff;
				position: absolute;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
			}
			.vp-name {
				flex: 1;
				font-size: 13px;
				color: #ccc;
			}
			.vp-meta {
				font-size: 11px;
				color: #555;
			}
			.vp-preview-btn {
				background: none;
				border: 1px solid var(--border);
				color: #666;
				font-size: 11px;
				padding: 3px 8px;
				border-radius: 5px;
				cursor: pointer;
				font-family: inherit;
				white-space: nowrap;
			}
			.vp-preview-btn:hover {
				color: #ccc;
				border-color: #444;
			}
			.vp-preview-btn:disabled {
				opacity: 0.4;
				cursor: not-allowed;
			}
			.vp-empty {
				padding: 18px;
				text-align: center;
				color: #555;
				font-size: 13px;
			}
		</style>
	</head>
	<body>
		<header>
			<div class="header-left">
				<a class="brand" href="/">three.ws</a>
				<span class="header-title" id="header-title">Edit Persona</span>
			</div>
			<div class="header-actions">
				<a id="view-link" href="#" class="btn sec" style="text-decoration: none"
					>View page →</a
				>
				<button id="save-btn" class="btn" disabled>Save</button>
			</div>
		</header>

		<div class="layout" id="layout" style="display: none">
			<div class="preview-pane">
				<div class="preview-loading" id="preview-loading">Loading preview…</div>
				<iframe id="preview-frame" title="Agent preview" style="display: none"></iframe>
			</div>
			<div class="editor-pane" id="editor-pane">
				<h2>Persona</h2>
				<p class="sub">Shape how your agent speaks, thinks, and presents itself.</p>

				<div class="templates" id="templates-row"></div>

				<div class="form-group">
					<div class="label-row">
						<label for="f-name">Name</label>
						<span class="char-count" id="cnt-name">0/40</span>
					</div>
					<input
						type="text"
						id="f-name"
						maxlength="40"
						placeholder="My Agent"
						autocomplete="off"
					/>
				</div>

				<div class="form-group">
					<div class="label-row">
						<label for="f-bio">Bio</label>
						<span class="char-count" id="cnt-bio">0/280</span>
					</div>
					<textarea
						id="f-bio"
						rows="3"
						maxlength="280"
						placeholder="A short description shown on your agent's public page."
					></textarea>
				</div>

				<div class="form-group">
					<div class="label-row">
						<label for="f-system-prompt">System prompt</label>
						<span>
							<span class="char-count" id="cnt-system-prompt">0/2000</span>
							<button
								class="reset-btn"
								id="reset-prompt-btn"
								style="margin-left: 8px"
							>
								Reset to template
							</button>
						</span>
					</div>
					<textarea
						id="f-system-prompt"
						class="mono"
						rows="7"
						maxlength="2000"
						placeholder="Instructions for how the agent should behave. Prepended to the LLM system prompt."
					></textarea>
				</div>

				<div class="form-group">
					<label
						>Catchphrases
						<span style="color: #555; font-weight: 400">(≤ 5)</span></label
					>
					<div class="catchphrase-list" id="catchphrase-list"></div>
					<button class="add-catchphrase" id="add-catchphrase-btn" style="display: none">
						+ Add catchphrase
					</button>
				</div>

				<hr class="section-divider" />

				<div class="form-group">
					<label>Sentiment bias</label>
					<div class="slider-wrap">
						<span class="slider-label">stoic</span>
						<input
							type="range"
							id="f-sentiment-bias"
							min="-1"
							max="1"
							step="0.05"
							value="0"
						/>
						<span class="slider-label">effusive</span>
						<span class="slider-value" id="bias-value">0.00</span>
					</div>
				</div>

				<div class="form-group" id="voice-picker-group">
					<label>Voice</label>
					<!-- populated by initVoicePicker() in edit.js -->
				</div>

				<div class="form-group">
					<label>Do-not-say list</label>
					<div class="chip-input-wrap" id="dns-wrap">
						<input
							class="chip-text-input"
							id="dns-input"
							placeholder="Type a word and press Enter…"
						/>
					</div>
				</div>
			</div>
		</div>

		<div id="forbidden-screen" style="display: none" class="forbidden">
			<div>
				<h2>Access denied</h2>
				<p>You don't own this agent.</p>
				<a href="/dashboard">← Back to dashboard</a>
			</div>
		</div>

		<div
			id="loading-screen"
			style="
				display: grid;
				place-items: center;
				height: calc(100vh - 53px);
				color: #555;
				font-size: 14px;
			"
		>
			Loading…
		</div>

		<div class="toast" id="toast"></div>

		<script type="module" src="./edit.js"></script>
	</body>
</html>
