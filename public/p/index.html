<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>three.ws launchpad</title>
		<meta name="description" content="A 3D-hosted launchpad built on three.ws" />
		<link rel="icon" type="image/svg+xml" href="/three.svg" />
		<style>
			* { box-sizing: border-box; }
			html, body { margin: 0; padding: 0; min-height: 100%; }
			body {
				font: 16px/1.5 system-ui, -apple-system, 'Segoe UI', sans-serif;
				color: var(--page-fg, #0f172a);
				background: var(--page-bg, #ffffff);
				transition: background 0.2s, color 0.2s;
			}
			.page {
				min-height: 100vh;
				display: flex;
				flex-direction: column;
			}
			.page.dark { --page-bg: #0b0d10; --page-fg: #f4f4f5; }
			header.page-header {
				padding: 22px 32px;
				display: flex;
				justify-content: space-between;
				align-items: center;
				border-bottom: 1px solid rgba(0,0,0,0.06);
			}
			.page.dark header.page-header { border-bottom-color: rgba(255,255,255,0.08); }
			.brand { display: flex; align-items: center; gap: 10px; font-weight: 700; }
			.brand .swatch {
				width: 20px; height: 20px; border-radius: 6px;
				background: var(--brand, #6366f1);
			}
			.links { display: flex; gap: 20px; font-size: 14px; }
			.links a { color: inherit; text-decoration: none; opacity: 0.8; }
			.links a:hover { opacity: 1; color: var(--brand, #6366f1); }
			.hero {
				flex: 1;
				display: grid;
				grid-template-columns: 1.1fr 0.9fr;
				gap: 40px;
				padding: 56px 32px 80px;
				max-width: 1180px;
				margin: 0 auto;
				width: 100%;
				align-items: center;
			}
			@media (max-width: 820px) {
				.hero { grid-template-columns: 1fr; }
				.avatar-stage { min-height: 360px; }
			}
			.hero-copy h1 {
				font-size: clamp(32px, 5vw, 56px);
				line-height: 1.05;
				letter-spacing: -0.02em;
				margin: 0 0 18px;
			}
			.hero-copy p.tagline {
				font-size: 19px;
				line-height: 1.55;
				color: rgba(15, 23, 42, 0.7);
				margin: 0 0 32px;
			}
			.page.dark .hero-copy p.tagline { color: rgba(244, 244, 245, 0.75); }
			.cta-row {
				display: flex;
				flex-wrap: wrap;
				align-items: center;
				gap: 12px;
			}
			button.cta {
				padding: 16px 26px;
				font: inherit;
				font-size: 16px;
				font-weight: 600;
				color: #fff;
				background: var(--brand, #6366f1);
				border: 0;
				border-radius: 14px;
				cursor: pointer;
				box-shadow: 0 10px 30px -12px var(--brand, #6366f1);
				transition: transform 0.12s, filter 0.12s;
			}
			button.cta:hover { filter: brightness(1.06); }
			button.cta:active { transform: scale(0.98); }
			button.cta:disabled { opacity: 0.6; cursor: not-allowed; }
			.price-chip {
				font-size: 14px;
				color: rgba(15, 23, 42, 0.6);
			}
			.page.dark .price-chip { color: rgba(244, 244, 245, 0.6); }
			.avatar-stage {
				position: relative;
				min-height: 480px;
				border-radius: 22px;
				background: linear-gradient(160deg, var(--brand, #6366f1) 0%, #1e1b4b 100%);
				overflow: hidden;
				box-shadow: 0 30px 80px -30px rgba(0,0,0,0.4);
			}
			.avatar-stage agent-3d {
				position: absolute;
				inset: 0;
				width: 100%;
				height: 100%;
			}
			footer.page-footer {
				padding: 18px 32px;
				font-size: 13px;
				color: rgba(15, 23, 42, 0.55);
				text-align: center;
				border-top: 1px solid rgba(0,0,0,0.05);
			}
			.page.dark footer.page-footer { color: rgba(244, 244, 245, 0.5); border-top-color: rgba(255,255,255,0.05); }
			footer.page-footer a { color: inherit; }
			.modal-backdrop {
				position: fixed; inset: 0;
				background: rgba(0,0,0,0.55);
				display: flex; align-items: center; justify-content: center;
				z-index: 100;
				padding: 20px;
			}
			.modal {
				background: #fff;
				color: #0f172a;
				border-radius: 16px;
				padding: 28px;
				max-width: 460px;
				width: 100%;
				box-shadow: 0 30px 60px -10px rgba(0,0,0,0.5);
			}
			.modal h2 { margin: 0 0 8px; font-size: 22px; }
			.modal p { margin: 0 0 16px; color: #475569; line-height: 1.5; }
			.modal .field { margin-bottom: 12px; }
			.modal .field label { display: block; font-size: 12px; color: #64748b; margin-bottom: 4px; }
			.modal .field input {
				width: 100%;
				box-sizing: border-box;
				padding: 10px 12px;
				font: inherit;
				font-size: 14px;
				border: 1px solid #e2e8f0;
				border-radius: 8px;
				outline: none;
			}
			.modal .field input:focus { border-color: var(--brand, #6366f1); }
			.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
			.modal-actions button {
				padding: 10px 16px; font: inherit; font-size: 14px; border-radius: 8px; cursor: pointer; border: 0;
			}
			.modal-actions .secondary { background: #f1f5f9; color: #0f172a; }
			.modal-actions .primary { background: var(--brand, #6366f1); color: #fff; font-weight: 600; }
			.status-msg { font-size: 13px; padding: 8px 0; min-height: 20px; }
			.status-msg.ok { color: #16a34a; }
			.status-msg.err { color: #dc2626; }
			.skeleton {
				display: flex; align-items: center; justify-content: center;
				min-height: 100vh;
				color: #64748b;
				font-size: 15px;
			}
			.error-page {
				min-height: 100vh;
				display: flex; flex-direction: column; align-items: center; justify-content: center;
				padding: 32px;
				text-align: center;
			}
			.error-page h1 { font-size: 28px; margin: 0 0 8px; }
			.error-page p { color: #64748b; margin: 0 0 18px; }
			.error-page a {
				color: #6366f1; text-decoration: none; font-weight: 600;
			}
		</style>
	</head>
	<body>
		<div id="root">
			<div class="skeleton">Loading launchpad…</div>
		</div>
		<script type="module" src="/p/render.js"></script>
	</body>
</html>
