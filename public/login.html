<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>Sign in · three.ws</title>
		<link rel="icon" href="/favicon.ico" />
		<link rel="stylesheet" href="/wallet-connect.css" />
		<link rel="stylesheet" href="/auth.css" />
		<script
			type="module"
			src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"
		></script>
		<style>
			:root {
				color-scheme: dark;
			}
			* {
				box-sizing: border-box;
			}
			body {
				font:
					15px/1.5 -apple-system,
					system-ui,
					Segoe UI,
					Roboto,
					sans-serif;
				background: #000;
				color: #f0f0f0;
				margin: 0;
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 24px;
			}
			.shell {
				display: flex;
				width: 100%;
				max-width: 1080px;
				min-height: 640px;
				border-radius: 24px;
				overflow: hidden;
				background: #0c0c0c;
				border: 1px solid rgba(255, 255, 255, 0.08);
				box-shadow:
					0 0 0 1px rgba(255, 255, 255, 0.03),
					0 30px 80px rgba(0, 0, 0, 0.85),
					0 0 120px rgba(200, 210, 255, 0.04);
			}
			.panel {
				flex: 1;
				position: relative;
				display: flex;
				align-items: center;
				justify-content: center;
				background:
					radial-gradient(120% 90% at 30% 20%, rgba(154, 140, 255, 0.55), transparent 60%),
					radial-gradient(120% 90% at 80% 90%, rgba(255, 140, 200, 0.35), transparent 55%),
					linear-gradient(135deg, #2a2350 0%, #1a1a2e 100%);
				overflow: hidden;
			}
			.agent-avatar {
				position: relative;
				width: 320px;
				height: 320px;
				pointer-events: none;
			}
			.agent-avatar model-viewer {
				width: 100%;
				height: 100%;
				--poster-color: transparent;
				background: transparent;
			}
			.agent-avatar::after {
				content: '';
				position: absolute;
				left: 50%;
				bottom: -2px;
				width: 90px;
				height: 10px;
				background: radial-gradient(ellipse, rgba(220, 230, 255, 0.25), transparent 70%);
				transform: translateX(-50%);
				filter: blur(6px);
			}
			a {
				color: #c8d0e0;
				text-decoration: none;
			}
			a:hover {
				color: #fff;
			}
			.card {
				background: #0c0c0c;
				border: 0;
				border-radius: 0;
				padding: 56px 56px;
				flex: 1;
				width: 100%;
				max-width: 520px;
				box-shadow: none;
				display: flex;
				flex-direction: column;
				justify-content: center;
				overflow-y: auto;
			}
			@media (max-width: 860px) {
				.shell {
					flex-direction: column;
					min-height: 0;
				}
				.panel {
					min-height: 220px;
					order: -1;
				}
				.card {
					padding: 32px 28px;
					max-width: none;
				}
				.agent-avatar {
					width: 180px;
					height: 180px;
				}
			}
			@media (max-height: 720px) and (min-width: 861px) {
				.panel { display: none; }
			}
			h1 {
				font-size: 22px;
				font-weight: 600;
				margin: 0 0 4px;
				letter-spacing: -0.02em;
				color: #fff;
			}
			.sub {
				color: #888;
				margin: 0 0 22px;
				font-size: 14px;
			}
			label {
				display: block;
				font-size: 12px;
				font-weight: 500;
				letter-spacing: 0.02em;
				color: #666;
				margin: 16px 0 6px;
				text-transform: uppercase;
				transition: color 0.1s ease;
			}
			label.lit {
				color: #bbb;
			}
			input {
				width: 100%;
				padding: 11px 14px;
				background: #060606;
				border: 1px solid rgba(255, 255, 255, 0.07);
				border-radius: 10px;
				color: #f0f0f0;
				font-size: 15px;
				transition: border-color 0.08s ease, box-shadow 0.08s ease, background 0.08s ease;
			}
			input::placeholder {
				color: #333;
			}
			input:focus {
				outline: none;
				border-color: rgba(255, 255, 255, 0.45);
				box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.06);
				background: #080808;
			}
			input.invalid {
				border-color: rgba(255, 120, 120, 0.45);
			}
			button {
				width: 100%;
				margin-top: 20px;
				padding: 12px 16px;
				border: 0;
				border-radius: 10px;
				background: #fff;
				color: #000;
				font-weight: 600;
				font-size: 15px;
				cursor: pointer;
				letter-spacing: -0.01em;
				transition: background 0.15s, opacity 0.15s;
			}
			button:hover:not(:disabled) {
				background: #e8ecf4;
			}
			button:disabled {
				opacity: 0.35;
				cursor: default;
			}
			.field-err {
				margin: 6px 0 0;
				font-size: 12px;
				color: #ff9a9a;
				display: none;
			}
			.field-err.show {
				display: block;
			}
			.caps-warn {
				margin: 6px 0 0;
				font-size: 12px;
				color: #d8c074;
			}
			.err {
				margin-top: 14px;
				padding: 10px 12px;
				background: rgba(255, 255, 255, 0.04);
				border: 1px solid rgba(255, 255, 255, 0.1);
				border-radius: 8px;
				color: #aaa;
				font-size: 13px;
				display: none;
			}
			.foot {
				margin-top: 22px;
				text-align: center;
				font-size: 13px;
				color: #666;
			}
			.brand {
				margin: 0 0 18px;
				text-decoration: none;
				display: inline-block;
				opacity: 0.85;
				transition: opacity 0.15s;
			}
			.brand img {
				height: 40px;
				width: auto;
				display: block;
			}
			.brand:hover {
				opacity: 1;
			}
			.forgot {
				font-size: 12px;
				color: #444;
				margin: 6px 0 0;
				text-align: right;
			}
			/* ── Top-level method tabs (Email / Wallet) ── */
			.method-tabs {
				display: flex;
				gap: 3px;
				background: #060606;
				border: 1px solid rgba(255, 255, 255, 0.06);
				border-radius: 10px;
				padding: 3px;
				margin: 0 0 16px;
			}
			.method-tab {
				flex: 1;
				margin-top: 0;
				padding: 9px 10px;
				border: 1px solid transparent;
				border-radius: 7px;
				background: transparent;
				color: #555;
				font-size: 14px;
				font-weight: 500;
				cursor: pointer;
				transition: background 0.1s, color 0.1s, transform 0.08s cubic-bezier(0.34, 1.56, 0.64, 1);
				width: auto;
			}
			.method-tab.active {
				background: #1a1a1a;
				color: #f0f0f0;
				border-color: rgba(255, 255, 255, 0.08);
			}
			.method-tab:hover:not(.active) {
				color: #aaa;
			}
			.method-tab:active {
				transform: scale(0.97);
			}
			.method-panel { display: none; }
			.method-panel.active {
				display: block;
				animation: panel-fade-in 0.18s ease-out both;
			}
			@keyframes panel-fade-in {
				from { opacity: 0; transform: translateY(4px); }
				to   { opacity: 1; transform: translateY(0); }
			}
			.chain-tab[disabled] {
				opacity: 0.4;
				cursor: not-allowed;
			}
			#wallet-mount:empty::before,
			#solana-wallet-mount:empty::before {
				content: '';
				display: block;
				height: 44px;
				border-radius: 10px;
				background: linear-gradient(90deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 100%);
				background-size: 200% 100%;
				animation: wallet-skel 1.4s linear infinite;
			}
			@keyframes wallet-skel {
				0%   { background-position: 200% 0; }
				100% { background-position: -200% 0; }
			}
			@media (prefers-reduced-motion: reduce) {
				.method-panel.active,
				#wallet-mount:empty::before,
				#solana-wallet-mount:empty::before {
					animation: none;
				}
			}

			/* ── Password field ── */
			.password-wrap {
				position: relative;
			}
			.password-wrap input {
				padding-right: 44px;
			}
			.password-toggle {
				position: absolute;
				top: 50%;
				right: 6px;
				transform: translateY(-50%);
				width: 32px;
				height: 32px;
				margin: 0;
				padding: 0;
				background: transparent;
				color: #666;
				border: 0;
				border-radius: 6px;
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				transition: color 0.1s ease, background 0.1s ease;
			}
			.password-toggle:hover {
				color: #ddd;
				background: rgba(255, 255, 255, 0.04);
			}
			.password-toggle svg {
				width: 18px;
				height: 18px;
			}

			/* ── Wallet chain tabs ── */
			.chain-tabs {
				display: flex;
				gap: 3px;
				background: #060606;
				border: 1px solid rgba(255, 255, 255, 0.06);
				border-radius: 10px;
				padding: 3px;
				margin-bottom: 12px;
			}
			.chain-tab {
				flex: 1;
				padding: 7px 10px;
				border: 1px solid transparent;
				border-radius: 7px;
				background: transparent;
				color: #444;
				font-size: 13px;
				font-weight: 500;
				cursor: pointer;
				transition: background 0.1s ease, color 0.1s ease, transform 0.08s cubic-bezier(0.34, 1.56, 0.64, 1);
				margin-top: 0;
				width: auto;
				letter-spacing: 0.01em;
			}
			.chain-tab.active {
				background: #1a1a1a;
				color: #e0e0e0;
				border-color: rgba(255, 255, 255, 0.08);
			}
			.chain-tab:hover:not(.active) {
				color: #888;
			}
			.chain-tab:active {
				transform: scale(0.93);
			}
			.chain-panel { display: none; }
			.chain-panel.active { display: block; }

			.wallet-step-hint {
				margin: 10px 0 0;
				font-size: 11px;
				color: #555;
				text-align: center;
				cursor: help;
			}

			/* ── Card entrance ── */
			@keyframes card-in {
				from { opacity: 0; transform: translateY(14px) scale(0.985); }
				to   { opacity: 1; transform: translateY(0) scale(1); }
			}
			.shell {
				animation: card-in 0.22s cubic-bezier(0.16, 1, 0.3, 1) both;
			}

			/* ── Submit button polish ── */
			#submit {
				position: relative;
				overflow: hidden;
				transition: background 0.1s ease, transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.15s;
			}
			#submit:active:not(:disabled) {
				transform: scale(0.965);
			}
			#submit::after {
				content: '';
				position: absolute;
				inset: 0;
				background: linear-gradient(100deg, transparent 20%, rgba(0, 0, 0, 0.08) 50%, transparent 80%);
				transform: translateX(-150%);
			}
			#submit:hover:not(:disabled)::after {
				transform: translateX(150%);
				transition: transform 0.55s ease;
			}

			@keyframes err-shake {
				0%, 100% { transform: translateX(0); }
				20%       { transform: translateX(-6px); }
				40%       { transform: translateX(5px); }
				65%       { transform: translateX(-3px); }
				85%       { transform: translateX(2px); }
			}
			.err.shaking, input.shaking {
				animation: err-shake 0.32s cubic-bezier(0.36, 0.07, 0.19, 0.97);
			}
		</style>
	</head>
	<body>
		<div class="shell">
			<form class="card" id="f" autocomplete="on">
				<a href="/" class="brand"><img src="/three.svg" alt="three.ws" /></a>
				<h1>Welcome back</h1>
				<p class="sub">Sign in to manage your avatars.</p>

				<div class="method-tabs" role="tablist" aria-label="Sign-in method">
					<button type="button" class="method-tab active" data-method="email" role="tab" aria-selected="true" aria-controls="email-panel">Email</button>
					<button type="button" class="method-tab" data-method="wallet" role="tab" aria-selected="false" aria-controls="wallet-panel">Wallet</button>
				</div>

				<div id="email-panel" class="method-panel active" role="tabpanel">
					<label for="email">Email or username</label>
					<input id="email" name="username" type="text" inputmode="email" autocapitalize="none" autocomplete="username email" autofocus required aria-describedby="email-err" />
					<p class="field-err" id="email-err" role="alert"></p>

					<label for="password">Password</label>
					<div class="password-wrap">
						<input
							id="password"
							name="password"
							type="password"
							autocomplete="current-password"
							required
							minlength="10"
							aria-describedby="password-err caps-warn"
						/>
						<button type="button" class="password-toggle" id="password-toggle" aria-label="Show password" aria-pressed="false">
							<svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
								<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" />
								<circle cx="12" cy="12" r="3" />
							</svg>
						</button>
					</div>
					<p class="caps-warn" id="caps-warn" hidden>Caps Lock is on</p>
					<p class="field-err" id="password-err" role="alert"></p>

					<div class="remember-row">
						<label><input type="checkbox" id="remember" /> Remember me</label>
						<a href="/forgot-password" class="forgot">Forgot password?</a>
					</div>
					<button id="submit" type="submit">Sign in</button>
				</div>

				<div id="wallet-panel" class="method-panel" role="tabpanel">
					<div class="chain-tabs" role="tablist" aria-label="Wallet chain">
						<button type="button" class="chain-tab active" data-chain="evm" role="tab" aria-selected="true" aria-controls="evm-panel">EVM</button>
						<button type="button" class="chain-tab" data-chain="solana" role="tab" aria-selected="false" aria-controls="solana-panel">Solana</button>
					</div>
					<div id="evm-panel" class="chain-panel active" role="tabpanel">
						<div id="wallet-mount"></div>
					</div>
					<div id="solana-panel" class="chain-panel" role="tabpanel">
						<div id="solana-wallet-mount"></div>
					</div>
					<p class="wallet-step-hint" title="Your wallet will prompt twice — once to connect, once to sign.">Wallet prompts to connect, then to sign.</p>
				</div>

				<div class="err" id="err" role="alert" aria-live="polite"></div>
				<p class="foot">No account? <a href="/register">Create one</a></p>
			</form>
			<div class="panel">
				<a href="/" class="panel-brand" aria-label="three.ws home">three.ws</a>
				<div class="agent-avatar loading" id="login-avatar-wrap" aria-hidden="true">
					<model-viewer
						id="login-avatar"
						src="/avatars/cz.glb"
						alt=""
						autoplay
						animation-name="IdleV4.2(maya_head)"
						disable-zoom
						interaction-prompt="none"
						shadow-intensity="0.6"
						shadow-softness="1"
						exposure="1.05"
						tone-mapping="aces"
						environment-image="neutral"
						camera-orbit="0deg 88deg 4.8m"
						field-of-view="32deg"
						loading="eager"
					></model-viewer>
				</div>
			</div>
		</div>
		<script type="module" src="/wallet-login.js"></script>
		<script>
			(function () {
				const form = document.getElementById('f');
				const err = document.getElementById('err');
				const btn = document.getElementById('submit');
				const emailInput = document.getElementById('email');
				const passwordInput = document.getElementById('password');
				const emailErr = document.getElementById('email-err');
				const passwordErr = document.getElementById('password-err');
				const capsWarn = document.getElementById('caps-warn');
				const pwToggle = document.getElementById('password-toggle');

				// ── Method tabs (Email / Wallet) ──
				const methodTabs = document.querySelectorAll('.method-tab');
				const methodPanels = {
					email: document.getElementById('email-panel'),
					wallet: document.getElementById('wallet-panel'),
				};
				let activeMethod = 'email';
				const METHOD_KEY = '3dagent:login-method';
				function setMethod(name, persist = true) {
					if (!methodPanels[name]) return;
					activeMethod = name;
					methodTabs.forEach((t) => {
						const on = t.dataset.method === name;
						t.classList.toggle('active', on);
						t.setAttribute('aria-selected', on ? 'true' : 'false');
					});
					Object.entries(methodPanels).forEach(([k, el]) => {
						el.classList.toggle('active', k === name);
					});
					// Toggle required so wallet-tab Enter doesn't trip browser validation.
					const emailActive = name === 'email';
					emailInput.required = emailActive;
					passwordInput.required = emailActive;
					if (persist) {
						try { localStorage.setItem(METHOD_KEY, name); } catch { /* ignore */ }
					}
					if (emailActive && !emailInput.value) emailInput.focus();
				}
				methodTabs.forEach((t) =>
					t.addEventListener('click', () => setMethod(t.dataset.method)),
				);
				try {
					const saved = localStorage.getItem(METHOD_KEY);
					if (saved === 'wallet') setMethod('wallet', false);
				} catch { /* ignore */ }

				// ── Wallet chain tabs ──
				const solanaTab = document.querySelector('.chain-tab[data-chain="solana"]');
				const hasSolana = !!(window.solana || window.phantom?.solana || window.backpack || window.solflare);
				if (solanaTab && !hasSolana) {
					solanaTab.disabled = true;
					solanaTab.title = 'Install Phantom, Backpack, or Solflare to use Solana';
				}
				document.querySelectorAll('.chain-tab').forEach((t) => {
					t.addEventListener('click', () => {
						if (t.disabled) return;
						const chain = t.dataset.chain;
						document.querySelectorAll('.chain-tab').forEach((x) => {
							const on = x.dataset.chain === chain;
							x.classList.toggle('active', on);
							x.setAttribute('aria-selected', on ? 'true' : 'false');
						});
						document.getElementById('evm-panel').classList.toggle('active', chain === 'evm');
						document.getElementById('solana-panel').classList.toggle('active', chain === 'solana');
					});
				});

				// ── Password show/hide ──
				pwToggle.addEventListener('click', () => {
					const show = passwordInput.type === 'password';
					passwordInput.type = show ? 'text' : 'password';
					pwToggle.setAttribute('aria-pressed', show ? 'true' : 'false');
					pwToggle.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
				});

				// ── Caps lock warn ──
				function checkCaps(e) {
					const on = e.getModifierState && e.getModifierState('CapsLock');
					capsWarn.hidden = !on;
				}
				passwordInput.addEventListener('keydown', checkCaps);
				passwordInput.addEventListener('keyup', checkCaps);
				passwordInput.addEventListener('blur', () => { capsWarn.hidden = true; });

				// ── Inline field errors ──
				function setFieldError(input, errEl, msg) {
					if (msg) {
						errEl.textContent = msg;
						errEl.classList.add('show');
						input.classList.add('invalid');
						input.classList.remove('shaking');
						void input.offsetWidth;
						input.classList.add('shaking');
					} else {
						errEl.textContent = '';
						errEl.classList.remove('show');
						input.classList.remove('invalid');
					}
				}
				emailInput.addEventListener('input', () => setFieldError(emailInput, emailErr, ''));
				passwordInput.addEventListener('input', () => setFieldError(passwordInput, passwordErr, ''));

				// ── Label "lit" on focus + mobile scroll-into-view ──
				const isTouch = matchMedia('(hover: none)').matches;
				document.querySelectorAll('#f input').forEach((input) => {
					const label = document.querySelector(`label[for="${input.id}"]`);
					input.addEventListener('focus', () => {
						if (label) label.classList.add('lit');
						if (isTouch) {
							setTimeout(() => input.scrollIntoView({ block: 'center', behavior: 'smooth' }), 250);
						}
					});
					if (label) input.addEventListener('blur', () => label.classList.remove('lit'));
				});

				// ── Email prefill ──
				const params = new URLSearchParams(location.search);
				const LAST_EMAIL_KEY = '3dagent:last-email';
				const prefillEmail = params.get('email') || (() => {
					try { return localStorage.getItem(LAST_EMAIL_KEY) || ''; } catch { return ''; }
				})();
				if (prefillEmail) {
					emailInput.value = prefillEmail;
					passwordInput.focus();
				}

				// ── Auth redirect ──
				const next =
					params.get('next') || sessionStorage.getItem('login_redirect') || '/create';
				sessionStorage.removeItem('login_redirect');
				const navType = performance.getEntriesByType('navigation')[0]?.type;
				if (navType !== 'back_forward') {
					fetch('/api/auth/me', { credentials: 'include' })
						.then((r) => {
							if (r.ok) location.replace(next);
						})
						.catch(() => {});
				}

				// ── Submit ──
				form.addEventListener('submit', async (e) => {
					e.preventDefault();
					if (activeMethod !== 'email') return;
					err.style.display = 'none';
					setFieldError(emailInput, emailErr, '');
					setFieldError(passwordInput, passwordErr, '');

					const email = emailInput.value.trim();
					const password = passwordInput.value;
					let bad = false;
					if (!email) {
						setFieldError(emailInput, emailErr, 'Enter your email or username.');
						bad = true;
					}
					if (!password) {
						setFieldError(passwordInput, passwordErr, 'Enter your password.');
						bad = true;
					}
					if (bad) return;

					btn.disabled = true;
					btn.textContent = 'Signing in…';
					try {
						const res = await fetch('/api/auth/login', {
							method: 'POST',
							credentials: 'include',
							headers: { 'content-type': 'application/json' },
							body: JSON.stringify({ email, password, remember: document.getElementById('remember')?.checked || false }),
						});
						const data = await res.json().catch(() => ({}));
						if (!res.ok) {
							const err429 = res.status === 429;
							const msg = err429
								? 'Too many attempts. Try again in a moment.'
								: 'Email or password is incorrect.';
							throw new Error(msg);
						}
						try {
							localStorage.setItem(LAST_EMAIL_KEY, email);
							localStorage.setItem(
								'3dagent:auth-hint',
								JSON.stringify({
									authed: true,
									name: data.user?.display_name || '',
									ts: Date.now(),
								}),
							);
						} catch {
							/* ignore */
						}
						location.href = next;
					} catch (e2) {
						setFieldError(passwordInput, passwordErr, e2.message);
						btn.disabled = false;
						btn.textContent = 'Sign in';
					}
				});

				// ── Avatar look-around + parallax + skeleton ──
				const viewer = document.getElementById('login-avatar');
				const wrap = document.getElementById('login-avatar-wrap');
				if (viewer) {
					viewer.addEventListener('load', () => wrap?.classList.remove('loading'));
					const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
					const BASE_AZ = 0;
					const BASE_POL = 88;
					const AZ_RANGE = 30;
					const POL_RANGE = 14;
					let targetAz = BASE_AZ, targetPol = BASE_POL;
					let curAz = BASE_AZ, curPol = BASE_POL;
					let targetTx = 0, targetTy = 0, curTx = 0, curTy = 0;
					let nod = 0;
					const lerp = (a, b, t) => a + (b - a) * t;
					function tick() {
						curAz = lerp(curAz, targetAz, 0.1);
						curPol = lerp(curPol, targetPol + nod, 0.18);
						curTx = lerp(curTx, targetTx, 0.08);
						curTy = lerp(curTy, targetTy, 0.08);
						nod *= 0.85;
						viewer.setAttribute('camera-orbit', `${curAz}deg ${curPol}deg 4.8m`);
						if (wrap) wrap.style.transform = `translate(${curTx.toFixed(2)}px, ${curTy.toFixed(2)}px)`;
						requestAnimationFrame(tick);
					}
					if (!reducedMotion) {
						requestAnimationFrame(tick);
						window.addEventListener('mousemove', (e) => {
							const nx = e.clientX / window.innerWidth - 0.5;
							const ny = e.clientY / window.innerHeight - 0.5;
							targetAz = BASE_AZ - nx * AZ_RANGE * 2;
							targetPol = BASE_POL + ny * POL_RANGE * 2;
							targetTx = -nx * 10;
							targetTy = -ny * 8;
						}, { passive: true });
						document.querySelectorAll('#f input').forEach((el) => {
							el.addEventListener('keydown', (ev) => {
								if (ev.key.length === 1 || ev.key === 'Backspace') {
									nod = (nod >= 0 ? -1 : 1) * 4;
								}
							});
						});
					}
				}
			})();
		</script>
	</body>
</html>
