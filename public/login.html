<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>Sign in · three.ws</title>
		<link rel="icon" href="/favicon.ico" />
		<link rel="stylesheet" href="/wallet-connect.css" />
		<script
			type="module"
			src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"
		></script>
		<style>
			:root {
				color-scheme: dark;
				--accent: #6a5cff;
				--accent2: #ff5ca8;
			}
			* {
				box-sizing: border-box;
			}
			body {
				font:
					15px/1.5 -apple-system,
					system-ui,
					Segoe UI,
					Roboto,
					sans-serif;
				background: radial-gradient(1200px 600px at 50% -100px, #1a1a2e 0, #080814 60%);
				color: #eee;
				margin: 0;
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 8px;
				padding: 24px;
			}
			.agent-avatar {
				position: relative;
				width: 160px;
				height: 160px;
				pointer-events: none;
			}
			.agent-avatar model-viewer {
				width: 100%;
				height: 100%;
				--poster-color: transparent;
				background: transparent;
			}
			.agent-avatar::after {
				content: '';
				position: absolute;
				left: 50%;
				bottom: -2px;
				width: 90px;
				height: 10px;
				background: radial-gradient(ellipse, rgba(106, 92, 255, 0.35), transparent 70%);
				transform: translateX(-50%);
				filter: blur(4px);
			}
			a {
				color: #9a8cff;
			}
			.card {
				background: #14141c;
				border: 1px solid #2a2a36;
				border-radius: 16px;
				padding: 32px;
				max-width: 400px;
				width: 100%;
				box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
			}
			h1 {
				font-size: 22px;
				margin: 0 0 4px;
				letter-spacing: -0.01em;
			}
			.sub {
				color: #888;
				margin: 0 0 24px;
				font-size: 14px;
			}
			label {
				display: block;
				font-size: 13px;
				color: #aaa;
				margin: 14px 0 6px;
			}
			input {
				width: 100%;
				padding: 11px 13px;
				background: #0f0f17;
				border: 1px solid #2a2a36;
				border-radius: 9px;
				color: #eee;
				font-size: 15px;
			}
			input:focus {
				outline: none;
				border-color: var(--accent);
				box-shadow: 0 0 0 3px rgba(106, 92, 255, 0.15);
			}
			button {
				width: 100%;
				margin-top: 20px;
				padding: 12px 16px;
				border: 0;
				border-radius: 10px;
				background: linear-gradient(135deg, var(--accent), var(--accent2));
				color: #fff;
				font-weight: 600;
				font-size: 15px;
				cursor: pointer;
			}
			button:disabled {
				opacity: 0.6;
				cursor: default;
			}
			.err {
				margin-top: 14px;
				padding: 10px 12px;
				background: rgba(255, 92, 92, 0.1);
				border: 1px solid rgba(255, 92, 92, 0.3);
				border-radius: 8px;
				color: #ffb3b3;
				font-size: 13px;
				display: none;
			}
			.foot {
				margin-top: 20px;
				text-align: center;
				font-size: 13px;
				color: #888;
			}
			.brand {
				font-size: 12px;
				letter-spacing: 0.1em;
				text-transform: uppercase;
				color: var(--accent);
				margin: 0 0 8px;
			}
			.divider {
				display: flex;
				align-items: center;
				gap: 12px;
				margin: 22px 0 4px;
				color: #555;
				font-size: 12px;
				text-transform: uppercase;
				letter-spacing: 0.08em;
			}
			.divider::before,
			.divider::after {
				content: '';
				flex: 1;
				height: 1px;
				background: #2a2a36;
			}
			/* Wallet chain tabs */
			.chain-tabs {
				display: flex;
				gap: 4px;
				background: #0f0f17;
				border: 1px solid #2a2a36;
				border-radius: 10px;
				padding: 3px;
				margin-bottom: 4px;
			}
			.chain-tab {
				flex: 1;
				padding: 7px 10px;
				border: none;
				border-radius: 7px;
				background: transparent;
				color: #888;
				font-size: 13px;
				font-weight: 500;
				cursor: pointer;
				transition: background 0.15s, color 0.15s;
				margin-top: 0;
				width: auto;
			}
			.chain-tab.active {
				background: #1e1e2e;
				color: #eee;
				border: 1px solid #2a2a36;
			}
			.chain-tab:hover:not(.active) {
				color: #bbb;
			}
			.chain-panel { display: none; }
			.chain-panel.active { display: block; }
		</style>
	</head>
	<body>
		<div class="agent-avatar" aria-hidden="true">
			<model-viewer
				id="login-avatar"
				src="/avatars/cz.glb"
				alt=""
				autoplay
				animation-name="IdleV4.2(maya_head)"
				disable-zoom
				interaction-prompt="none"
				shadow-intensity="0.6"
				shadow-softness="1"
				exposure="1.05"
				tone-mapping="aces"
				environment-image="neutral"
				camera-orbit="0deg 88deg 4.8m"
				field-of-view="32deg"
				loading="eager"
			></model-viewer>
		</div>
		<form class="card" id="f">
			<p class="brand">three.ws</p>
			<h1>Welcome back</h1>
			<p class="sub">Sign in to manage your avatars.</p>
			<label for="email">Email or username</label>
			<input id="email" type="text" autocomplete="username email" required aria-describedby="err" />
			<label for="password">Password</label>
			<input
				id="password"
				type="password"
				autocomplete="current-password"
				required
				minlength="10"
				aria-describedby="err"
			/>
			<p class="hint" style="font-size:12px;color:#666;margin-top:4px;text-align:right">
				<a href="/forgot-password">Forgot password?</a>
			</p>
			<button id="submit" type="submit">Sign in</button>
			<div class="divider">or connect wallet</div>
			<div class="chain-tabs" role="tablist" aria-label="Wallet chain">
				<button type="button" class="chain-tab active" data-chain="evm" role="tab" aria-selected="true" aria-controls="evm-panel">EVM</button>
				<button type="button" class="chain-tab" data-chain="solana" role="tab" aria-selected="false" aria-controls="solana-panel">Solana</button>
			</div>
			<div id="evm-panel" class="chain-panel active" role="tabpanel">
				<div id="wallet-mount"></div>
			</div>
			<div id="solana-panel" class="chain-panel" role="tabpanel">
				<div id="solana-wallet-mount"></div>
				<div class="chain-hints" id="solana-hints" style="margin-top:8px;font-size:12px;color:#555;display:flex;gap:8px;justify-content:center;">
					<button type="button" class="wallet-hint-btn" data-wallet="phantom">Phantom</button>
					<button type="button" class="wallet-hint-btn" data-wallet="backpack">Backpack</button>
					<button type="button" class="wallet-hint-btn" data-wallet="solflare">Solflare</button>
				</div>
			</div>
			<div class="err" id="err" role="alert" aria-live="polite"></div>
			<p class="foot">No account? <a href="/register">Create one</a></p>
		</form>
		<style>
			.wallet-hint-btn {
				width: auto;
				margin-top: 0;
				padding: 4px 10px;
				background: transparent;
				border: 1px solid #2a2a36;
				border-radius: 6px;
				color: #666;
				font-size: 11px;
				font-weight: 400;
				cursor: pointer;
			}
			.wallet-hint-btn:hover { border-color: #6a5cff; color: #9a8cff; }
			.wallet-hint-btn.active { border-color: #6a5cff; color: #9a8cff; background: rgba(106,92,255,0.08); }
		</style>
		<script type="module" src="/wallet-login.js"></script>
		<script>
			(function () {
				const viewer = document.getElementById('login-avatar');
				if (!viewer) return;
				const BASE_AZ = 0;
				const BASE_POL = 88;
				const AZ_RANGE = 30;
				const POL_RANGE = 14;
				let targetAz = BASE_AZ, targetPol = BASE_POL;
				let curAz = BASE_AZ, curPol = BASE_POL;
				let nod = 0;
				const lerp = (a, b, t) => a + (b - a) * t;
				function tick() {
					curAz = lerp(curAz, targetAz, 0.1);
					curPol = lerp(curPol, targetPol + nod, 0.18);
					nod *= 0.85;
					viewer.setAttribute('camera-orbit', `${curAz}deg ${curPol}deg 4.8m`);
					requestAnimationFrame(tick);
				}
				requestAnimationFrame(tick);
				window.addEventListener('mousemove', (e) => {
					const nx = e.clientX / window.innerWidth - 0.5;
					const ny = e.clientY / window.innerHeight - 0.5;
					targetAz = BASE_AZ - nx * AZ_RANGE * 2;
					targetPol = BASE_POL + ny * POL_RANGE * 2;
				}, { passive: true });
				const inputs = document.querySelectorAll('#f input');
				inputs.forEach((el) => {
					el.addEventListener('keydown', (e) => {
						if (e.key.length === 1 || e.key === 'Backspace') {
							nod = (nod >= 0 ? -1 : 1) * 4;
						}
					});
				});
			})();
		</script>
		<script>
			const params = new URLSearchParams(location.search);
			const next =
				params.get('next') || sessionStorage.getItem('login_redirect') || '/create';
			sessionStorage.removeItem('login_redirect');

			// If already signed in, skip the login form entirely.
			fetch('/api/auth/me', { credentials: 'include' })
				.then((r) => {
					if (r.ok) location.replace(next);
				})
				.catch(() => {});

			const form = document.getElementById('f');
			const err = document.getElementById('err');
			const btn = document.getElementById('submit');
			form.addEventListener('submit', async (e) => {
				e.preventDefault();
				err.style.display = 'none';
				btn.disabled = true;
				btn.textContent = 'Signing in…';
				try {
					const res = await fetch('/api/auth/login', {
						method: 'POST',
						credentials: 'include',
						headers: { 'content-type': 'application/json' },
						body: JSON.stringify({
							email: document.getElementById('email').value,
							password: document.getElementById('password').value,
						}),
					});
					const data = await res.json();
					if (!res.ok) throw new Error(data.error_description || 'Sign-in failed');
					try {
						localStorage.setItem(
							'3dagent:auth-hint',
							JSON.stringify({ authed: true, ts: Date.now() }),
						);
					} catch {
						/* ignore */
					}
					location.href = next;
				} catch (e) {
					err.textContent = e.message;
					err.style.display = 'block';
					btn.disabled = false;
					btn.textContent = 'Sign in';
				}
			});
		</script>
	</body>
</html>
