<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>Sign in · three.ws</title>
		<link rel="icon" href="/favicon.ico" />
		<link rel="stylesheet" href="/wallet-connect.css" />
		<script
			type="module"
			src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"
		></script>
		<style>
			:root {
				color-scheme: dark;
			}
			* {
				box-sizing: border-box;
			}
			body {
				font:
					15px/1.5 -apple-system,
					system-ui,
					Segoe UI,
					Roboto,
					sans-serif;
				background: #000;
				color: #f0f0f0;
				margin: 0;
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 8px;
				padding: 24px;
			}
			.agent-avatar {
				position: relative;
				width: 160px;
				height: 160px;
				pointer-events: none;
			}
			.agent-avatar model-viewer {
				width: 100%;
				height: 100%;
				--poster-color: transparent;
				background: transparent;
			}
			.agent-avatar::after {
				content: '';
				position: absolute;
				left: 50%;
				bottom: -2px;
				width: 90px;
				height: 10px;
				background: radial-gradient(ellipse, rgba(220, 230, 255, 0.25), transparent 70%);
				transform: translateX(-50%);
				filter: blur(6px);
			}
			a {
				color: #c8d0e0;
				text-decoration: none;
			}
			a:hover {
				color: #fff;
			}
			.card {
				background: #0c0c0c;
				border: 1px solid rgba(255, 255, 255, 0.08);
				border-radius: 20px;
				padding: 36px;
				max-width: 400px;
				width: 100%;
				box-shadow:
					0 0 0 1px rgba(255, 255, 255, 0.03),
					0 20px 60px rgba(0, 0, 0, 0.8),
					0 0 80px rgba(200, 210, 255, 0.03);
			}
			h1 {
				font-size: 22px;
				font-weight: 600;
				margin: 0 0 4px;
				letter-spacing: -0.02em;
				color: #fff;
			}
			.sub {
				color: #555;
				margin: 0 0 28px;
				font-size: 14px;
			}
			label {
				display: block;
				font-size: 12px;
				font-weight: 500;
				letter-spacing: 0.02em;
				color: #666;
				margin: 16px 0 6px;
				text-transform: uppercase;
			}
			input {
				width: 100%;
				padding: 11px 14px;
				background: #060606;
				border: 1px solid rgba(255, 255, 255, 0.07);
				border-radius: 10px;
				color: #f0f0f0;
				font-size: 15px;
				transition: border-color 0.15s, box-shadow 0.15s;
			}
			input::placeholder {
				color: #333;
			}
			input:focus {
				outline: none;
				border-color: rgba(255, 255, 255, 0.3);
				box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.05);
			}
			button {
				width: 100%;
				margin-top: 20px;
				padding: 12px 16px;
				border: 0;
				border-radius: 10px;
				background: #fff;
				color: #000;
				font-weight: 600;
				font-size: 15px;
				cursor: pointer;
				letter-spacing: -0.01em;
				transition: background 0.15s, opacity 0.15s;
			}
			button:hover:not(:disabled) {
				background: #e8ecf4;
			}
			button:disabled {
				opacity: 0.35;
				cursor: default;
			}
			.err {
				margin-top: 14px;
				padding: 10px 12px;
				background: rgba(255, 255, 255, 0.04);
				border: 1px solid rgba(255, 255, 255, 0.1);
				border-radius: 8px;
				color: #aaa;
				font-size: 13px;
				display: none;
			}
			.foot {
				margin-top: 22px;
				text-align: center;
				font-size: 13px;
				color: #444;
			}
			.brand {
				font-size: 11px;
				letter-spacing: 0.14em;
				text-transform: uppercase;
				color: #444;
				margin: 0 0 10px;
				font-weight: 500;
				text-decoration: none;
				display: inline-block;
			}
			.brand:hover {
				color: #888;
			}
			.divider {
				display: flex;
				align-items: center;
				gap: 12px;
				margin: 24px 0 8px;
				color: #333;
				font-size: 11px;
				text-transform: uppercase;
				letter-spacing: 0.1em;
			}
			.divider::before,
			.divider::after {
				content: '';
				flex: 1;
				height: 1px;
				background: rgba(255, 255, 255, 0.06);
			}
			/* Wallet chain tabs */
			.chain-tabs {
				display: flex;
				gap: 3px;
				background: #060606;
				border: 1px solid rgba(255, 255, 255, 0.06);
				border-radius: 10px;
				padding: 3px;
				margin-bottom: 4px;
			}
			.chain-tab {
				flex: 1;
				padding: 7px 10px;
				border: none;
				border-radius: 7px;
				background: transparent;
				color: #444;
				font-size: 13px;
				font-weight: 500;
				cursor: pointer;
				transition: background 0.15s, color 0.15s;
				margin-top: 0;
				width: auto;
				letter-spacing: 0.01em;
			}
			.chain-tab.active {
				background: #1a1a1a;
				color: #e0e0e0;
				border: 1px solid rgba(255, 255, 255, 0.08);
			}
			.chain-tab:hover:not(.active) {
				color: #888;
			}
			.chain-panel { display: none; }
			.chain-panel.active { display: block; }

			/* ── Interactions ── */
			@keyframes card-in {
				from { opacity: 0; transform: translateY(14px) scale(0.985); }
				to   { opacity: 1; transform: translateY(0) scale(1); }
			}
			.card {
				animation: card-in 0.22s cubic-bezier(0.16, 1, 0.3, 1) both;
			}
			input {
				transition: border-color 0.08s ease, box-shadow 0.08s ease, background 0.08s ease;
			}
			input:focus {
				border-color: rgba(255, 255, 255, 0.45);
				box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.06);
				background: #080808;
			}
			label {
				transition: color 0.1s ease;
			}
			label.lit {
				color: #bbb;
			}
			#submit {
				position: relative;
				overflow: hidden;
				transition: background 0.1s ease, transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.15s;
			}
			#submit:active:not(:disabled) {
				transform: scale(0.965);
			}
			#submit::after {
				content: '';
				position: absolute;
				inset: 0;
				background: linear-gradient(100deg, transparent 20%, rgba(0, 0, 0, 0.08) 50%, transparent 80%);
				transform: translateX(-150%);
			}
			#submit:hover:not(:disabled)::after {
				transform: translateX(150%);
				transition: transform 0.55s ease;
			}
			.chain-tab {
				transition: background 0.1s ease, color 0.1s ease, transform 0.08s cubic-bezier(0.34, 1.56, 0.64, 1);
			}
			.chain-tab:active {
				transform: scale(0.93);
			}
			.wallet-hint-btn {
				transition: border-color 0.1s ease, color 0.1s ease, transform 0.08s cubic-bezier(0.34, 1.56, 0.64, 1);
			}
			.wallet-hint-btn:active {
				transform: scale(0.91);
			}
			@keyframes err-shake {
				0%, 100% { transform: translateX(0); }
				20%       { transform: translateX(-6px); }
				40%       { transform: translateX(5px); }
				65%       { transform: translateX(-3px); }
				85%       { transform: translateX(2px); }
			}
			.err.shaking {
				animation: err-shake 0.32s cubic-bezier(0.36, 0.07, 0.19, 0.97);
			}
		</style>
	</head>
	<body>
		<div class="agent-avatar" aria-hidden="true">
			<model-viewer
				id="login-avatar"
				src="/avatars/cz.glb"
				alt=""
				autoplay
				animation-name="IdleV4.2(maya_head)"
				disable-zoom
				interaction-prompt="none"
				shadow-intensity="0.6"
				shadow-softness="1"
				exposure="1.05"
				tone-mapping="aces"
				environment-image="neutral"
				camera-orbit="0deg 88deg 4.8m"
				field-of-view="32deg"
				loading="eager"
			></model-viewer>
		</div>
		<form class="card" id="f">
			<a href="/" class="brand">three.ws</a>
			<h1>Welcome back</h1>
			<p class="sub">Sign in to manage your avatars.</p>
			<label for="email">Email or username</label>
			<input id="email" type="text" autocomplete="username email" required aria-describedby="err" />
			<label for="password">Password</label>
			<input
				id="password"
				type="password"
				autocomplete="current-password"
				required
				minlength="10"
				aria-describedby="err"
			/>
			<p class="hint" style="font-size:12px;color:#444;margin-top:4px;text-align:right">
				<a href="/forgot-password">Forgot password?</a>
			</p>
			<button id="submit" type="submit">Sign in</button>
			<div class="divider">or connect wallet</div>
			<div class="chain-tabs" role="tablist" aria-label="Wallet chain">
				<button type="button" class="chain-tab active" data-chain="evm" role="tab" aria-selected="true" aria-controls="evm-panel">EVM</button>
				<button type="button" class="chain-tab" data-chain="solana" role="tab" aria-selected="false" aria-controls="solana-panel">Solana</button>
			</div>
			<div id="evm-panel" class="chain-panel active" role="tabpanel">
				<div id="wallet-mount"></div>
				<p class="wallet-step-hint">Your wallet will prompt twice — once to connect, once to sign.</p>
			</div>
			<div id="solana-panel" class="chain-panel" role="tabpanel">
				<div id="solana-wallet-mount"></div>
				<div class="chain-hints" id="solana-hints" style="margin-top:8px;font-size:12px;color:#444;display:flex;gap:8px;justify-content:center;">
					<button type="button" class="wallet-hint-btn" data-wallet="phantom">Phantom</button>
					<button type="button" class="wallet-hint-btn" data-wallet="backpack">Backpack</button>
					<button type="button" class="wallet-hint-btn" data-wallet="solflare">Solflare</button>
				</div>
			</div>
			<div class="err" id="err" role="alert" aria-live="polite"></div>
			<p class="foot">No account? <a href="/register">Create one</a></p>
		</form>
		<style>
			.wallet-step-hint {
				margin: 6px 0 0;
				font-size: 12px;
				color: #444;
				text-align: center;
			}
			.wallet-hint-btn {
				width: auto;
				margin-top: 0;
				padding: 4px 10px;
				background: transparent;
				border: 1px solid rgba(255, 255, 255, 0.08);
				border-radius: 6px;
				color: #444;
				font-size: 11px;
				font-weight: 400;
				cursor: pointer;
				transition: border-color 0.15s, color 0.15s;
			}
			.wallet-hint-btn:hover { border-color: rgba(255,255,255,0.25); color: #bbb; }
			.wallet-hint-btn.active { border-color: rgba(255,255,255,0.2); color: #ccc; background: rgba(255,255,255,0.04); }
		</style>
		<script type="module" src="/wallet-login.js"></script>
		<script>
			(function () {
				const viewer = document.getElementById('login-avatar');
				if (!viewer) return;
				const BASE_AZ = 0;
				const BASE_POL = 88;
				const AZ_RANGE = 30;
				const POL_RANGE = 14;
				let targetAz = BASE_AZ, targetPol = BASE_POL;
				let curAz = BASE_AZ, curPol = BASE_POL;
				let nod = 0;
				const lerp = (a, b, t) => a + (b - a) * t;
				function tick() {
					curAz = lerp(curAz, targetAz, 0.1);
					curPol = lerp(curPol, targetPol + nod, 0.18);
					nod *= 0.85;
					viewer.setAttribute('camera-orbit', `${curAz}deg ${curPol}deg 4.8m`);
					requestAnimationFrame(tick);
				}
				requestAnimationFrame(tick);
				window.addEventListener('mousemove', (e) => {
					const nx = e.clientX / window.innerWidth - 0.5;
					const ny = e.clientY / window.innerHeight - 0.5;
					targetAz = BASE_AZ - nx * AZ_RANGE * 2;
					targetPol = BASE_POL + ny * POL_RANGE * 2;
				}, { passive: true });
				const inputs = document.querySelectorAll('#f input');
				inputs.forEach((el) => {
					el.addEventListener('keydown', (e) => {
						if (e.key.length === 1 || e.key === 'Backspace') {
							nod = (nod >= 0 ? -1 : 1) * 4;
						}
					});
				});
			})();
		</script>
		<script>
			const params = new URLSearchParams(location.search);
			const next =
				params.get('next') || sessionStorage.getItem('login_redirect') || '/create';
			sessionStorage.removeItem('login_redirect');

			// If already signed in, skip the login form — but not when the user
			// navigated back here intentionally (back/forward navigation).
			const navType = performance.getEntriesByType('navigation')[0]?.type;
			if (navType !== 'back_forward') {
				fetch('/api/auth/me', { credentials: 'include' })
					.then((r) => {
						if (r.ok) location.replace(next);
					})
					.catch(() => {});
			}

			const form = document.getElementById('f');
			const err = document.getElementById('err');
			const btn = document.getElementById('submit');
			form.addEventListener('submit', async (e) => {
				e.preventDefault();
				err.style.display = 'none';
				btn.disabled = true;
				btn.textContent = 'Signing in…';
				try {
					const res = await fetch('/api/auth/login', {
						method: 'POST',
						credentials: 'include',
						headers: { 'content-type': 'application/json' },
						body: JSON.stringify({
							email: document.getElementById('email').value,
							password: document.getElementById('password').value,
						}),
					});
					const data = await res.json();
					if (!res.ok) throw new Error(data.error_description || 'Sign-in failed');
					try {
						localStorage.setItem(
							'3dagent:auth-hint',
							JSON.stringify({ authed: true, name: data.user?.display_name || '', ts: Date.now() }),
						);
					} catch {
						/* ignore */
					}
					location.href = next;
				} catch (e) {
					err.textContent = e.message;
					err.style.display = 'block';
					err.classList.remove('shaking');
					void err.offsetWidth;
					err.classList.add('shaking');
					btn.disabled = false;
					btn.textContent = 'Sign in';
				}
			});
		</script>
		<script>
			document.querySelectorAll('#f input').forEach((input) => {
				const label = document.querySelector(`label[for="${input.id}"]`);
				if (!label) return;
				input.addEventListener('focus', () => label.classList.add('lit'));
				input.addEventListener('blur', () => label.classList.remove('lit'));
			});
		</script>
	</body>
</html>
