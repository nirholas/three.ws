<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<title>Agent</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="description" content="Embedded 3D agent avatar." />
	<meta name="robots" content="noindex" />
	<style>
		html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: transparent; overflow: hidden; font-family: system-ui, sans-serif; }
		#stage { position: absolute; inset: 0; }
		#stage canvas { display: block; width: 100% !important; height: 100% !important; }
		#stage .gui-wrap, #stage .gui-toggle, #stage .annotation-canvas { display: none !important; }
		#stage .model-info { display: none !important; }
		#name-plate {
			position: absolute; left: 12px; bottom: 10px; z-index: 2; pointer-events: none;
			font-size: 11px; color: rgba(255,255,255,0.55); letter-spacing: 0.04em;
			text-shadow: 0 1px 2px rgba(0,0,0,0.6);
		}
		#error {
			position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
			color: rgba(255,255,255,0.4); font-size: 12px; padding: 1rem; text-align: center;
		}
		body.bg-dark  { background: #0b0d10; }
		body.bg-light { background: #f5f5f5; }
	</style>
</head>
<body>
	<div id="stage"></div>
	<div id="name-plate"></div>
	<div id="error"></div>

	<script type="module">
		/*
		 * ─── Host ↔ agent postMessage bridge — v1 (FROZEN) ───────────────────
		 *
		 * Wire format. All payloads are JSON-serializable. All messages MUST
		 * include `agentId` so a single host page with multiple iframes can
		 * route deterministically. Unknown `type` values are ignored.
		 *
		 * Host  → iframe:
		 *   { type: 'agent:hello',  agentId, host? }     Handshake. Iframe replies
		 *                                                with agent:ready (now or
		 *                                                when init completes).
		 *   { type: 'agent:action', agentId, action }    Forward action onto the
		 *                                                iframe's protocol bus.
		 *                                                See src/agent-protocol.js
		 *                                                for action.type vocabulary.
		 *   { type: 'agent:ping',   agentId, id }        Liveness probe; iframe
		 *                                                replies with agent:pong{id}.
		 *
		 * Iframe → host:
		 *   { type: 'agent:ready',  agentId, version, capabilities: [string] }
		 *                                                Sent once init succeeds and
		 *                                                in response to agent:hello.
		 *   { type: 'agent:action', agentId, action }    Echo of every protocol
		 *                                                action the iframe emits.
		 *   { type: 'agent:resize', agentId, height }    Preferred CSS pixel height
		 *                                                of the iframe content box.
		 *   { type: 'agent:pong',   agentId, id }        Reply to agent:ping.
		 *
		 * Legacy envelope `{ __agent, type: 'action'|'ready'|'blocked' }` is still
		 * accepted on input and emitted on output for backwards compatibility with
		 * pre-v1 hosts. New consumers SHOULD prefer the v1 envelope above.
		 *
		 * Future bumps go to v2 — DO NOT change v1 wire shapes in place.
		 */

		import { Viewer }         from '/src/viewer.js';
		import { AgentIdentity }  from '/src/agent-identity.js';
		import { AgentAvatar }    from '/src/agent-avatar.js';
		import { protocol }       from '/src/agent-protocol.js';

		const BRIDGE_VERSION = '1';
		const CAPABILITIES   = ['speak', 'gesture', 'look-at', 'emote', 'present-model'];

		const params    = new URL(location.href).searchParams;
		const bg        = params.get('bg') || 'transparent';
		if (bg === 'dark')  document.body.classList.add('bg-dark');
		if (bg === 'light') document.body.classList.add('bg-light');

		const plateOn   = params.get('name') !== '0';
		const preview   = params.get('preview') === '1';
		const parts     = location.pathname.split('/').filter(Boolean);
		const agentId   = parts[parts.indexOf('agent') + 1];

		function hostMatches(host, pattern) {
			if (!host || !pattern) return false;
			host = host.toLowerCase();
			pattern = pattern.toLowerCase();
			if (pattern.startsWith('*.')) {
				const suffix = pattern.slice(2);
				return host === suffix || host.endsWith('.' + suffix);
			}
			return host === pattern;
		}

		function embeddingHost() {
			// Prefer ancestorOrigins (Chromium/Safari) for the true top-level origin;
			// fall back to document.referrer which is the cross-browser signal for a
			// first-party iframe's parent. Firefox has no ancestorOrigins today.
			try {
				const anc = window.location.ancestorOrigins;
				if (anc && anc.length) return new URL(anc[0]).hostname;
			} catch {}
			try {
				if (document.referrer) return new URL(document.referrer).hostname;
			} catch {}
			return null;
		}

		async function checkPolicy() {
			if (preview) return true;
			// Same-origin (top-level or iframed from ourselves) is always allowed.
			const sameOrigin = !window.parent || window.parent === window
				|| (() => { try { return window.parent.location.origin === location.origin; } catch { return false; } })();
			let policy = null;
			try {
				const r = await fetch(`/api/agents/${agentId}/embed-policy`, { credentials: 'omit' });
				if (r.ok) policy = (await r.json()).policy;
			} catch {}
			if (policy === null || policy === undefined) return true;
			if (sameOrigin) return true;
			const host = embeddingHost();
			const hosts = Array.isArray(policy.hosts) ? policy.hosts : [];
			const matched = host ? hosts.some((p) => hostMatches(host, p)) : false;
			if (policy.mode === 'allowlist') return matched;
			if (policy.mode === 'denylist')  return !matched;
			return true;
		}

		// ── Bridge state. The handshake handler is installed *before* main()
		// runs so a host that sends agent:hello early gets a reply once we're
		// ready, even if init takes a few seconds (network + GLB parse).
		let bridgeReady   = false;
		let identityName  = null;
		const pendingHellos = [];

		function postReady() {
			parent?.postMessage({
				type: 'agent:ready', agentId, version: BRIDGE_VERSION, capabilities: CAPABILITIES,
				name: identityName,
			}, '*');
			// Legacy envelope for pre-v1 hosts.
			parent?.postMessage({ __agent: agentId, type: 'ready', name: identityName }, '*');
		}

		function postResize(height) {
			parent?.postMessage({ type: 'agent:resize', agentId, height }, '*');
		}

		function handleAction(action) {
			if (!action || typeof action !== 'object') return;
			protocol.emit(action);
		}

		// Installed eagerly so the host's hello during boot is captured.
		window.addEventListener('message', (ev) => {
			const msg = ev.data;
			if (!msg || typeof msg !== 'object') return;

			// v1 envelope
			if (msg.agentId && msg.agentId === agentId && typeof msg.type === 'string') {
				switch (msg.type) {
					case 'agent:hello':
						if (bridgeReady) postReady(); else pendingHellos.push(true);
						return;
					case 'agent:action':
						if (bridgeReady) handleAction(msg.action);
						return;
					case 'agent:ping':
						if (bridgeReady) parent?.postMessage({ type: 'agent:pong', agentId, id: msg.id }, '*');
						return;
				}
			}

			// Legacy envelope. Kept until all known hosts migrate.
			if (msg.__agent === agentId) {
				if (msg.type === 'action' && msg.action) handleAction(msg.action);
			}
		});

		async function main() {
			if (!(await checkPolicy())) {
				const el = document.getElementById('error');
				el.textContent = 'This agent can only be embedded on approved sites.';
				el.style.display = 'flex';
				parent?.postMessage({ type: 'agent:blocked', agentId }, '*');
				parent?.postMessage({ __agent: agentId, type: 'blocked' }, '*');
				return;
			}

			const identity = new AgentIdentity({ agentId, autoLoad: false });
			await identity.load();
			identityName = identity.name;

			if (plateOn && identity.name) {
				document.getElementById('name-plate').textContent = identity.name;
			}

			if (!identity.avatarId) throw new Error('agent has no avatar body');

			const resp = await fetch(`/api/avatars/${identity.avatarId}`, { credentials: 'include' });
			if (!resp.ok) throw new Error(`avatar ${resp.status}`);
			const { avatar } = await resp.json();
			const glbUrl = avatar?.url;
			if (!glbUrl) throw new Error('no avatar url');

			const stage  = document.getElementById('stage');
			const viewer = new Viewer(stage, { kiosk: true });
			if (bg === 'transparent') {
				viewer.renderer?.setClearAlpha(0);
				if (viewer.scene) viewer.scene.background = null;
			}
			await viewer.load(glbUrl, '', new Map());

			const avatarCtl = new AgentAvatar(viewer, protocol, identity);
			avatarCtl.attach();

			// Echo every protocol action onto the bridge so hosts can mirror state
			// (chat UIs, telemetry, host-side animation triggers).
			protocol.on('*', (action) => {
				parent?.postMessage({ type: 'agent:action', agentId, action }, '*');
			});

			// Report content height to host so embed-sdk can auto-fit the iframe.
			// Coalesce into rAF so a runaway resize observer can't flood the host.
			let pendingPost = false;
			const reportSize = () => {
				if (pendingPost) return;
				pendingPost = true;
				requestAnimationFrame(() => {
					pendingPost = false;
					const h = Math.ceil(document.documentElement.scrollHeight || stage.clientHeight || 0);
					if (h > 0) postResize(h);
				});
			};
			if (typeof ResizeObserver !== 'undefined') {
				new ResizeObserver(reportSize).observe(document.documentElement);
			}
			reportSize();

			bridgeReady = true;
			postReady();
			while (pendingHellos.length) { pendingHellos.pop(); postReady(); }
		}

		main().catch(err => {
			const el = document.getElementById('error');
			el.textContent = err.message || 'Could not load agent';
			el.style.display = 'flex';
		});
	</script>
</body>
</html>
