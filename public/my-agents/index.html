<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="robots" content="noindex" />
		<title>My Agents · 3D Agent</title>
		<meta name="description" content="Your ERC-8004 agents across every supported chain." />
		<link rel="canonical" href="https://3dagent.vercel.app/my-agents" />
		<link rel="icon" href="/favicon.ico" />
		<link rel="stylesheet" href="/my-agents/my-agents.css" />
	</head>
	<body>
		<header class="discover-header">
			<div class="discover-header__brand"><a href="/">3D Agent</a></div>
			<nav class="discover-header__nav" aria-label="Page navigation">
				<a href="/">Home</a>
				<a href="/dashboard">Dashboard</a>
			</nav>
		</header>

		<main class="discover-main" id="discover-main">
			<h1 class="discover-title">On-chain Agents</h1>
			<p class="discover-subtitle">Agents owned by your linked wallets</p>

			<div
				id="discover-error"
				class="discover-error-banner"
				hidden
				role="alert"
				aria-live="polite"
			></div>

			<div
				id="discover-grid"
				class="discover-grid"
				role="list"
				aria-label="Your on-chain agents"
				aria-live="polite"
				aria-busy="true"
			></div>
		</main>

		<script type="module" src="/my-agents/my-agents.js"></script>
	</body>
</html>
