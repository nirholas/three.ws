<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>CZ · Claim Your three.ws</title>
		<meta name="description" content="Connect your wallet and claim your on-chain three.ws." />
		<meta name="theme-color" content="#080814" />
		<link rel="icon" href="/favicon.ico" />
		<link rel="stylesheet" href="./cz.css" />
		<script
			type="module"
			src="https://three.ws/agent-3d/latest/agent-3d.js"
			crossorigin
		></script>
	</head>
	<body>
		<header>
			<span class="logo">⬡ three.ws</span>
		</header>
		<main>
			<div class="agent-wrap">
				<!-- agent-id is hardcoded once at top of cz.js and set here via JS -->
				<agent-3d id="preview" kiosk eager></agent-3d>
			</div>

			<section class="claim-panel">
				<h1>Welcome, CZ.<br />Claim your on-chain agent.</h1>

				<div id="step-connect" class="step">
					<button id="btn-connect" class="btn-primary">Connect wallet to claim</button>
				</div>

				<div id="step-sign" class="step hidden">
					<p class="wallet-addr" id="wallet-addr"></p>
					<button id="btn-sign" class="btn-primary">⬢ Sign claim transaction</button>
				</div>

				<div id="step-success" class="step hidden">
					<p class="success-msg">
						You now own <strong id="agent-name-display"></strong>. Here's your embed
						snippet.
					</p>
					<div class="snippet-wrap">
						<pre id="snippet-script"></pre>
						<pre id="snippet-tag"></pre>
						<pre id="snippet-iframe"></pre>
					</div>
				</div>

				<div id="step-error" class="step hidden">
					<p class="error-msg" id="error-msg"></p>
					<button id="btn-retry" class="btn-secondary">Try again</button>
				</div>

				<span id="rehearsal-badge" class="rehearsal-badge hidden">rehearsal mode</span>
			</section>
		</main>
		<script type="module" src="./cz.js"></script>
	</body>
</html>
