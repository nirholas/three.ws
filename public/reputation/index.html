<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<title>Agent Reputation — three.ws</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<meta name="description" content="View and submit reviews for on-chain agents." />
		<meta name="theme-color" content="#0a0a0a" />

		<link rel="shortcut icon" href="/favicon.ico" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
			rel="stylesheet"
		/>

		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			html,
			body {
				background: #0a0a0a;
				color: #e5e5e5;
				font-family:
					'Inter',
					-apple-system,
					BlinkMacSystemFont,
					'Segoe UI',
					sans-serif;
				font-size: 16px;
				line-height: 1.5;
				height: 100%;
			}

			body {
				overflow-y: auto;
				overflow-x: hidden;
			}

			main {
				max-width: 800px;
				margin: 0 auto;
				padding: 2rem 1.5rem;
				min-height: 100vh;
			}

			h1,
			h2,
			h3 {
				font-family:
					'Space Grotesk',
					-apple-system,
					BlinkMacSystemFont,
					'Segoe UI',
					sans-serif;
				font-weight: 600;
				letter-spacing: -0.5px;
			}

			h1 {
				font-size: 2rem;
			}
			h3 {
				font-size: 1.125rem;
				margin: 1.5rem 0 1rem;
			}

			a {
				color: #a78bfa;
				text-decoration: none;
			}
			a:hover {
				color: #c4b5fd;
			}

			.rep-header {
				margin-bottom: 2rem;
				padding-bottom: 1.5rem;
				border-bottom: 1px solid rgba(255, 255, 255, 0.06);
			}

			.rep-header h1 {
				margin: 0 0 0.5rem 0;
			}

			.rep-header-meta {
				color: rgba(229, 229, 229, 0.6);
				font-size: 0.875rem;
			}

			.rep-stats {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
				gap: 1rem;
				margin-bottom: 2rem;
				padding: 1.5rem;
				background: rgba(139, 92, 246, 0.04);
				border: 1px solid rgba(139, 92, 246, 0.1);
				border-radius: 8px;
			}

			.rep-stat {
				display: flex;
				flex-direction: column;
				gap: 0.5rem;
			}

			.rep-stat-label {
				font-size: 0.75rem;
				text-transform: uppercase;
				letter-spacing: 1px;
				color: rgba(229, 229, 229, 0.5);
				font-weight: 600;
			}

			.rep-stat-value {
				font-size: 1.75rem;
				font-weight: 700;
				color: #e5e5e5;
				font-family: 'Space Grotesk', monospace;
			}

			.rep-reviews {
				margin-bottom: 2rem;
			}

			.rep-empty {
				text-align: center;
				color: rgba(229, 229, 229, 0.5);
				padding: 2rem 1rem;
			}

			.rep-review-list {
				display: flex;
				flex-direction: column;
				gap: 1rem;
			}

			.rep-review-item {
				padding: 1rem;
				background: rgba(255, 255, 255, 0.02);
				border: 1px solid rgba(255, 255, 255, 0.06);
				border-radius: 6px;
				transition:
					background 0.15s,
					border-color 0.15s;
			}

			.rep-review-item:hover {
				background: rgba(255, 255, 255, 0.04);
				border-color: rgba(255, 255, 255, 0.12);
			}

			.rep-review-header {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-bottom: 0.5rem;
				gap: 1rem;
			}

			.rep-reviewer {
				font-weight: 500;
				font-size: 0.875rem;
				color: rgba(229, 229, 229, 0.7);
				font-family: 'Courier New', monospace;
			}

			.rep-stars {
				font-size: 0.875rem;
				letter-spacing: 2px;
				color: #fbbf24;
			}

			.rep-comment {
				margin: 0.75rem 0;
				color: rgba(229, 229, 229, 0.8);
				font-size: 0.9375rem;
				line-height: 1.6;
				word-wrap: break-word;
				white-space: pre-wrap;
			}

			.rep-review-footer {
				display: flex;
				gap: 0.75rem;
				align-items: center;
				font-size: 0.75rem;
			}

			.rep-review-footer a {
				color: #a78bfa;
			}

			.rep-submit-form {
				margin-top: 2.5rem;
				padding: 1.5rem;
				background: rgba(139, 92, 246, 0.04);
				border: 1px solid rgba(139, 92, 246, 0.1);
				border-radius: 8px;
			}

			.rep-form-group {
				margin-bottom: 1.5rem;
			}

			.rep-form-group label {
				display: block;
				margin-bottom: 0.5rem;
				font-weight: 500;
				font-size: 0.875rem;
			}

			.rep-stars-input {
				display: flex;
				gap: 0.5rem;
				margin-bottom: 0.5rem;
				flex-wrap: wrap;
			}

			.rep-star-btn {
				background: rgba(255, 255, 255, 0.08);
				border: 1px solid rgba(255, 255, 255, 0.12);
				color: rgba(229, 229, 229, 0.6);
				font-size: 0.75rem;
				padding: 0.5rem 0.75rem;
				border-radius: 6px;
				cursor: pointer;
				transition: all 0.15s;
				font-weight: 500;
			}

			.rep-star-btn:hover {
				background: rgba(251, 191, 36, 0.1);
				color: #fbbf24;
				border-color: rgba(251, 191, 36, 0.3);
			}

			.rep-star-btn.selected {
				background: rgba(251, 191, 36, 0.15);
				color: #fbbf24;
				border-color: rgba(251, 191, 36, 0.3);
			}

			textarea {
				width: 100%;
				padding: 0.75rem;
				background: rgba(255, 255, 255, 0.05);
				border: 1px solid rgba(255, 255, 255, 0.12);
				border-radius: 6px;
				color: #e5e5e5;
				font-family: 'Inter', sans-serif;
				font-size: 0.9375rem;
				line-height: 1.5;
				resize: vertical;
			}

			textarea:focus {
				outline: none;
				background: rgba(255, 255, 255, 0.08);
				border-color: rgba(139, 92, 246, 0.3);
			}

			small {
				display: block;
				margin-top: 0.25rem;
				color: rgba(229, 229, 229, 0.5);
				font-size: 0.75rem;
			}

			.rep-submit-btn {
				width: 100%;
				padding: 0.875rem 1.5rem;
				background: #8b5cf6;
				border: 1px solid transparent;
				color: #fff;
				font-weight: 600;
				font-size: 0.9375rem;
				border-radius: 6px;
				cursor: pointer;
				transition: all 0.15s;
			}

			.rep-submit-btn:hover:not(:disabled) {
				background: #7c3aed;
			}

			.rep-submit-btn:disabled {
				opacity: 0.6;
				cursor: not-allowed;
			}

			.rep-form-hint {
				text-align: center;
				color: rgba(229, 229, 229, 0.5);
			}

			#rep-rating {
				display: none;
			}

			.rep-error {
				padding: 2rem;
				text-align: center;
				background: rgba(255, 80, 80, 0.06);
				border: 1px solid rgba(255, 80, 80, 0.2);
				border-radius: 8px;
			}

			.rep-error h3 {
				margin: 0 0 0.5rem 0;
				color: rgba(255, 200, 200, 0.9);
			}

			.rep-error p {
				color: rgba(255, 150, 150, 0.8);
				margin: 0 0 1rem 0;
			}

			.rep-error button {
				padding: 0.5rem 1.5rem;
				background: rgba(255, 100, 100, 0.2);
				border: 1px solid rgba(255, 100, 100, 0.3);
				color: #ffc8c8;
				border-radius: 4px;
				cursor: pointer;
				font-weight: 500;
			}

			.rep-success {
				padding: 1rem;
				background: rgba(100, 200, 100, 0.1);
				border: 1px solid rgba(100, 200, 100, 0.3);
				border-radius: 8px;
				color: #86efac;
			}

			.rep-loading {
				text-align: center;
				padding: 2rem;
				color: rgba(229, 229, 229, 0.5);
			}

			.spinner {
				display: inline-block;
				width: 20px;
				height: 20px;
				border: 2px solid rgba(139, 92, 246, 0.3);
				border-top-color: #8b5cf6;
				border-radius: 50%;
				animation: spin 0.8s linear infinite;
			}

			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}

			@media (max-width: 640px) {
				main {
					padding: 1rem;
				}

				.rep-stats {
					grid-template-columns: repeat(3, 1fr);
					gap: 0.75rem;
					padding: 1rem;
				}

				.rep-stat-value {
					font-size: 1.25rem;
				}

				.rep-review-header {
					flex-direction: column;
					align-items: flex-start;
				}
			}
		</style>
	</head>
	<body>
		<main id="app">
			<div class="rep-loading">
				<div class="spinner"></div>
				<p>Loading reputation…</p>
			</div>
		</main>

		<script type="module" src="./reputation.js"></script>
	</body>
</html>
