<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>3D Agent — LobeHub Embed</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="robots" content="noindex" />
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
				background: transparent;
				overflow: hidden;
			}
			agent-3d {
				display: block;
				width: 100%;
				height: 100%;
			}
			#status {
				position: absolute;
				inset: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				color: rgba(255, 255, 255, 0.4);
				font:
					13px system-ui,
					sans-serif;
				pointer-events: none;
			}
		</style>
		<!--
			Loads the <agent-3d> web component. In production loads from CDN; in dev
			loads from the local Vite dev server so local changes are reflected immediately.
			LobeChat's sandbox CSP must allow module scripts from this origin.
		-->
		<script type="module">
			const CDN = 'https://3dagent.vercel.app/agent-3d/latest/agent-3d.js';
			const h = location.hostname;
			const isLocal = h === 'localhost' || h === '127.0.0.1' || h.endsWith('.github.dev') || h.endsWith('.local');
			import(isLocal ? '/src/lib.js' : CDN);
		</script>
	</head>
	<body>
		<div id="status">Loading…</div>
		<!-- agent-id is set dynamically by boot.js from ?agent= query param -->
		<agent-3d id="agent" kiosk eager></agent-3d>
		<script type="module" src="./boot.js"></script>
	</body>
</html>
