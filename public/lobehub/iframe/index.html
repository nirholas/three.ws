<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>3D Agent — LobeHub Embed</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="robots" content="noindex" />
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
				background: transparent;
				overflow: hidden;
			}
			agent-3d {
				display: block;
				width: 100%;
				height: 100%;
			}
			#status {
				position: absolute;
				inset: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				color: rgba(255, 255, 255, 0.4);
				font:
					13px system-ui,
					sans-serif;
				pointer-events: none;
			}
		</style>
		<!--
			Loads the <agent-3d> web component from the 3D Agent CDN.
			For local development, run `npm run build:lib` and serve dist-lib/ under
			/agent-3d/latest/ so this path resolves without hitting the CDN.
			LobeChat's sandbox CSP must allow module scripts from this origin.
		-->
		<script
			type="module"
			src="https://3dagent.vercel.app/agent-3d/latest/agent-3d.js"
			crossorigin
		></script>
	</head>
	<body>
		<div id="status">Loading…</div>
		<!-- agent-id is set dynamically by boot.js from ?agent= query param -->
		<agent-3d id="agent" kiosk eager></agent-3d>
		<script type="module" src="./boot.js"></script>
	</body>
</html>
