<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard · 3D Agent</title>
<link rel="icon" href="/favicon.ico">
<style>
	:root { color-scheme: dark; --accent:#6a5cff; --accent2:#ff5ca8; --border:#22222e; --bg:#0b0b10; --panel:#14141c; }
	* { box-sizing: border-box; }
	body { font:15px/1.55 -apple-system,system-ui,Segoe UI,Roboto,sans-serif; color:#eee; margin:0; background:var(--bg); min-height:100vh; }
	a { color:#9a8cff; text-decoration:none; }
	header { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:5; }
	.brand { font-weight:600; letter-spacing:-.01em; }
	nav a { margin-right:14px; color:#aaa; font-size:14px; }
	nav a.active { color:#fff; }
	.layout { display:grid; grid-template-columns:220px 1fr; min-height:calc(100vh - 57px); }
	aside { border-right:1px solid var(--border); padding:20px 0; }
	aside a { display:block; padding:9px 20px; color:#aaa; font-size:14px; border-left:2px solid transparent; }
	aside a.active { color:#fff; background:rgba(106,92,255,.08); border-left-color:var(--accent); }
	main { padding:28px; max-width:1100px; }
	h1 { font-size:22px; margin:0 0 6px; letter-spacing:-.01em; }
	.sub { color:#888; margin:0 0 22px; font-size:14px; }
	.cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; }
	.card { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:16px; }
	.card h3 { margin:0 0 4px; font-size:15px; }
	.card .meta { font-size:12px; color:#888; margin:0 0 10px; }
	.preview { aspect-ratio:1/1; background:#0f0f17; border-radius:10px; margin-bottom:10px; overflow:hidden; display:grid; place-items:center; color:#555; font-size:12px; }
	.preview model-viewer { width:100%; height:100%; }
	.row { display:flex; align-items:center; gap:8px; }
	.tag { font-size:11px; padding:2px 7px; border-radius:99px; background:#20202c; color:#ccc; }
	.btn { padding:9px 14px; border-radius:9px; border:0; font-size:13px; font-weight:600; cursor:pointer; background:var(--accent); color:#fff; }
	.btn.sec { background:#222230; color:#ddd; }
	.empty { text-align:center; padding:60px 20px; border:1px dashed var(--border); border-radius:14px; color:#888; }
	.toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
	.err { padding:12px; background:rgba(255,92,92,.1); border:1px solid rgba(255,92,92,.3); border-radius:8px; color:#ffb3b3; margin-bottom:14px; }
	pre { background:#0f0f17; border:1px solid var(--border); border-radius:8px; padding:10px 12px; overflow:auto; font-size:12px; }
	code { font-family: ui-monospace, SF Mono, Menlo, monospace; }
	.key-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
	.key-row:last-child { border:0; }
	.muted { color:#888; font-size:13px; }
	.section { margin-top:34px; }
	input, textarea, select { background:#0f0f17; border:1px solid var(--border); color:#eee; padding:9px 11px; border-radius:8px; font-size:14px; font-family:inherit; }
	input:focus, textarea:focus, select:focus { outline:none; border-color:var(--accent); }
</style>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</head>
<body>
<header>
	<div class="brand"><a href="/">3D Agent</a></div>
	<div class="row">
		<span id="user-email" class="muted"></span>
		<button class="btn sec" onclick="signOut()">Sign out</button>
	</div>
</header>
<div class="layout">
	<aside>
		<a href="#avatars" class="active" data-tab="avatars">Avatars</a>
		<a href="#create" data-tab="create">Create from selfie</a>
		<a href="#upload" data-tab="upload">Upload</a>
		<a href="#embed" data-tab="embed">Embed</a>
		<a href="#keys" data-tab="keys">API keys</a>
		<a href="#mcp" data-tab="mcp">MCP</a>
		<a href="#billing" data-tab="billing">Plan &amp; usage</a>
	</aside>
	<main id="main"></main>
</div>
<script type="module">
import { state, api, navigate, signOut } from './dashboard.js';
window.signOut = signOut;

(async () => {
	try {
		const me = await api.me();
		state.user = me.user;
		document.getElementById('user-email').textContent = me.user.email;
	} catch {
		location.href = '/login.html?next=' + encodeURIComponent(location.pathname + location.hash);
		return;
	}
	navigate(location.hash.slice(1) || 'avatars');
	window.addEventListener('hashchange', () => navigate(location.hash.slice(1) || 'avatars'));
})();
</script>
</body>
</html>
