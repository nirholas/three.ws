<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>Pump.fun relay · Dashboard · three.ws</title>
		<link rel="icon" href="/favicon.ico" />
		<style>
			:root {
				color-scheme: dark;
				--accent: #6a5cff;
				--ok: #4ade80;
				--err: #f87171;
				--border: #22222e;
				--bg: #0b0b10;
				--panel: #14141c;
				--muted: #888;
			}
			* {
				box-sizing: border-box;
			}
			body {
				font:
					15px/1.55 system-ui,
					sans-serif;
				color: #eee;
				margin: 0;
				background: var(--bg);
			}
			header {
				display: flex;
				justify-content: space-between;
				padding: 16px 24px;
				border-bottom: 1px solid var(--border);
			}
			main {
				padding: 28px;
				max-width: 880px;
				margin: 0 auto;
			}
			h1 {
				font-size: 22px;
				margin: 0 0 6px;
			}
			.sub {
				color: var(--muted);
				margin: 0 0 22px;
			}
			.panel {
				background: var(--panel);
				border: 1px solid var(--border);
				border-radius: 14px;
				padding: 18px 20px;
				margin-bottom: 18px;
			}
			label {
				display: block;
				font-size: 13px;
				color: var(--muted);
				margin: 8px 0 4px;
			}
			input,
			select {
				width: 100%;
				padding: 8px 10px;
				background: #0e0e14;
				border: 1px solid var(--border);
				border-radius: 8px;
				color: #eee;
				font: inherit;
			}
			button {
				background: var(--accent);
				color: white;
				border: 0;
				padding: 9px 16px;
				border-radius: 8px;
				font: inherit;
				cursor: pointer;
			}
			button:disabled {
				opacity: 0.5;
				cursor: not-allowed;
			}
			button.ghost {
				background: transparent;
				border: 1px solid var(--border);
				color: #eee;
			}
			.row {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 12px;
			}
			.muted {
				color: var(--muted);
			}
			.ok {
				color: var(--ok);
			}
			.err {
				color: var(--err);
			}
			pre {
				background: #08080c;
				border: 1px solid var(--border);
				border-radius: 8px;
				padding: 10px;
				overflow: auto;
				font-size: 12px;
			}
			table {
				width: 100%;
				border-collapse: collapse;
				font-size: 13px;
			}
			td,
			th {
				padding: 8px 6px;
				border-bottom: 1px solid var(--border);
				text-align: left;
			}
			.mono {
				font-family: ui-monospace, monospace;
			}
		</style>
	</head>
	<body>
		<header>
			<div><a href="/dashboard">← dashboard</a></div>
			<div class="muted">pump.fun relay</div>
		</header>
		<main>
			<h1>Pump.fun relay trading</h1>
			<p class="sub">
				Authorize the three.ws server keypair to execute pump.fun trades on your behalf,
				capped by SOL and TTL. MCP clients without a wallet can then drive trades.
			</p>

			<div class="panel">
				<h2 style="margin-top: 0">Server relayer</h2>
				<div id="relayer-info">Loading…</div>
			</div>

			<div class="panel">
				<h2 style="margin-top: 0">Authorize</h2>
				<div class="row">
					<div>
						<label>Wallet (base58)</label>
						<input id="wallet" placeholder="paste your Solana wallet pubkey" />
					</div>
					<div>
						<label>Network</label>
						<select id="network">
							<option>mainnet</option>
							<option>devnet</option>
						</select>
					</div>
				</div>
				<div class="row">
					<div>
						<label>Max SOL (cumulative cap)</label>
						<input
							id="max-sol"
							type="number"
							min="0.01"
							max="100"
							step="0.01"
							value="0.5"
						/>
					</div>
					<div>
						<label>TTL (hours)</label>
						<input id="ttl-hours" type="number" min="1" max="720" value="24" />
					</div>
				</div>
				<div class="row">
					<div>
						<label>Direction</label>
						<select id="direction">
							<option>both</option>
							<option>buy</option>
							<option>sell</option>
						</select>
					</div>
					<div>
						<label>Mint filter (optional)</label>
						<input id="mint-filter" placeholder="lock to a single mint" />
					</div>
				</div>
				<div style="margin-top: 14px; display: flex; gap: 8px">
					<button id="authorize">Sign + authorize</button>
					<button id="refresh" class="ghost">Refresh delegations</button>
				</div>
				<div id="status" class="muted" style="margin-top: 10px"></div>
			</div>

			<div class="panel">
				<h2 style="margin-top: 0">Active delegations</h2>
				<div id="delegations">Loading…</div>
			</div>
		</main>

		<script type="module">
			function buildRelayAuthorizationMessage({
				userWallet,
				relayerPubkey,
				maxSol,
				mint,
				direction = 'both',
				network = 'mainnet',
				ttlHours = 24,
				domain = location.host,
			}) {
				const issuedAt = new Date().toISOString();
				const expiresAt = new Date(Date.now() + ttlHours * 3600 * 1000).toISOString();
				const nonce = Math.random().toString(36).slice(2, 14);
				const statement =
					`Authorize three.ws relayer ${relayerPubkey} to trade pump.fun on my behalf.\n` +
					`max=${maxSol}\nexpires=${expiresAt}\ndirection=${direction}` +
					(mint ? `\nmint=${mint}` : '');
				return [
					`${domain} wants you to sign in with your Solana account:`,
					userWallet,
					'',
					statement,
					'',
					`URI: https://${domain}/api/pump/relay-authorize`,
					'Version: 1',
					`Chain ID: ${network}`,
					`Nonce: ${nonce}`,
					`Issued At: ${issuedAt}`,
					`Expiration Time: ${expiresAt}`,
				].join('\n');
			}

			const $ = (id) => document.getElementById(id);
			let RELAYER_PUBKEY = null;

			async function loadRelayerInfo() {
				try {
					const r = await fetch('/api/pump/relayer-info').then((r) => r.json());
					if (r.relayer_pubkey) {
						RELAYER_PUBKEY = r.relayer_pubkey;
						$('relayer-info').innerHTML =
							`<div class="mono" style="word-break:break-all">${r.relayer_pubkey}</div><div class="muted" style="margin-top:4px">Fund this address with SOL to cover trade fees.</div>`;
					} else {
						$('relayer-info').innerHTML =
							`<span class="err">Relayer not configured (PUMP_RELAYER_SECRET_KEY_B64 unset)</span>`;
					}
				} catch (e) {
					$('relayer-info').innerHTML = `<span class="err">${e.message}</span>`;
				}
			}

			async function loadDelegations() {
				try {
					const r = await fetch('/api/pump/relay-delegations', {
						credentials: 'include',
					});
					if (!r.ok) throw new Error(`${r.status}`);
					const data = await r.json();
					if (!data.data || data.data.length === 0) {
						$('delegations').innerHTML =
							'<div class="muted">No active delegations.</div>';
						return;
					}
					const rows = data.data
						.map(
							(d) => `
						<tr>
							<td class="mono" style="font-size:12px">${d.id.slice(0, 8)}…</td>
							<td>${d.network}</td>
							<td>${(Number(d.max_sol_lamports) / 1e9).toFixed(3)} SOL</td>
							<td>${(Number(d.spent_sol_lamports) / 1e9).toFixed(3)}</td>
							<td>${d.direction_filter}</td>
							<td>${new Date(d.expires_at).toLocaleString()}</td>
							<td><button data-id="${d.id}" class="ghost revoke">Revoke</button></td>
						</tr>
					`,
						)
						.join('');
					$('delegations').innerHTML = `
						<table>
							<thead><tr><th>id</th><th>net</th><th>cap</th><th>spent</th><th>dir</th><th>expires</th><th></th></tr></thead>
							<tbody>${rows}</tbody>
						</table>
					`;
					$('delegations')
						.querySelectorAll('button.revoke')
						.forEach((b) => b.addEventListener('click', () => revoke(b.dataset.id)));
				} catch (e) {
					$('delegations').innerHTML = `<span class="err">${e.message}</span>`;
				}
			}

			async function authorize() {
				const btn = $('authorize');
				btn.disabled = true;
				$('status').textContent = '';
				$('status').className = 'muted';
				try {
					if (!RELAYER_PUBKEY) throw new Error('relayer not loaded');
					const wallet = $('wallet').value.trim();
					if (!wallet) throw new Error('wallet required');
					const maxSol = Number($('max-sol').value);
					const network = $('network').value;
					const direction = $('direction').value;
					const mintFilter = $('mint-filter').value.trim() || null;
					const ttlHours = Number($('ttl-hours').value);

					const message = buildRelayAuthorizationMessage({
						userWallet: wallet,
						relayerPubkey: RELAYER_PUBKEY,
						maxSol,
						mint: mintFilter,
						direction,
						network,
						ttlHours,
					});

					const provider = window.solana || window.phantom?.solana;
					if (!provider) throw new Error('No Solana wallet detected (install Phantom).');
					if (!provider.isConnected) await provider.connect();
					const encoded = new TextEncoder().encode(message);
					const { signature } = await provider.signMessage(encoded, 'utf8');
					const bs58 = await import('https://esm.sh/bs58@5');
					const sigB58 = bs58.default.encode(signature);

					const res = await fetch('/api/pump/relay-authorize', {
						method: 'POST',
						credentials: 'include',
						headers: { 'content-type': 'application/json' },
						body: JSON.stringify({
							user_wallet: wallet,
							max_sol: maxSol,
							direction_filter: direction,
							mint_filter: mintFilter || undefined,
							network,
							ttl_hours: ttlHours,
							siws_message: message,
							siws_signature: sigB58,
						}),
					});
					const j = await res.json();
					if (!res.ok) throw new Error(j.error_description || j.error || `${res.status}`);
					$('status').textContent = `Authorized · delegation ${j.delegation_id}`;
					$('status').className = 'ok';
					await loadDelegations();
				} catch (e) {
					$('status').textContent = `Error: ${e.message}`;
					$('status').className = 'err';
				} finally {
					btn.disabled = false;
				}
			}

			async function revoke(id) {
				if (!confirm('Revoke this delegation?')) return;
				const res = await fetch('/api/pump/relay-revoke', {
					method: 'POST',
					credentials: 'include',
					headers: { 'content-type': 'application/json' },
					body: JSON.stringify({ delegation_id: id }),
				});
				if (!res.ok) {
					const j = await res.json().catch(() => ({}));
					alert(`Revoke failed: ${j.error_description || res.status}`);
					return;
				}
				await loadDelegations();
			}

			$('authorize').addEventListener('click', authorize);
			$('refresh').addEventListener('click', loadDelegations);

			loadRelayerInfo();
			loadDelegations();
		</script>
	</body>
</html>
