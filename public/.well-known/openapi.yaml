      responses:
        "200":
          description: Authorization server metadata
          headers:
            Cache-Control:
              schema:
                type: string
                example: public, max-age=300
          content:
            application/json:
              schema:
                type: object
                properties:
                  issuer:
                    type: string
                    format: uri
                  authorization_endpoint:
                    type: string
                    format: uri
                  token_endpoint:
                    type: string
                    format: uri
                  registration_endpoint:
                    type: string
                    format: uri
                  revocation_endpoint:
                    type: string
                    format: uri
                  introspection_endpoint:
                    type: string
                    format: uri
                  response_types_supported:
                    type: array
                    items:
                      type: string
                  grant_types_supported:
                    type: array
                    items:
                      type: string
                  code_challenge_methods_supported:
                    type: array
                    items:
                      type: string
                  token_endpoint_auth_methods_supported:
                    type: array
                    items:
                      type: string
                  scopes_supported:
                    type: array
                    items:
                      type: string
                  service_documentation:
                    type: string
                    format: uri
                  ui_locales_supported:
                    type: array
                    items:
                      type: string

  /.well-known/oauth-protected-resource:
    get:
      operationId: oauthProtectedResourceMetadata
      tags: [Discovery]
      summary: OAuth 2.0 Protected Resource Metadata (RFC 9728)
      description: Cached for 300 seconds.
      responses:
        "200":
          description: Protected resource metadata
          headers:
            Cache-Control:
              schema:
                type: string
                example: public, max-age=300
          content:
            application/json:
              schema:
                type: object
                properties:
                  resource:
                    type: string
                    format: uri
                  authorization_servers:
                    type: array
                    items:
                      type: string
                      format: uri
                  bearer_methods_supported:
                    type: array
                    items:
                      type: string
                  resource_documentation:
                    type: string
                    format: uri
                  scopes_supported:
                    type: array
                    items:
                      type: string

