<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Admin · three.ws</title>
	<link rel="icon" href="/favicon.ico" />
	<style>
		:root { color-scheme: dark; --accent: #6a5cff; --accent2: #ff5ca8; }
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body { font: 14px/1.5 -apple-system,system-ui,'Segoe UI',sans-serif; background: #080814; color: #ccc; min-height: 100vh; }
		a { color: #9a8cff; text-decoration: none; }
		a:hover { text-decoration: underline; }

		/* Layout */
		.layout { display: flex; min-height: 100vh; }
		.sidebar { width: 200px; background: #0d0d1a; border-right: 1px solid #1e1e2e; padding: 20px 0; flex-shrink: 0; }
		.sidebar-brand { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); padding: 0 20px 20px; display: block; }
		.sidebar-badge { display: inline-block; background: rgba(255,70,70,.15); color: #ff6060; font-size: 10px; padding: 1px 6px; border-radius: 4px; margin-left: 6px; }
		.nav-item { display: block; padding: 9px 20px; color: #888; cursor: pointer; border-left: 2px solid transparent; font-size: 13px; }
		.nav-item:hover { color: #eee; background: #12121e; }
		.nav-item.active { color: #eee; border-left-color: var(--accent); background: #12121e; }
		.main { flex: 1; padding: 32px; overflow-y: auto; }

		/* Header */
		.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
		.page-title { font-size: 20px; color: #eee; font-weight: 600; }
		.user-chip { font-size: 12px; color: #666; }

		/* Cards */
		.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 12px; margin-bottom: 28px; }
		.stat-card { background: #0f0f1a; border: 1px solid #1e1e2e; border-radius: 10px; padding: 16px; }
		.stat-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
		.stat-value { font-size: 26px; color: #eee; font-weight: 600; }
		.stat-sub { font-size: 11px; color: #555; margin-top: 2px; }

		/* Section */
		.section { background: #0f0f1a; border: 1px solid #1e1e2e; border-radius: 10px; margin-bottom: 20px; }
		.section-head { padding: 14px 18px; border-bottom: 1px solid #1e1e2e; display: flex; align-items: center; gap: 12px; }
		.section-title { font-size: 14px; color: #eee; font-weight: 500; }
		.section-body { padding: 0; }

		/* Table */
		table { width: 100%; border-collapse: collapse; font-size: 13px; }
		th { text-align: left; padding: 10px 16px; color: #555; font-weight: 500; border-bottom: 1px solid #1a1a26; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
		td { padding: 10px 16px; border-bottom: 1px solid #111118; color: #aaa; vertical-align: middle; }
		tr:last-child td { border-bottom: none; }
		tr:hover td { background: #121218; }

		/* Badges */
		.badge { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 500; }
		.badge-free { background: #1a1a26; color: #666; }
		.badge-pro { background: rgba(106,92,255,.18); color: #9a8cff; }
		.badge-team { background: rgba(0,200,150,.12); color: #00c896; }
		.badge-enterprise { background: rgba(255,92,168,.12); color: #ff5ca8; }
		.badge-evm { background: rgba(255,165,0,.1); color: #f90; }
		.badge-solana { background: rgba(20,241,149,.1); color: #14f195; }
		.badge-admin { background: rgba(255,70,70,.15); color: #ff6060; }

		/* Controls */
		.controls { display: flex; gap: 10px; align-items: center; }
		input[type=text], select {
			padding: 7px 12px; background: #0f0f17; border: 1px solid #2a2a36; border-radius: 7px;
			color: #eee; font-size: 13px; outline: none;
		}
		input[type=text]:focus, select:focus { border-color: var(--accent); }
		.btn { padding: 7px 14px; border: 0; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; }
		.btn-primary { background: var(--accent); color: #fff; }
		.btn-danger  { background: rgba(255,70,70,.15); color: #ff6060; border: 1px solid rgba(255,70,70,.3); }
		.btn-sm { padding: 4px 10px; font-size: 12px; }
		.btn:disabled { opacity: .5; cursor: default; }

		/* User detail drawer */
		.drawer { display: none; position: fixed; top: 0; right: 0; width: 420px; height: 100vh; background: #0d0d1a; border-left: 1px solid #1e1e2e; padding: 24px; overflow-y: auto; z-index: 100; box-shadow: -8px 0 32px rgba(0,0,0,.5); }
		.drawer.open { display: block; }
		.drawer-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #666; font-size: 18px; cursor: pointer; }
		.drawer h2 { font-size: 16px; color: #eee; margin-bottom: 16px; }
		.field { margin-bottom: 14px; }
		.field label { display: block; font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
		.field-val { color: #aaa; font-size: 13px; word-break: break-all; }

		/* Pager */
		.pager { display: flex; align-items: center; gap: 12px; padding: 12px 16px; font-size: 13px; color: #555; }
		.pager button { background: #1a1a26; border: 1px solid #2a2a36; color: #aaa; border-radius: 6px; padding: 4px 12px; cursor: pointer; font-size: 12px; }
		.pager button:disabled { opacity: .4; cursor: default; }

		/* Loading / empty */
		.empty { padding: 40px; text-align: center; color: #444; font-size: 14px; }
		.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
		@keyframes spin { to { transform: rotate(360deg); } }

		/* Charts */
		.chart-wrap { padding: 16px 18px; }
		.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 12px; }
		.bar-label { width: 80px; color: #666; text-align: right; flex-shrink: 0; }
		.bar-track { flex: 1; background: #1a1a26; border-radius: 4px; height: 8px; }
		.bar-fill  { height: 8px; border-radius: 4px; background: linear-gradient(90deg,var(--accent),var(--accent2)); }
		.bar-count { width: 40px; color: #aaa; flex-shrink: 0; }
	</style>
</head>
<body>
<div class="layout" id="app">
	<nav class="sidebar">
		<span class="sidebar-brand">three.ws <span class="sidebar-badge">ADMIN</span></span>
		<a class="nav-item active" data-tab="overview" onclick="switchTab('overview')">Overview</a>
		<a class="nav-item" data-tab="users" onclick="switchTab('users')">Users</a>
		<a class="nav-item" href="/dashboard/">Dashboard</a>
	</nav>
	<main class="main">
		<div class="page-header">
			<span class="page-title" id="page-title">Overview</span>
			<span class="user-chip" id="user-chip"></span>
		</div>
		<div id="tab-overview"></div>
		<div id="tab-users" style="display:none"></div>
	</main>
</div>

<!-- User detail drawer -->
<div class="drawer" id="drawer">
	<button class="drawer-close" onclick="closeDrawer()">✕</button>
	<div id="drawer-content"></div>
</div>

<script>
const api = {
	get: (url) => fetch(url, { credentials: 'include' }).then((r) => r.json()),
	patch: (url, body) => fetch(url, { method: 'PATCH', credentials: 'include', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body) }).then((r) => r.json()),
};

let state = { tab: 'overview', usersPage: 1, usersQ: '', usersPlan: '', statsData: null };

// ── Auth guard ──────────────────────────────────────────────────────────────

async function boot() {
	const me = await api.get('/api/auth/me').catch(() => null);
	if (!me?.user) return location.replace('/login?next=/admin/');
	document.getElementById('user-chip').textContent = me.user.display_name || me.user.email || '';
	switchTab('overview');
}

// ── Tab routing ─────────────────────────────────────────────────────────────

function switchTab(tab) {
	state.tab = tab;
	document.querySelectorAll('.nav-item[data-tab]').forEach((el) => el.classList.toggle('active', el.dataset.tab === tab));
	document.getElementById('tab-overview').style.display = tab === 'overview' ? '' : 'none';
	document.getElementById('tab-users').style.display    = tab === 'users'    ? '' : 'none';
	document.getElementById('page-title').textContent = tab === 'overview' ? 'Overview' : 'Users';
	if (tab === 'overview' && !state.statsData) loadOverview();
	if (tab === 'users') loadUsers();
}

// ── Overview tab ─────────────────────────────────────────────────────────────

async function loadOverview() {
	const el = document.getElementById('tab-overview');
	el.innerHTML = '<div class="empty"><span class="spinner"></span></div>';
	const data = await api.get('/api/admin/stats');
	if (data.error) { el.innerHTML = `<div class="empty">Error: ${data.error_description}</div>`; return; }
	state.statsData = data;
	const c = data.counts;

	el.innerHTML = `
		<div class="stat-grid">
			${statCard('Total users', c.total_users)}
			${statCard('New (7d)', c.new_users_7d)}
			${statCard('New (30d)', c.new_users_30d)}
			${statCard('Active sessions', c.active_sessions)}
			${statCard('Total avatars', c.total_avatars)}
			${statCard('Storage', fmtBytes(c.total_bytes))}
			${statCard('Total agents', c.total_agents)}
			${statCard('Active subs', c.active_subscriptions)}
		</div>
		<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
			<div class="section">
				<div class="section-head"><span class="section-title">Plan breakdown</span></div>
				<div class="chart-wrap" id="plan-chart"></div>
			</div>
			<div class="section">
				<div class="section-head"><span class="section-title">Chain breakdown</span></div>
				<div class="chart-wrap" id="chain-chart"></div>
			</div>
		</div>
	`;

	const maxPlan = Math.max(...data.planBreakdown.map((r) => r.users), 1);
	document.getElementById('plan-chart').innerHTML = data.planBreakdown.map((r) =>
		`<div class="bar-row">
			<span class="bar-label">${r.plan}</span>
			<div class="bar-track"><div class="bar-fill" style="width:${Math.round(r.users/maxPlan*100)}%"></div></div>
			<span class="bar-count">${r.users}</span>
		</div>`
	).join('');

	const maxChain = Math.max(...data.chainBreakdown.map((r) => r.wallets), 1);
	document.getElementById('chain-chart').innerHTML = data.chainBreakdown.map((r) =>
		`<div class="bar-row">
			<span class="bar-label">${r.chain_type}</span>
			<div class="bar-track"><div class="bar-fill" style="width:${Math.round(r.wallets/maxChain*100)}%"></div></div>
			<span class="bar-count">${r.wallets}</span>
		</div>`
	).join('');
}

function statCard(label, value) {
	return `<div class="stat-card"><div class="stat-label">${label}</div><div class="stat-value">${value ?? '—'}</div></div>`;
}

// ── Users tab ──────────────────────────────────────────────────────────────

async function loadUsers() {
	const el = document.getElementById('tab-users');
	const q = state.usersQ, plan = state.usersPlan, page = state.usersPage;

	if (!el.querySelector('.section')) {
		el.innerHTML = `
			<div class="section">
				<div class="section-head">
					<span class="section-title">Users</span>
					<div class="controls" style="margin-left:auto">
						<input type="text" id="u-search" placeholder="Search email / wallet…" value="${q}" style="width:220px" oninput="debounceSearch(this.value)">
						<select id="u-plan" onchange="filterPlan(this.value)">
							<option value="">All plans</option>
							<option value="free">Free</option>
							<option value="pro">Pro</option>
							<option value="team">Team</option>
							<option value="enterprise">Enterprise</option>
						</select>
					</div>
				</div>
				<div class="section-body">
					<div id="users-table-wrap"><div class="empty"><span class="spinner"></span></div></div>
				</div>
				<div class="pager" id="users-pager"></div>
			</div>
		`;
		document.getElementById('u-plan').value = plan;
	}

	document.getElementById('users-table-wrap').innerHTML = '<div class="empty"><span class="spinner"></span></div>';
	const params = new URLSearchParams({ q, page, limit: 50, ...(plan ? { plan } : {}) });
	const data = await api.get('/api/admin/users?' + params);
	if (data.error) {
		document.getElementById('users-table-wrap').innerHTML = `<div class="empty">Error: ${data.error_description}</div>`;
		return;
	}

	const rows = data.users.map((u) => {
		const wallets = (u.wallets || []).map((w) =>
			`<span class="badge badge-${w.chain_type}">${w.chain_type === 'solana' ? shortAddr(w.address, 4) : shortAddr(w.address, 6)}</span>`
		).join(' ');
		return `<tr onclick="openDrawer('${u.id}')" style="cursor:pointer">
			<td>${u.display_name || '<span style="color:#444">—</span>'}</td>
			<td style="color:#666;font-size:12px">${u.email}</td>
			<td>${wallets || '<span style="color:#444">—</span>'}</td>
			<td><span class="badge badge-${u.plan}">${u.plan}</span>${u.is_admin ? ' <span class="badge badge-admin">admin</span>' : ''}</td>
			<td style="color:#555;font-size:12px">${fmtDate(u.created_at)}</td>
			<td>${u.avatar_count}</td>
		</tr>`;
	}).join('');

	document.getElementById('users-table-wrap').innerHTML = rows.length
		? `<table><thead><tr><th>Name</th><th>Email</th><th>Wallets</th><th>Plan</th><th>Joined</th><th>Avatars</th></tr></thead><tbody>${rows}</tbody></table>`
		: '<div class="empty">No users found.</div>';

	const total = data.total;
	const pages = Math.ceil(total / data.limit);
	document.getElementById('users-pager').innerHTML = `
		<button onclick="changePage(${page-1})" ${page <= 1 ? 'disabled' : ''}>← Prev</button>
		<span>Page ${page} of ${pages} &nbsp;(${total} total)</span>
		<button onclick="changePage(${page+1})" ${page >= pages ? 'disabled' : ''}>Next →</button>
	`;
}

let _debounceTimer;
function debounceSearch(val) {
	clearTimeout(_debounceTimer);
	_debounceTimer = setTimeout(() => { state.usersQ = val; state.usersPage = 1; loadUsers(); }, 300);
}
function filterPlan(val) { state.usersPlan = val; state.usersPage = 1; loadUsers(); }
function changePage(p) { state.usersPage = p; loadUsers(); }

// ── User drawer ────────────────────────────────────────────────────────────

async function openDrawer(id) {
	const drawer = document.getElementById('drawer');
	const content = document.getElementById('drawer-content');
	content.innerHTML = '<div class="empty"><span class="spinner"></span></div>';
	drawer.classList.add('open');

	const data = await api.get(`/api/admin/user/${id}`);
	if (data.error) { content.innerHTML = `<div class="empty">${data.error_description}</div>`; return; }
	const u = data.user;
	const wallets = (u.wallets || []).map((w) =>
		`<div style="margin:3px 0"><span class="badge badge-${w.chain_type}">${w.chain_type}</span> <code style="font-size:11px;color:#888">${w.address}</code>${w.is_primary ? ' <span style="color:#555;font-size:11px">primary</span>' : ''}</div>`
	).join('');
	const subs = (u.subscriptions || []).map((s) =>
		`<div style="font-size:12px;color:#888">${s.plan} · ${s.chain_type} · <span style="color:${s.status==='active'?'#00c896':'#ff6060'}">${s.status}</span></div>`
	).join('') || '<span style="color:#444">none</span>';

	content.innerHTML = `
		<h2>${u.display_name || 'Unnamed user'}</h2>
		<div class="field"><label>ID</label><div class="field-val"><code style="font-size:11px">${u.id}</code></div></div>
		<div class="field"><label>Email</label><div class="field-val">${u.email}</div></div>
		<div class="field"><label>Wallets</label><div class="field-val">${wallets || '—'}</div></div>
		<div class="field"><label>Plan</label>
			<div style="display:flex;align-items:center;gap:8px;margin-top:4px">
				<select id="d-plan" style="font-size:13px">
					<option value="free"${u.plan==='free'?' selected':''}>Free</option>
					<option value="pro"${u.plan==='pro'?' selected':''}>Pro</option>
					<option value="team"${u.plan==='team'?' selected':''}>Team</option>
					<option value="enterprise"${u.plan==='enterprise'?' selected':''}>Enterprise</option>
				</select>
				<button class="btn btn-primary btn-sm" onclick="updateUser('${u.id}',{plan:document.getElementById('d-plan').value})">Save</button>
			</div>
		</div>
		<div class="field"><label>Admin</label>
			<div style="display:flex;align-items:center;gap:8px;margin-top:4px">
				<input type="checkbox" id="d-admin" ${u.is_admin ? 'checked' : ''}>
				<label for="d-admin" style="font-size:13px;text-transform:none;letter-spacing:0;color:#aaa">Is admin</label>
				<button class="btn btn-primary btn-sm" onclick="updateUser('${u.id}',{is_admin:document.getElementById('d-admin').checked})">Save</button>
			</div>
		</div>
		<div class="field"><label>Subscriptions</label><div class="field-val">${subs}</div></div>
		<div class="field"><label>Avatars</label><div class="field-val">${u.avatar_count}</div></div>
		<div class="field"><label>Agents</label><div class="field-val">${u.agent_count}</div></div>
		<div class="field"><label>Active sessions</label><div class="field-val">${u.active_sessions}</div></div>
		<div class="field"><label>Joined</label><div class="field-val">${fmtDate(u.created_at)}</div></div>
		${u.deleted_at ? `<div style="color:#ff6060;font-size:13px;margin-top:8px">Deleted ${fmtDate(u.deleted_at)}</div>` : ''}
		<div style="margin-top:20px;display:flex;gap:8px">
			${u.deleted_at
				? `<button class="btn btn-primary btn-sm" onclick="updateUser('${u.id}',{deleted:false})">Restore</button>`
				: `<button class="btn btn-danger btn-sm" onclick="confirmDelete('${u.id}')">Delete account</button>`}
		</div>
		<div id="drawer-msg" style="margin-top:12px;font-size:13px;min-height:20px"></div>
	`;
}

async function updateUser(id, patch) {
	const msg = document.getElementById('drawer-msg');
	if (msg) msg.textContent = 'Saving…';
	const data = await api.patch(`/api/admin/user/${id}`, patch);
	if (data.error) { if (msg) msg.style.color='#ff6060', msg.textContent = data.error_description; return; }
	if (msg) { msg.style.color='#00c896'; msg.textContent = 'Saved.'; }
	state.statsData = null;
	setTimeout(() => openDrawer(id), 500);
}

function confirmDelete(id) {
	if (!confirm('Delete this account? This soft-deletes the user and their content. On-chain data is unaffected.')) return;
	updateUser(id, { deleted: true });
}

function closeDrawer() { document.getElementById('drawer').classList.remove('open'); }

// ── Utils ─────────────────────────────────────────────────────────────────────

function fmtDate(iso) { return iso ? new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) : '—'; }
function fmtBytes(b) { if (!b) return '0 B'; const u=['B','KB','MB','GB','TB']; let i=0; while(b>=1024&&i<4){b/=1024;i++;} return b.toFixed(i?1:0)+' '+u[i]; }
function shortAddr(a, n=6) { return a ? `${a.slice(0,n)}…${a.slice(-4)}` : '—'; }

boot();
</script>
</body>
</html>
