<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>Forgot password Â· three.ws</title>
		<link rel="icon" href="/favicon.ico" />
		<link rel="stylesheet" href="/auth.css" />
		<script
			type="module"
			src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"
		></script>
		<style>
			:root { color-scheme: dark; }
			body { background: #000; color: #f0f0f0; }
			a { color: #c8d0e0; text-decoration: none; }
			a:hover { color: #fff; }
			.shell {
				background: #0c0c0c;
				border: 1px solid rgba(255, 255, 255, 0.08);
				box-shadow:
					0 0 0 1px rgba(255, 255, 255, 0.03),
					0 30px 80px rgba(0, 0, 0, 0.85),
					0 0 120px rgba(200, 210, 255, 0.04);
			}
			.card {
				background: #0c0c0c;
				border: 0;
				border-radius: 0;
				padding: 56px 56px;
				flex: 1;
				width: 100%;
				max-width: 520px;
				display: flex;
				flex-direction: column;
				justify-content: center;
				overflow-y: auto;
			}
			@media (max-width: 860px) {
				.card { padding: 32px 28px; max-width: none; }
			}
			h1 {
				font-size: 22px;
				font-weight: 600;
				margin: 0 0 4px;
				letter-spacing: -0.02em;
				color: #fff;
			}
			.sub {
				color: #888;
				margin: 0 0 22px;
				font-size: 14px;
			}
			.brand {
				margin: 0 0 18px;
				text-decoration: none;
				display: inline-block;
				opacity: 0.85;
				transition: opacity 0.15s;
			}
			.brand img { height: 40px; width: auto; display: block; }
			.brand:hover { opacity: 1; }
			label {
				display: block;
				font-size: 12px;
				font-weight: 500;
				letter-spacing: 0.02em;
				color: #666;
				margin: 16px 0 6px;
				text-transform: uppercase;
				transition: color 0.1s ease;
			}
			label.lit { color: #bbb; }
			input {
				width: 100%;
				padding: 11px 14px;
				background: #060606;
				border: 1px solid rgba(255, 255, 255, 0.07);
				border-radius: 10px;
				color: #f0f0f0;
				font-size: 15px;
				transition: border-color 0.08s ease, box-shadow 0.08s ease, background 0.08s ease;
			}
			input::placeholder { color: #333; }
			input:focus {
				outline: none;
				border-color: rgba(255, 255, 255, 0.45);
				box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.06);
				background: #080808;
			}
			.field-hint {
				font-size: 12px;
				margin-top: 4px;
				color: #555;
				transition: color 0.15s;
			}
			button {
				width: 100%;
				margin-top: 20px;
				padding: 12px 16px;
				border: 0;
				border-radius: 10px;
				background: #fff;
				color: #000;
				font-weight: 600;
				font-size: 15px;
				cursor: pointer;
				letter-spacing: -0.01em;
				transition: background 0.15s, opacity 0.15s, transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1);
			}
			button:hover:not(:disabled) { background: #e8ecf4; }
			button:active:not(:disabled) { transform: scale(0.965); }
			button:disabled { opacity: 0.35; cursor: default; }
			.err {
				margin-top: 14px;
				padding: 10px 12px;
				background: rgba(255, 255, 255, 0.04);
				border: 1px solid rgba(255, 255, 255, 0.1);
				border-radius: 8px;
				color: #aaa;
				font-size: 13px;
				display: none;
			}
			.ok {
				margin-top: 14px;
				padding: 10px 12px;
				background: rgba(92, 200, 130, 0.08);
				border: 1px solid rgba(92, 200, 130, 0.3);
				border-radius: 8px;
				color: #b3e6c4;
				font-size: 13px;
			}
			.foot {
				margin-top: 22px;
				text-align: center;
				font-size: 13px;
				color: #666;
			}
		</style>
	</head>
	<body>
		<div class="shell">
			<form class="card" id="f">
				<a href="/" class="brand"><img src="/three.svg" alt="three.ws" /></a>
				<h1>Forgot password</h1>
				<p class="sub">Enter your email and we'll send you a reset link.</p>
				<label for="email">Email</label>
				<input
					id="email"
					type="email"
					autocomplete="email"
					required
					aria-describedby="email-hint"
				/>
				<p class="field-hint" id="email-hint">We'll send you a link to reset your password.</p>
				<button id="submit" type="submit">Send reset link</button>
				<div class="err" id="err" role="alert"></div>
				<div class="ok" id="ok" style="display:none">
					If an account exists for that email, a reset link has been sent.
				</div>
				<p class="foot"><a href="/login">Back to sign in</a></p>
			</form>
			<div class="panel">
				<a href="/" class="panel-brand" aria-label="three.ws home">three.ws</a>
				<div class="agent-avatar loading" id="forgot-avatar-wrap" aria-hidden="true">
					<model-viewer
						id="forgot-avatar"
						src="/avatars/cz.glb"
						alt=""
						autoplay
						animation-name="IdleV4.2(maya_head)"
						disable-zoom
						interaction-prompt="none"
						shadow-intensity="0.6"
						shadow-softness="1"
						exposure="1.05"
						tone-mapping="aces"
						environment-image="neutral"
						camera-orbit="0deg 88deg 4.8m"
						field-of-view="32deg"
						loading="eager"
					></model-viewer>
				</div>
			</div>
		</div>
		<script>
			// Avatar look-around + parallax + skeleton
			(function () {
				const viewer = document.getElementById('forgot-avatar');
				const wrap = document.getElementById('forgot-avatar-wrap');
				if (!viewer) return;
				viewer.addEventListener('load', () => wrap?.classList.remove('loading'));
				const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
				const BASE_AZ = 0, BASE_POL = 88, AZ_RANGE = 30, POL_RANGE = 14;
				let targetAz = BASE_AZ, targetPol = BASE_POL;
				let curAz = BASE_AZ, curPol = BASE_POL;
				let targetTx = 0, targetTy = 0, curTx = 0, curTy = 0;
				let nod = 0;
				const lerp = (a, b, t) => a + (b - a) * t;
				function tick() {
					curAz = lerp(curAz, targetAz, 0.1);
					curPol = lerp(curPol, targetPol + nod, 0.18);
					curTx = lerp(curTx, targetTx, 0.08);
					curTy = lerp(curTy, targetTy, 0.08);
					nod *= 0.85;
					viewer.setAttribute('camera-orbit', `${curAz}deg ${curPol}deg 4.8m`);
					if (wrap) wrap.style.transform = `translate(${curTx.toFixed(2)}px, ${curTy.toFixed(2)}px)`;
					requestAnimationFrame(tick);
				}
				if (reducedMotion) return;
				requestAnimationFrame(tick);
				window.addEventListener('mousemove', (e) => {
					const nx = e.clientX / window.innerWidth - 0.5;
					const ny = e.clientY / window.innerHeight - 0.5;
					targetAz = BASE_AZ - nx * AZ_RANGE * 2;
					targetPol = BASE_POL + ny * POL_RANGE * 2;
					targetTx = -nx * 10;
					targetTy = -ny * 8;
				}, { passive: true });
				document.querySelectorAll('#f input').forEach((el) => {
					el.addEventListener('keydown', (e) => {
						if (e.key.length === 1 || e.key === 'Backspace') {
							nod = (nod >= 0 ? -1 : 1) * 4;
						}
					});
				});
			})();

			// Inline email validation hint
			(function () {
				const input = document.getElementById('email');
				const hint = document.getElementById('email-hint');
				if (!input || !hint) return;
				const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
				input.addEventListener('input', () => {
					const v = input.value.trim();
					if (!v) {
						hint.classList.remove('valid', 'invalid');
						hint.textContent = "We'll send you a link to reset your password.";
					} else if (re.test(v)) {
						hint.classList.add('valid'); hint.classList.remove('invalid');
						hint.textContent = 'âś“ Looks valid';
					} else {
						hint.classList.add('invalid'); hint.classList.remove('valid');
						hint.textContent = 'Enter a valid email address.';
					}
				});
			})();

			// Label "lit" on focus
			document.querySelectorAll('#f input').forEach((input) => {
				const label = document.querySelector(`label[for="${input.id}"]`);
				if (!label) return;
				input.addEventListener('focus', () => label.classList.add('lit'));
				input.addEventListener('blur', () => label.classList.remove('lit'));
			});

			const form = document.getElementById('f');
			const err = document.getElementById('err');
			const ok = document.getElementById('ok');
			const btn = document.getElementById('submit');
			form.addEventListener('submit', async (e) => {
				e.preventDefault();
				err.style.display = 'none';
				ok.style.display = 'none';
				btn.disabled = true;
				btn.textContent = 'Sendingâ€¦';
				try {
					await fetch('/api/auth/forgot-password', {
						method: 'POST',
						headers: { 'content-type': 'application/json' },
						body: JSON.stringify({
							email: document.getElementById('email').value,
						}),
					});
					ok.style.display = 'block';
				} catch {
					ok.style.display = 'block';
				} finally {
					btn.disabled = false;
					btn.textContent = 'Send reset link';
				}
			});
		</script>
	</body>
</html>
