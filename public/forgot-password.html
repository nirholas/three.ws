<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>Forgot password · three.ws</title>
		<link rel="icon" href="/favicon.ico" />
		<script
			type="module"
			src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"
		></script>
		<style>
			:root {
				color-scheme: dark;
				--accent: #6a5cff;
				--accent2: #ff5ca8;
			}
			* {
				box-sizing: border-box;
			}
			body {
				font:
					15px/1.5 -apple-system,
					system-ui,
					Segoe UI,
					Roboto,
					sans-serif;
				background: radial-gradient(1200px 600px at 50% -100px, #1a1a2e 0, #080814 60%);
				color: #eee;
				margin: 0;
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 24px;
			}
			a {
				color: #9a8cff;
			}
			.shell {
				display: flex;
				width: 100%;
				max-width: 1080px;
				min-height: 640px;
				border-radius: 24px;
				overflow: hidden;
				background: #14141c;
				border: 1px solid #2a2a36;
				box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
			}
			.panel {
				flex: 1;
				position: relative;
				display: flex;
				align-items: center;
				justify-content: center;
				background:
					radial-gradient(120% 90% at 30% 20%, rgba(154, 140, 255, 0.6), transparent 60%),
					radial-gradient(120% 90% at 80% 90%, rgba(255, 92, 168, 0.4), transparent 55%),
					linear-gradient(135deg, #2a2350 0%, #1a1a2e 100%);
				overflow: hidden;
			}
			.agent-avatar {
				position: relative;
				width: 320px;
				height: 320px;
				pointer-events: none;
			}
			.agent-avatar model-viewer {
				width: 100%;
				height: 100%;
				--poster-color: transparent;
				background: transparent;
			}
			.card {
				background: #14141c;
				border: 0;
				border-radius: 0;
				padding: 56px 56px;
				flex: 1;
				width: 100%;
				max-width: 520px;
				box-shadow: none;
				display: flex;
				flex-direction: column;
				justify-content: center;
				overflow-y: auto;
			}
			@media (max-width: 860px) {
				.shell {
					flex-direction: column;
					min-height: 0;
				}
				.panel {
					min-height: 220px;
					order: -1;
				}
				.agent-avatar {
					width: 180px;
					height: 180px;
				}
				.card {
					padding: 32px 28px;
					max-width: none;
				}
			}
			h1 {
				font-size: 22px;
				margin: 0 0 4px;
				letter-spacing: -0.01em;
			}
			.sub {
				color: #888;
				margin: 0 0 24px;
				font-size: 14px;
			}
			label {
				display: block;
				font-size: 13px;
				color: #aaa;
				margin: 14px 0 6px;
			}
			input {
				width: 100%;
				padding: 11px 13px;
				background: #0f0f17;
				border: 1px solid #2a2a36;
				border-radius: 9px;
				color: #eee;
				font-size: 15px;
			}
			input:focus {
				outline: none;
				border-color: var(--accent);
				box-shadow: 0 0 0 3px rgba(106, 92, 255, 0.15);
			}
			button {
				width: 100%;
				margin-top: 20px;
				padding: 12px 16px;
				border: 0;
				border-radius: 10px;
				background: linear-gradient(135deg, var(--accent), var(--accent2));
				color: #fff;
				font-weight: 600;
				font-size: 15px;
				cursor: pointer;
			}
			button:disabled {
				opacity: 0.6;
				cursor: default;
			}
			.err {
				margin-top: 14px;
				padding: 10px 12px;
				background: rgba(255, 92, 92, 0.1);
				border: 1px solid rgba(255, 92, 92, 0.3);
				border-radius: 8px;
				color: #ffb3b3;
				font-size: 13px;
				display: none;
			}
			.ok {
				margin-top: 14px;
				padding: 10px 12px;
				background: rgba(92, 200, 130, 0.08);
				border: 1px solid rgba(92, 200, 130, 0.3);
				border-radius: 8px;
				color: #b3e6c4;
				font-size: 13px;
			}
			.foot {
				margin-top: 20px;
				text-align: center;
				font-size: 13px;
				color: #888;
			}
			.brand {
				font-size: 12px;
				letter-spacing: 0.1em;
				text-transform: uppercase;
				color: var(--accent);
				margin: 0 0 8px;
			}
		</style>
	</head>
	<body>
		<div class="shell">
			<form class="card" id="f">
			<p class="brand">three.ws</p>
			<h1>Forgot password</h1>
			<p class="sub">Enter your email and we'll send you a reset link.</p>
			<label for="email">Email</label>
			<input
				id="email"
				type="email"
				autocomplete="email"
				required
				aria-describedby="email-hint"
			/>
			<button id="submit" type="submit">Send reset link</button>
			<div class="err" id="err" role="alert"></div>
			<div class="ok" id="ok" style="display:none">
				If an account exists for that email, a reset link has been sent.
			</div>
			<p class="foot"><a href="/login">Back to sign in</a></p>
		</form>
			<div class="panel" aria-hidden="true">
				<div class="agent-avatar">
					<model-viewer
						id="forgot-avatar"
						src="/avatars/cz.glb"
						alt=""
						autoplay
						animation-name="IdleV4.2(maya_head)"
						disable-zoom
						interaction-prompt="none"
						shadow-intensity="0.6"
						shadow-softness="1"
						exposure="1.05"
						tone-mapping="aces"
						environment-image="neutral"
						camera-orbit="0deg 88deg 4.8m"
						field-of-view="32deg"
						loading="eager"
					></model-viewer>
				</div>
			</div>
		</div>
		<script>
			const form = document.getElementById('f');
			const err = document.getElementById('err');
			const ok = document.getElementById('ok');
			const btn = document.getElementById('submit');
			form.addEventListener('submit', async (e) => {
				e.preventDefault();
				err.style.display = 'none';
				ok.style.display = 'none';
				btn.disabled = true;
				btn.textContent = 'Sending…';
				try {
					await fetch('/api/auth/forgot-password', {
						method: 'POST',
						headers: { 'content-type': 'application/json' },
						body: JSON.stringify({
							email: document.getElementById('email').value,
						}),
					});
					// Anti-enumeration: always show the same success message.
					ok.style.display = 'block';
				} catch {
					// Even on network failure we keep the same message to avoid leaking signal.
					ok.style.display = 'block';
				} finally {
					btn.disabled = false;
					btn.textContent = 'Send reset link';
				}
			});
		</script>
	</body>
</html>
