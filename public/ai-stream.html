<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>AI Stream · three.ws</title>
	<link rel="icon" href="/favicon.ico" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link rel="stylesheet" href="/style.css" />
	<link rel="stylesheet" href="/ai-stream.css" />
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="ai-stream-page">
	<header class="ai-stream-header">
		<h1><a href="/"><img src="/three.svg" alt="three.ws" /> AI Stream</a></h1>
		<div class="controls">
			<button id="ctl-avatar-btn" type="button" aria-haspopup="dialog" aria-expanded="false" title="Choose avatar">
				<span class="avatar-thumb" id="ctl-avatar-thumb" aria-hidden="true"></span>
				<span class="avatar-name" id="ctl-avatar-label">Avatar</span>
				<span class="avatar-caret" aria-hidden="true">▾</span>
			</button>
			<select id="ctl-mood" title="Avatar mood — biases reaction intensity">
				<option value="chill">😎 Chill</option>
				<option value="normal" selected>🙂 Normal</option>
				<option value="hype">🤩 Hype</option>
			</select>
			<button id="ctl-narrate" class="toggle" type="button" data-on="1" title="Toggle agent narration">🔊</button>
		</div>
		<div class="status">
			<span id="status-dot" class="dot connecting"></span><span id="status-label">connecting…</span>
		</div>
	</header>

	<main class="ai-stream-main">
		<div id="stage">
			<iframe id="agent" allow="autoplay" title="3D agent"></iframe>
		</div>
		<aside id="feed-container">
			<div id="feed"></div>
		</aside>
	</main>

	<!-- Re-using the same modals and logic from pumpfun.html -->
	<div class="pf-modal-backdrop" id="avatar-picker" data-open="false" role="dialog" aria-modal="true" aria-labelledby="avatar-picker-title">
		<div class="pf-modal" role="document">
			<div class="pf-modal-head">
				<h2 id="avatar-picker-title">Choose an avatar</h2>
				<span class="spacer"></span>
				<button class="pf-modal-close" type="button" aria-label="Close" data-picker-close>×</button>
			</div>
			<div class="pf-tabs" role="tablist">
				<button class="pf-tab" role="tab" type="button" data-tab="defaults" aria-selected="true">Defaults</button>
				<button class="pf-tab" role="tab" type="button" data-tab="mine">My Agents</button>
				<button class="pf-tab" role="tab" type="button" data-tab="community">Community</button>
			</div>
			<div class="pf-toolbar">
				<input type="search" id="picker-search" placeholder="Search..." />
			</div>
			<div class="pf-content">
				<div class="pf-body" id="picker-body"></div>
				<aside class="pf-preview" aria-label="Avatar preview">
					<div class="pf-preview-stage" id="picker-preview-stage"></div>
					<div class="pf-preview-meta" id="picker-preview-meta"></div>
				</aside>
			</div>
		</div>
	</div>

	<script>
		// This will be a simplified version of the script from pumpfun.html
		// focusing on the core agent + feed functionality.
		const $ = (id) => document.getElementById(id);
		const url = new URL(location.href);

		// Global state
		const params = {
			narrate: url.searchParams.get('narrate') !== '0',
			mood: url.searchParams.get('mood') || 'normal',
			avatar: url.searchParams.get('avatar') || '/avatars/cz.glb',
		};

		const iframe = $('agent');
		const feedEl = $('feed');

		function setStatus(state, label) {
			const dot = $('status-dot');
			const lbl = $('status-label');
			if(dot) dot.className = 'dot ' + state;
			if(lbl) lbl.textContent = label;
		}

		function mountAgent() {
			const modelHash = '&model=' + encodeURIComponent(params.avatar);
			const widgetId = 'wdgt_demo_pumpfun_stream';
			iframe.src = `/app#widget=${widgetId}&kiosk=true&type=pumpfun-feed${modelHash}&narrate=${params.narrate ? '1' : '0'}`;
		}
		
		function connectFeed() {
			// WebSocket connection logic from pumpfun.html
			// This is a complex part, for this step I will mock it
			setStatus('live', 'live');
			const mockEvent = {
				type: 'mint',
				name: 'Test Token',
				symbol: 'TEST',
				description: 'This is a test event for the AI streamer.',
				mint: '...some addresss',
				socials: {},
				market_cap_usd: 10000,
				initial_buy_sol: 10
			};
			setInterval(() => {
				const card = renderEvtCard(mockEvent);
				if (card) {
					feedEl.insertBefore(card, feedEl.firstChild);
					if (feedEl.children.length > 20) {
						feedEl.removeChild(feedEl.lastChild);
					}
				}
				narrateEvent(mockEvent);
			}, 5000);
		}

		function renderEvtCard(evt) {
			const card = document.createElement('div');
			card.className = 'evt';
			card.innerHTML = `
				<div class="evt-title">${evt.name} ($${evt.symbol})</div>
				<div class="evt-desc">${evt.description}</div>
				<div class="evt-meta">MC: $${evt.market_cap_usd.toLocaleString()}</div>
			`;
			return card;
		}
		
		function narrateEvent(evt) {
			if (!params.narrate) return;
			const text = `New token minted: ${evt.name}! Initial buy of ${evt.initial_buy_sol} SOL. Market cap is now ${evt.market_cap_usd} dollars.`;
			iframe.contentWindow?.postMessage({ type: 'say', payload: { text: text, mood: params.mood } }, '*');
		}

		function init() {
			mountAgent();
			connectFeed();

			$('ctl-narrate').addEventListener('click', (e) => {
				params.narrate = !params.narrate;
				e.currentTarget.dataset.on = params.narrate ? '1' : '0';
			});

			$('ctl-mood').addEventListener('change', (e) => {
				params.mood = e.target.value;
			});
		}

		init();
	</script>
</body>
</html>
