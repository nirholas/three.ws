<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Edit Agent — three.ws</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#000000" />

		<meta property="og:type" content="website">
		<meta property="og:url" content="https://three.ws/agent-edit">
		<meta property="og:title" content="Edit Agent — three.ws">
		<meta property="og:image" content="https://three.ws/assets/og-image.png">
		<meta property="og:image:width" content="1200">
		<meta property="og:image:height" content="630">
		<meta name="twitter:card" content="summary_large_image">
		<meta name="twitter:image" content="https://three.ws/assets/og-image.png">

		<link rel="shortcut icon" href="/favicon.ico" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="stylesheet" href="/style.css" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap"
			rel="stylesheet"
		/>

		<style>
			body {
				overflow: auto;
				display: flex;
				flex-direction: column;
				min-height: 100vh;
			}

			.edit-header {
				display: flex;
				align-items: center;
				gap: 1rem;
				padding: 0.875rem 1.618rem;
				border-bottom: 1px solid rgba(255, 255, 255, 0.06);
				flex-shrink: 0;
			}
			.edit-header a {
				color: rgba(255, 255, 255, 0.4);
				text-decoration: none;
				font-size: 0.764rem;
			}
			.edit-header a:hover {
				color: rgba(255, 255, 255, 0.8);
			}
			.edit-header-title {
				flex: 1;
				font-size: 0.875rem;
				font-weight: 500;
				color: rgba(255, 255, 255, 0.75);
				margin: 0;
			}

			.edit-tabs {
				display: flex;
				gap: 0;
				padding: 0 1.618rem;
				border-bottom: 1px solid rgba(255, 255, 255, 0.06);
				flex-shrink: 0;
			}
			.edit-tab {
				background: transparent;
				border: 0;
				border-bottom: 2px solid transparent;
				color: rgba(255, 255, 255, 0.4);
				font-size: 0.764rem;
				font-family: inherit;
				padding: 0.75rem 1rem;
				cursor: pointer;
				margin-bottom: -1px;
				transition:
					color 0.15s,
					border-color 0.15s;
			}
			.edit-tab:hover {
				color: rgba(255, 255, 255, 0.7);
			}
			.edit-tab.active {
				color: rgba(255, 255, 255, 0.9);
				border-bottom-color: #3b82f6;
			}

			.edit-panel {
				display: none;
				flex: 1;
			}
			.edit-panel.active {
				display: flex;
			}

			/* ── Persona tab ── */
			.persona-panel {
				max-width: 560px;
				margin: 2rem auto;
				padding: 0 1rem;
				flex-direction: column;
				gap: 1rem;
				width: 100%;
			}
			.form-group {
				display: flex;
				flex-direction: column;
				gap: 0.5rem;
			}
			.form-label {
				font-size: 0.764rem;
				color: rgba(255, 255, 255, 0.5);
				font-weight: 500;
			}
			.form-input,
			.form-textarea {
				background: rgba(255, 255, 255, 0.04);
				border: 1px solid rgba(255, 255, 255, 0.1);
				border-radius: 8px;
				color: rgba(255, 255, 255, 0.9);
				font: 0.875rem/1.5 inherit;
				padding: 0.618rem 0.875rem;
				width: 100%;
				box-sizing: border-box;
				outline: none;
				transition: border-color 0.15s;
			}
			.form-input:focus,
			.form-textarea:focus {
				border-color: rgba(59, 130, 246, 0.5);
			}
			.form-textarea {
				resize: vertical;
				min-height: 90px;
			}
			.form-actions {
				display: flex;
				align-items: center;
				gap: 1rem;
				margin-top: 0.5rem;
			}
			.btn-primary {
				background: #3b82f6;
				border: 0;
				border-radius: 8px;
				color: #fff;
				cursor: pointer;
				font: 0.875rem/1 inherit;
				padding: 0.618rem 1.25rem;
				font-weight: 500;
			}
			.btn-primary:hover {
				background: #2563eb;
			}
			.btn-primary:disabled {
				opacity: 0.5;
				cursor: default;
			}
			.form-status {
				font-size: 0.764rem;
				color: rgba(255, 255, 255, 0.4);
			}
			.form-status.ok {
				color: #86efac;
			}
			.form-status.err {
				color: #fca5a5;
			}

			/* ── Outfit tab ── */
			.outfit-panel {
				display: grid;
				grid-template-columns: 380px 1fr;
				gap: 0;
				flex: 1;
				min-height: 0;
			}
			@media (max-width: 800px) {
				.outfit-panel {
					grid-template-columns: 1fr;
				}
				.outfit-preview {
					height: 300px;
				}
			}
			.outfit-preview {
				position: sticky;
				top: 0;
				height: 100vh;
				background: #0a0a12;
				border-right: 1px solid rgba(255, 255, 255, 0.06);
				overflow: hidden;
			}
			.outfit-preview agent-3d {
				width: 100%;
				height: 100%;
			}
			.outfit-controls {
				padding: 1.5rem;
				overflow-y: auto;
			}
			.outfit-header {
				display: flex;
				align-items: center;
				justify-content: space-between;
				margin-bottom: 1.25rem;
			}
			.outfit-title {
				font-size: 0.764rem;
				color: rgba(255, 255, 255, 0.35);
				text-transform: uppercase;
				letter-spacing: 0.08em;
				font-weight: 500;
				margin: 0;
			}
			.btn-reset-all {
				background: transparent;
				border: 1px solid rgba(255, 255, 255, 0.12);
				border-radius: 6px;
				color: rgba(255, 255, 255, 0.4);
				cursor: pointer;
				font: 0.618rem/1 inherit;
				padding: 0.382rem 0.75rem;
			}
			.btn-reset-all:hover {
				color: rgba(255, 255, 255, 0.8);
				border-color: rgba(255, 255, 255, 0.25);
			}

			.mat-card {
				background: rgba(255, 255, 255, 0.03);
				border: 1px solid rgba(255, 255, 255, 0.07);
				border-radius: 10px;
				margin-bottom: 0.75rem;
				overflow: hidden;
			}
			.mat-card-header {
				display: flex;
				align-items: center;
				gap: 0.75rem;
				padding: 0.75rem 1rem;
				cursor: pointer;
				user-select: none;
			}
			.mat-card-header:hover {
				background: rgba(255, 255, 255, 0.03);
			}
			.mat-card-chevron {
				color: rgba(255, 255, 255, 0.25);
				font-size: 0.618rem;
				transition: transform 0.2s;
				margin-left: auto;
			}
			.mat-card.open .mat-card-chevron {
				transform: rotate(90deg);
			}
			.mat-card-name {
				font-size: 0.875rem;
				color: rgba(255, 255, 255, 0.8);
				font-weight: 500;
			}
			.mat-card-swatch {
				width: 16px;
				height: 16px;
				border-radius: 4px;
				border: 1px solid rgba(255, 255, 255, 0.15);
				flex-shrink: 0;
			}
			.mat-card-modified {
				font-size: 0.618rem;
				color: #93c5fd;
				margin-left: 0;
			}
			.mat-card-body {
				display: none;
				padding: 0 1rem 1rem;
			}
			.mat-card.open .mat-card-body {
				display: block;
			}

			.mat-row {
				display: grid;
				grid-template-columns: 100px 1fr auto;
				align-items: center;
				gap: 0.75rem;
				margin-bottom: 0.618rem;
			}
			.mat-row-label {
				font-size: 0.764rem;
				color: rgba(255, 255, 255, 0.4);
			}
			.mat-row input[type='color'] {
				-webkit-appearance: none;
				width: 100%;
				height: 28px;
				border-radius: 6px;
				border: 1px solid rgba(255, 255, 255, 0.12);
				padding: 0;
				cursor: pointer;
				background: transparent;
			}
			.mat-row input[type='color']::-webkit-color-swatch-wrapper {
				padding: 2px;
			}
			.mat-row input[type='color']::-webkit-color-swatch {
				border-radius: 4px;
				border: none;
			}
			.mat-row input[type='range'] {
				width: 100%;
				accent-color: #3b82f6;
			}
			.mat-row-val {
				font-size: 0.618rem;
				color: rgba(255, 255, 255, 0.35);
				min-width: 30px;
				text-align: right;
			}
			.mat-card-footer {
				display: flex;
				justify-content: flex-end;
				padding-top: 0.5rem;
			}
			.btn-reset-mat {
				background: transparent;
				border: 0;
				color: rgba(255, 255, 255, 0.3);
				cursor: pointer;
				font: 0.618rem/1 inherit;
				padding: 0.25rem 0;
			}
			.btn-reset-mat:hover {
				color: rgba(255, 255, 255, 0.7);
			}

			.outfit-status {
				position: fixed;
				bottom: 1rem;
				right: 1.5rem;
				font-size: 0.618rem;
				color: rgba(255, 255, 255, 0.25);
				pointer-events: none;
			}
			.outfit-status.saving {
				color: rgba(255, 255, 255, 0.4);
			}
			.outfit-status.saved {
				color: #86efac;
			}
			.outfit-status.err {
				color: #fca5a5;
			}

			.loading-msg,
			.error-msg {
				flex: 1;
				display: flex;
				align-items: center;
				justify-content: center;
				color: rgba(255, 255, 255, 0.3);
				font-size: 0.875rem;
			}
			.error-msg {
				color: #fca5a5;
			}
			.no-avatar-msg {
				padding: 2rem;
				color: rgba(255, 255, 255, 0.3);
				font-size: 0.764rem;
				text-align: center;
			}
			.no-named-mats {
				color: rgba(255, 255, 255, 0.3);
				font-size: 0.764rem;
				padding: 1rem 0;
			}

			.edit-tab:focus-visible,
			.btn-primary:focus-visible,
			.btn-reset-all:focus-visible,
			.btn-reset-mat:focus-visible,
			.edit-header a:focus-visible,
			.mat-card-header:focus-visible {
				outline: 2px solid rgba(147, 197, 253, 0.7);
				outline-offset: 2px;
			}

			.skip-link {
				position: absolute;
				left: -9999px;
				top: 0;
				background: #000;
				color: #fff;
				padding: 0.5rem 1rem;
				z-index: 10000;
				text-decoration: none;
			}
			.skip-link:focus {
				left: 0.5rem;
				top: 0.5rem;
			}
			.skill-price-row {
				display: flex;
				align-items: center;
				gap: 1rem;
				margin-bottom: 0.5rem;
			}
			.skill-name {
				flex: 1;
				font-size: 0.875rem;
				color: rgba(255, 255, 255, 0.7);
			}

			.skill-pricing-controls {
				display: flex;
				align-items: center;
				gap: 1rem;
			}
			.toggle-switch {
				position: relative;
				display: inline-block;
				width: 34px;
				height: 20px;
			}
			.toggle-switch input {
				opacity: 0;
				width: 0;
				height: 0;
			}
			.slider {
				position: absolute;
				cursor: pointer;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				background-color: #374151;
				transition: 0.4s;
				border-radius: 20px;
			}
			.slider:before {
				position: absolute;
				content: "";
				height: 12px;
				width: 12px;
				left: 4px;
				bottom: 4px;
				background-color: white;
				transition: 0.4s;
				border-radius: 50%;
			}
			input:checked + .slider {
				background-color: #3b82f6;
			}
			input:checked + .slider:before {
				transform: translateX(14px);
			}
			.price-input-wrapper {
				display: flex;
				align-items: center;
				gap: 0.5rem;
			}
			.price-input {
				background: rgba(255, 255, 255, 0.04);
				border: 1px solid rgba(255, 255, 255, 0.1);
				border-radius: 6px;
				color: rgba(255, 255, 255, 0.9);
				font: 0.875rem/1.5 inherit;
				padding: 0.382rem 0.618rem;
				width: 80px;
				box-sizing: border-box;
				outline: none;
			}
			.price-input-wrapper span {
				font-size: 0.764rem;
				color: rgba(255, 255, 255, 0.4);
			}
		</style>
	</head>
	<body>
		<a href="#main" class="skip-link">Skip to main content</a>
		<header class="edit-header">
			<a id="back-link" href="/" aria-label="Back to agent page">← Agent</a>
			<h1 class="edit-header-title" id="agent-title">Edit Agent</h1>
		</header>

		<div class="edit-tabs" role="tablist" aria-label="Edit sections">
			<button
				class="edit-tab active"
				data-tab="persona"
				role="tab"
				aria-selected="true"
				aria-controls="panel-persona"
				id="tab-persona"
			>
				Persona
			</button>
			<button
				class="edit-tab"
				data-tab="outfit"
				role="tab"
				aria-selected="false"
				aria-controls="panel-outfit"
				id="tab-outfit"
			>
				Outfit
			</button>
			<button
				class="edit-tab"
				data-tab="publish"
				role="tab"
				aria-selected="false"
				aria-controls="panel-publish"
				id="tab-publish"
			>
				Publish
			</button>
			<button
				class="edit-tab"
				data-tab="monetization"
				role="tab"
				aria-selected="false"
				aria-controls="panel-monetization"
				id="tab-monetization"
			>
				Monetization
			</button>
			<button
				class="edit-tab"
				data-tab="autopilot"
				role="tab"
				aria-selected="false"
				aria-controls="panel-autopilot"
				id="tab-autopilot"
			>
				Autopilot
			</button>
		</div>

		<main id="main">
			<div id="loading" class="loading-msg" role="status" aria-live="polite">Loading…</div>
			<div id="error" class="error-msg" style="display: none" role="alert"></div>

			<!-- Persona tab -->
			<section
				class="edit-panel persona-panel"
				id="panel-persona"
				role="tabpanel"
				aria-labelledby="tab-persona"
			>
				<div class="form-group">
					<label class="form-label" for="f-name">Name</label>
					<input class="form-input" id="f-name" type="text" maxlength="100" />
				</div>
				<div class="form-group">
					<label class="form-label" for="f-desc">Description</label>
					<textarea class="form-textarea" id="f-desc" rows="4" maxlength="500"></textarea>
				</div>
				<div class="form-actions">
					<button class="btn-primary" id="persona-save">Save</button>
					<span
						class="form-status"
						id="persona-status"
						role="status"
						aria-live="polite"
					></span>
				</div>
			</section>

			<!-- Outfit tab -->
			<section
				class="edit-panel outfit-panel"
				id="panel-outfit"
				role="tabpanel"
				aria-labelledby="tab-outfit"
				hidden
			>
				<div class="outfit-preview" id="outfit-preview" aria-label="Avatar preview">
					<!-- agent-3d inserted here once avatar is confirmed -->
				</div>
				<div class="outfit-controls" id="outfit-controls">
					<div class="outfit-header">
						<h2 class="outfit-title">Materials</h2>
						<button
							class="btn-reset-all"
							id="btn-reset-all"
							aria-label="Reset all materials"
						>
							Reset all
						</button>
					</div>
					<div id="mat-list">
						<div class="no-named-mats">Loading preview…</div>
					</div>
				</div>
			</section>
			<!-- Publish tab -->
			<section
				class="edit-panel persona-panel"
				id="panel-publish"
				role="tabpanel"
				aria-labelledby="tab-publish"
				hidden
			>
				<div class="form-group">
					<label class="form-label" for="f-category">Category</label>
					<select class="form-input" id="f-category">
						<option value="">— Select —</option>
						<option value="academic">Academic</option>
						<option value="career">Career</option>
						<option value="copywriting">Copywriting</option>
						<option value="design">Design</option>
						<option value="education">Education</option>
						<option value="emotions">Emotions</option>
						<option value="entertainment">Entertainment</option>
						<option value="games">Games</option>
						<option value="general">General</option>
						<option value="life">Life</option>
						<option value="marketing">Marketing</option>
						<option value="office">Office</option>
						<option value="programming">Programming</option>
						<option value="translation">Translation</option>
					</select>
				</div>
				<div class="form-group">
					<label class="form-label" for="f-tags">Tags (comma-separated, max 12)</label>
					<input class="form-input" id="f-tags" type="text" placeholder="thesis, polishing, academic-writing" />
				</div>
				<div class="form-group">
					<label class="form-label" for="f-prompt">Agent Profile (system prompt)</label>
					<textarea class="form-textarea" id="f-prompt" rows="8" maxlength="16000" placeholder="You are a professor of computer science…"></textarea>
				</div>
				<div class="form-group">
					<label class="form-label" for="f-greeting">Greeting (demo first message)</label>
					<textarea class="form-textarea" id="f-greeting" rows="3" maxlength="1000" placeholder="Hello! I am your computer science thesis polishing assistant…"></textarea>
				</div>
				<div class="form-group">
					<label class="form-label" for="f-changelog">Changelog (optional, for this version)</label>
					<input class="form-input" id="f-changelog" type="text" maxlength="1000" placeholder="Initial publish" />
				</div>
				<div class="form-actions">
					<button class="btn-primary" id="publish-save">Publish to Marketplace</button>
					<a id="publish-view" href="#" target="_blank" rel="noopener" style="margin-left:1rem;font-size:0.764rem;color:rgba(255,255,255,0.55);" hidden>View on marketplace ›</a>
					<span class="form-status" id="publish-status" role="status" aria-live="polite"></span>
				</div>
			</section>

			<!-- Monetization tab -->
			<section
				class="edit-panel persona-panel"
				id="panel-monetization"
				role="tabpanel"
				aria-labelledby="tab-monetization"
				hidden
			>
				<div class="form-group">
					<label class="form-label">Skill Prices</label>
					<p class="note" style="font-size: 0.764rem; color: rgba(255,255,255,0.4); margin-top: -0.5rem; margin-bottom: 1rem;">Set a price for your skills to be used by other agents. Leave blank for free skills. Prices are set in USDC on Solana.</p>
					<div id="skill-prices-list">
						<div class="muted">Loading skills…</div>
					</div>
				</div>
				<div class="form-actions">
					<button class="btn-primary" id="monetization-save">Save Prices</button>
					<span
						class="form-status"
						id="monetization-status"
						role="status"
						aria-live="polite"
					></span>
				</div>
			</section>

			<!-- Autopilot tab -->
			<section
				class="edit-panel persona-panel"
				id="panel-autopilot"
				role="tabpanel"
				aria-labelledby="tab-autopilot"
				hidden
			>
				<div class="form-group">
					<label class="form-label" for="f-strategy">Trading Strategy</label>
					<textarea class="form-textarea" id="f-strategy" rows="8" placeholder="Define your agent's trading strategy here..."></textarea>
				</div>
				<div class="form-actions">
					<button class="btn-primary" id="autopilot-save">Save Strategy</button>
					<span
						class="form-status"
						id="autopilot-status"
						role="status"
						aria-live="polite"
					></span>
				</div>
			</section>
		</main>

		<div class="outfit-status" id="outfit-status" role="status" aria-live="polite"></div>

		<script type="module" src="/src/agent-edit.js"></script>
	</body>
</html>
