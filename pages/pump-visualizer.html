
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D-Agent · Pump.fun Visualizer</title>
    <meta name="description" content="A real-time 3D visualization of trending tokens on Pump.fun.">
    <link rel="stylesheet" href="/style.css">
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
		<link rel="stylesheet" href="/nav.css" />
			<link rel="stylesheet" href="/footer.css" />
			<script defer src="/footer-newsletter.js"></script>
	</head>
<body>
		<header class="site-header">
			<h1 class="site-header-brand">
				<a href="/" aria-label="three.ws home"><img class="wordmark-logo" src="/three.svg" alt="" aria-hidden="true" /><span class="wordmark-dot" aria-hidden="true"></span>three.ws</a>
			</h1>
			<div id="nav-container"></div>
		</header>
		<script src="/nav.js"></script>

    <script type="module">
        import * as THREE from 'three';

        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Placeholder object
        const geometry = new THREE.BoxGeometry();
        const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        camera.position.z = 5;

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;
            renderer.render(scene, camera);
        }

        animate();
    </script>

		<div id="footer-container"></div>
		<script src="/footer.js"></script>
</body>
</html>
