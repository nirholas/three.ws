<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>three.ws — Offline</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    :root {
      color-scheme: dark;
      --bg: #080814;
      --fg: #f5f5f7;
      --muted: #8a8aa0;
      --accent: #9945ff;
    }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Inter, system-ui, sans-serif;
      display: grid;
      place-items: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    main { max-width: 28rem; padding: 1.5rem; text-align: center; }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; letter-spacing: -0.01em; }
    p { color: var(--muted); line-height: 1.5; margin: 0 0 1.5rem; }
    button {
      appearance: none;
      border: 0;
      background: var(--accent);
      color: white;
      font: inherit;
      font-weight: 600;
      padding: 0.85rem 1.5rem;
      border-radius: 999px;
      cursor: pointer;
      min-height: 44px;
    }
    button:active { transform: translateY(1px); }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ff5577; margin-right: 6px; vertical-align: middle; }
    small { display: block; margin-top: 1.25rem; color: var(--muted); font-size: 0.8rem; }
  </style>
</head>
<body>
  <main>
    <h1><span class="dot" aria-hidden="true"></span>You're offline</h1>
    <p>three.ws needs a connection to load 3D models and sign on-chain actions. Reconnect and try again — your session and Seed Vault keys are safe.</p>
    <button type="button" onclick="location.reload()">Retry</button>
    <small>Cached agents you've already opened remain available from the home screen.</small>
  </main>
</body>
</html>
