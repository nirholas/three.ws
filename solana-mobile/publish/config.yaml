solana_mobile_dapp_publisher_portal:
  google_store_package: ""
  testing_instructions: |
    1. Open the app on a Seeker or Saga.
    2. Tap "Discover" — the agent grid should load from https://three.ws/api/marketplace/agents.
    3. Tap any agent → "Open" — a 3D viewer renders the agent in the WebGL canvas.
    4. Tap "Create" → grant camera permission → capture 3 selfies. The app uploads to
       https://three.ws/api/avatar/selfie and returns a job id.
    5. Tap "Connect wallet" — the Seed Vault sheet appears. Approve.
    6. Tap "Sign in" — the app produces a SIWS message; approve in Seed Vault.
       The app then logs you in via POST /api/auth/siws/verify.
    7. To mint, fund the connected wallet with at least 0.01 SOL on mainnet.
       Tap "Mint to wallet" on any draft agent; Seed Vault approves the tx.
    No off-chain test accounts are required — auth is wallet-only.

  alpha_testers:
    - "@solana_mobile"
