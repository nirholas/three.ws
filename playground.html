<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playground · three.ws</title>
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/nav.css" />
    <link rel="stylesheet" href="/footer.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    />
    <script
        type="module"
        src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"
    ></script>
    <script defer src="/footer-newsletter.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #111;
            --panel-2: #161616;
            --border: #1f1f1f;
            --border-2: #2a2a2a;
            --text: #fafafa;
            --text-2: #a1a1aa;
            --text-3: #71717a;
            --accent: #a78bfa;
            --success: #34d399;
        }
        html, body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        a { color: inherit; }

        .agent-page-header {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1.618rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .agent-page-header a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.764rem;
            display: inline-flex;
            align-items: center;
            transition: color 0.15s;
        }
        .agent-page-header a:hover { color: #fff; }
        .agent-header-logo { height: 28px; width: auto; display: block; }
        .agent-header-nav {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            margin-left: 1.5rem;
        }
        .agent-header-nav a { font-size: 0.8rem; color: rgba(255, 255, 255, 0.45); }
        .agent-header-nav a:hover { color: rgba(255, 255, 255, 0.9); }

        .pg-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1.5rem 4rem;
            gap: 1.5rem;
        }
        .pg-intro {
            max-width: 520px;
            text-align: center;
            color: var(--text-2);
            font-size: 14px;
            line-height: 1.55;
        }
        .pg-intro h1 {
            margin: 0 0 0.4rem;
            font-size: 22px;
            color: var(--text);
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        .av-viewer {
            background: radial-gradient(ellipse at center, rgba(167, 139, 250, 0.07) 0%, transparent 70%),
                var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
            width: 100%;
            max-width: 500px;
        }
        .av-viewer model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
        }

        .pg-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
            max-width: 500px;
        }
        .pg-upload-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: var(--panel);
            border: 1px dashed var(--border-2);
            color: var(--text-2);
            padding: 0.75rem 1.25rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
            width: 100%;
            box-sizing: border-box;
        }
        .pg-upload-label:hover {
            color: var(--text);
            border-color: var(--text-3);
            background: var(--panel-2);
        }
        #avatar-upload { display: none; }

        .pg-row {
            display: flex;
            gap: 0.5rem;
            width: 100%;
            flex-wrap: wrap;
        }
        #avatar-name {
            flex: 1 1 200px;
            min-width: 0;
            padding: 0.6rem 0.85rem;
            border-radius: 10px;
            border: 1px solid var(--border-2);
            background: var(--panel);
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
        }
        #avatar-name::placeholder { color: var(--text-3); }
        #avatar-name:focus {
            outline: none;
            border-color: var(--accent);
        }
        .pg-btn {
            background: var(--panel);
            border: 1px solid var(--border-2);
            color: var(--text-2);
            padding: 0.6rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
        }
        .pg-btn:hover {
            color: var(--text);
            border-color: var(--text-3);
            background: var(--panel-2);
        }
        .pg-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #0a0a0a;
            font-weight: 600;
        }
        .pg-btn.primary:hover {
            background: #8b6df0;
            border-color: #8b6df0;
            color: #0a0a0a;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background-color: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .modal.open { display: flex; }
        .modal-content {
            background: var(--panel);
            border: 1px solid var(--border-2);
            padding: 1.5rem;
            width: 100%;
            max-width: 520px;
            border-radius: 14px;
            color: var(--text);
            position: relative;
        }
        .modal-content h2 {
            margin: 0 0 0.4rem;
            font-size: 16px;
            font-weight: 600;
        }
        .modal-content p {
            margin: 0 0 1rem;
            color: var(--text-2);
            font-size: 13px;
        }
        .close-button {
            position: absolute;
            top: 0.75rem;
            right: 1rem;
            color: var(--text-3);
            font-size: 22px;
            font-weight: 400;
            cursor: pointer;
            line-height: 1;
            background: transparent;
            border: none;
            padding: 0;
        }
        .close-button:hover { color: var(--text); }
        #embed-code {
            width: 100%;
            box-sizing: border-box;
            height: 120px;
            padding: 0.75rem;
            border-radius: 10px;
            border: 1px solid var(--border-2);
            background: var(--panel-2);
            color: var(--text-2);
            font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
            font-size: 12px;
            resize: vertical;
        }
        #embed-code:focus { outline: none; border-color: var(--accent); }
        #copy-embed-code {
            margin-top: 0.75rem;
        }

        .loading-indicator {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 150;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            align-items: center;
            justify-content: center;
        }
        .loading-indicator.open { display: flex; }
        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .pg-status {
            color: var(--text-3);
            font-size: 12px;
            min-height: 16px;
            text-align: center;
        }
        .pg-status.ok { color: var(--success); }
        .pg-status.err { color: #f87171; }
    </style>
</head>
<body>
    <header class="agent-page-header" style="justify-content: space-between">
        <div style="display:inline-flex;align-items:center">
            <a href="/" aria-label="three.ws home">
                <img src="/three.svg" alt="three.ws" class="agent-header-logo" />
            </a>
            <nav class="agent-header-nav" aria-label="Primary">
                <a href="/discover">Discover</a>
                <a href="/create">Create</a>
                <a href="/studio">Studio</a>
                <a href="/playground.html">Playground</a>
            </nav>
        </div>
    </header>

    <main class="pg-main">
        <div class="pg-intro">
            <h1>Avatar Playground</h1>
            <p>Drop in a <code>.glb</code> avatar to preview it in 3D. Save it locally and grab an embed snippet for any site.</p>
        </div>

        <div class="av-viewer">
            <model-viewer
                id="viewer"
                src="/avatars/default.glb"
                alt="A 3D avatar"
                ar
                ar-modes="webxr scene-viewer quick-look"
                camera-controls
                shadow-intensity="1"
                environment-image="neutral"
                auto-rotate
                autoplay
            ></model-viewer>
        </div>

        <div class="pg-controls">
            <input type="file" id="avatar-upload" accept=".glb">
            <label for="avatar-upload" class="pg-upload-label">Upload a .glb avatar</label>

            <div class="pg-row">
                <input type="text" id="avatar-name" placeholder="Name your avatar">
                <button id="save-avatar" class="pg-btn primary" type="button">Save</button>
                <button id="embed-avatar" class="pg-btn" type="button">Embed</button>
                <button id="reset-avatar" class="pg-btn" type="button">Reset</button>
            </div>

            <div id="pg-status" class="pg-status"></div>
        </div>
    </main>

    <div id="embed-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="embed-modal-title">
        <div class="modal-content">
            <button class="close-button" type="button" aria-label="Close">&times;</button>
            <h2 id="embed-modal-title">Embed your avatar</h2>
            <p>Copy this snippet into any HTML page to embed your avatar.</p>
            <textarea id="embed-code" readonly></textarea>
            <button id="copy-embed-code" class="pg-btn primary" type="button">Copy snippet</button>
        </div>
    </div>

    <div id="loading-indicator" class="loading-indicator">
        <div class="spinner"></div>
    </div>

    <div id="footer-container"></div>
    <script src="/footer.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const viewer = document.getElementById('viewer');
            const upload = document.getElementById('avatar-upload');
            const saveButton = document.getElementById('save-avatar');
            const embedButton = document.getElementById('embed-avatar');
            const resetButton = document.getElementById('reset-avatar');
            const avatarName = document.getElementById('avatar-name');
            const modal = document.getElementById('embed-modal');
            const closeButton = modal.querySelector('.close-button');
            const copyEmbedCodeButton = document.getElementById('copy-embed-code');
            const loadingIndicator = document.getElementById('loading-indicator');
            const statusEl = document.getElementById('pg-status');

            const defaultAvatar = { name: 'Default Avatar', file: '/avatars/default.glb' };

            let statusTimer = null;
            const setStatus = (msg, kind = '') => {
                statusEl.textContent = msg || '';
                statusEl.className = 'pg-status' + (kind ? ' ' + kind : '');
                if (statusTimer) clearTimeout(statusTimer);
                if (msg) statusTimer = setTimeout(() => setStatus(''), 3000);
            };

            const showLoading = () => loadingIndicator.classList.add('open');
            const hideLoading = () => loadingIndicator.classList.remove('open');

            const loadAvatar = (avatar) => {
                showLoading();
                avatarName.value = avatar.name || '';
                viewer.src = avatar.file;
                viewer.addEventListener('load', hideLoading, { once: true });
                viewer.addEventListener('error', () => {
                    hideLoading();
                    setStatus('Could not load avatar.', 'err');
                }, { once: true });
            };

            let pendingFile = null;

            upload.addEventListener('change', (event) => {
                const file = event.target.files[0];
                if (!file) return;
                if (!file.name.toLowerCase().endsWith('.glb')) {
                    setStatus('Only .glb files are supported.', 'err');
                    return;
                }
                pendingFile = file;
                const url = URL.createObjectURL(file);
                loadAvatar({ name: file.name.replace(/\.glb$/i, ''), file: url });
            });

            saveButton.addEventListener('click', () => {
                const name = avatarName.value.trim();
                if (!name) {
                    setStatus('Enter a name first.', 'err');
                    return;
                }
                if (!pendingFile) {
                    setStatus('Upload a .glb to save.', 'err');
                    return;
                }
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        localStorage.setItem('avatar', JSON.stringify({
                            name,
                            file: event.target.result,
                        }));
                        setStatus('Avatar saved to this browser.', 'ok');
                    } catch (err) {
                        setStatus('Avatar too large for local storage.', 'err');
                    }
                };
                reader.onerror = () => setStatus('Could not read file.', 'err');
                reader.readAsDataURL(pendingFile);
            });

            embedButton.addEventListener('click', () => {
                const saved = JSON.parse(localStorage.getItem('avatar') || 'null');
                if (!saved) {
                    setStatus('Save an avatar first.', 'err');
                    return;
                }
                const embedCode = `<iframe src="${window.location.origin}/a-embed.html?avatar=${encodeURIComponent(saved.file)}" width="500" height="500" frameborder="0" allow="xr-spatial-tracking"></iframe>`;
                document.getElementById('embed-code').value = embedCode;
                modal.classList.add('open');
            });

            const closeModal = () => modal.classList.remove('open');
            closeButton.addEventListener('click', closeModal);
            modal.addEventListener('click', (event) => {
                if (event.target === modal) closeModal();
            });
            document.addEventListener('keydown', (event) => {
                if (event.key === 'Escape' && modal.classList.contains('open')) closeModal();
            });

            copyEmbedCodeButton.addEventListener('click', async () => {
                const textarea = document.getElementById('embed-code');
                try {
                    await navigator.clipboard.writeText(textarea.value);
                    setStatus('Embed snippet copied.', 'ok');
                } catch {
                    textarea.select();
                    document.execCommand('copy');
                    setStatus('Embed snippet copied.', 'ok');
                }
            });

            resetButton.addEventListener('click', () => {
                localStorage.removeItem('avatar');
                pendingFile = null;
                upload.value = '';
                loadAvatar(defaultAvatar);
                setStatus('Reset to default avatar.', 'ok');
            });

            const saved = JSON.parse(localStorage.getItem('avatar') || 'null');
            loadAvatar(saved || defaultAvatar);
        });
    </script>
</body>
</html>
