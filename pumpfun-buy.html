<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Pump.fun Buy</title>
		<meta name="description" content="Pump.fun buy token widget." />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="description" content="Pump.fun live feed widget." />
		<meta name="robots" content="noindex" />
		<style>
			* { margin: 0; padding: 0; box-sizing: border-box; }
			body {
				background: #0a0a0a;
				color: #00ff41;
				font-family: 'Courier New', monospace;
				font-size: 13px;
				line-height: 1.5;
				padding: 12px;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				height: 100vh;
			}
			.container {
				border: 1px solid #222;
				padding: 20px;
				text-align: center;
			}
			#token-info {
				margin-bottom: 20px;
			}
			#buy-button {
				background: #00ff41;
				color: #0a0a0a;
				border: none;
				padding: 10px 20px;
				cursor: pointer;
				font-weight: bold;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div id="token-info">Loading...</div>
			<button id="buy-button">Buy on Pump.fun</button>
		</div>
		<script type="module">
			const params = new URL(location.href).searchParams;
			const mint = params.get('mint');

			if (!mint) {
				document.getElementById('token-info').innerText = 'No mint address provided.';
				document.getElementById('buy-button').style.display = 'none';
			} else {
				// In a real application, you would fetch token info using the mint address.
				// For this example, we'll just display the mint address.
				document.getElementById('token-info').innerText = `Token: ${mint.slice(0, 12)}...`;
				document.getElementById('buy-button').onclick = () => {
					window.open(`https://pump.fun/coin/${mint}`, '_blank');
				};
			}
		</script>
	</body>
</html>
