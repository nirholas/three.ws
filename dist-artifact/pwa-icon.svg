<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Vertex glow -->
    <radialGradient id="vglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#b8e8ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#b8e8ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Edge glow filter -->
    <filter id="edgeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Strong vertex glow filter -->
    <filter id="vtxGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Cube face gradient — top -->
    <linearGradient id="faceTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a3a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0a1520" stop-opacity="0.85"/>
    </linearGradient>
    <!-- Cube face gradient — right -->
    <linearGradient id="faceRight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1e2e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#060e18" stop-opacity="0.9"/>
    </linearGradient>
    <!-- Cube face gradient — left -->
    <linearGradient id="faceLeft" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1a28" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#080f1a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#080814"/>

  <!-- Isometric cube — 3/4 view like 3d.png -->
  <!-- Vertices: top=256,110  front-left=116,256  front-right=396,256
       bottom=256,402  back-left=116,182  back-right=396,182 -->

  <!-- Left face -->
  <polygon points="256,110 116,182 116,330 256,402" fill="url(#faceLeft)" stroke="none"/>
  <!-- Right face -->
  <polygon points="256,110 396,182 396,330 256,402" fill="url(#faceRight)" stroke="none"/>
  <!-- Top face -->
  <polygon points="256,110 116,182 256,254 396,182" fill="url(#faceTop)" stroke="none"/>

  <!-- Subtle inner grid lines on faces -->
  <!-- Left face grid -->
  <line x1="186" y1="146" x2="186" y2="366" stroke="#1a3a5a" stroke-width="0.5" opacity="0.3"/>
  <line x1="116" y1="256" x2="256" y2="256" stroke="#1a3a5a" stroke-width="0.5" opacity="0.3"/>
  <!-- Right face grid -->
  <line x1="326" y1="146" x2="326" y2="366" stroke="#1a3a5a" stroke-width="0.5" opacity="0.3"/>
  <line x1="256" y1="256" x2="396" y2="256" stroke="#1a3a5a" stroke-width="0.5" opacity="0.3"/>
  <!-- Top face grid -->
  <line x1="186" y1="146" x2="326" y2="146" stroke="#1a3a5a" stroke-width="0.5" opacity="0.25"/>
  <line x1="256" y1="110" x2="256" y2="254" stroke="#1a3a5a" stroke-width="0.5" opacity="0.25"/>

  <!-- Edges — glowing cyan/white like crystal cube -->
  <!-- Top edges -->
  <line x1="256" y1="110" x2="116" y2="182" stroke="#7ec8e3" stroke-width="2" opacity="0.7" filter="url(#edgeGlow)"/>
  <line x1="256" y1="110" x2="396" y2="182" stroke="#7ec8e3" stroke-width="2" opacity="0.7" filter="url(#edgeGlow)"/>
  <!-- Top front edge -->
  <line x1="116" y1="182" x2="256" y2="254" stroke="#5aadcf" stroke-width="1.5" opacity="0.5" filter="url(#edgeGlow)"/>
  <line x1="396" y1="182" x2="256" y2="254" stroke="#5aadcf" stroke-width="1.5" opacity="0.5" filter="url(#edgeGlow)"/>
  <!-- Vertical edges -->
  <line x1="116" y1="182" x2="116" y2="330" stroke="#5aadcf" stroke-width="1.8" opacity="0.5" filter="url(#edgeGlow)"/>
  <line x1="396" y1="182" x2="396" y2="330" stroke="#5aadcf" stroke-width="1.8" opacity="0.5" filter="url(#edgeGlow)"/>
  <line x1="256" y1="254" x2="256" y2="402" stroke="#4a9abf" stroke-width="1.5" opacity="0.4" filter="url(#edgeGlow)"/>
  <!-- Bottom edges -->
  <line x1="116" y1="330" x2="256" y2="402" stroke="#5aadcf" stroke-width="1.8" opacity="0.55" filter="url(#edgeGlow)"/>
  <line x1="396" y1="330" x2="256" y2="402" stroke="#5aadcf" stroke-width="1.8" opacity="0.55" filter="url(#edgeGlow)"/>

  <!-- Bright vertex glows — matching 3d.png's bright corner highlights -->
  <!-- Top vertex — brightest -->
  <circle cx="256" cy="110" r="14" fill="url(#vglow)" filter="url(#vtxGlow)"/>
  <!-- Left vertex -->
  <circle cx="116" cy="182" r="10" fill="url(#vglow)" opacity="0.6" filter="url(#vtxGlow)"/>
  <!-- Right vertex -->
  <circle cx="396" cy="182" r="10" fill="url(#vglow)" opacity="0.6" filter="url(#vtxGlow)"/>
  <!-- Front-bottom vertex -->
  <circle cx="256" cy="402" r="8" fill="url(#vglow)" opacity="0.35" filter="url(#vtxGlow)"/>
  <!-- Mid vertices — subtler -->
  <circle cx="256" cy="254" r="7" fill="url(#vglow)" opacity="0.3" filter="url(#vtxGlow)"/>
  <circle cx="116" cy="330" r="7" fill="url(#vglow)" opacity="0.3" filter="url(#vtxGlow)"/>
  <circle cx="396" cy="330" r="7" fill="url(#vglow)" opacity="0.4" filter="url(#vtxGlow)"/>
</svg>
