<!DOCTYPE html>
<html>
  <head>
    <base href="/rider/">
    <title>three.ws</title>
    <meta name="og:title" content="three.ws">
    <meta name="twitter:title" content="three.ws">

    <meta name="description" content="A free and open source VR music visualization experience. Surf the musical road among the stars, moon, and lights.">
    <meta name="og:description" content="A free and open source VR music visualization experience. Surf the musical road among the stars, moon, and lights.">
    <meta name="twitter:description" content="A free and open source VR music visualization experience. Surf the musical road among the stars, moon, and lights.">
    <meta name="twitter:card" content="summary">

    <meta property="og:image" content="https://three.ws/assets/img/splash.jpg">
    <meta property="twitter:image" content="https://three.ws/assets/img/splash.jpg">

    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="assets/img/favicon.svg" type="image/svg+xml">
    <script src="vendor/aframe-master.min.js"></script>
    <script src="build/build.js?v=3"></script>
  </head>
  <body>
    <div id="riderGate" style="position:fixed;inset:0;background:#060818;color:#e2e8f0;display:flex;align-items:center;justify-content:center;z-index:9999;font-family:system-ui,-apple-system,sans-serif">
      <div style="max-width:420px;width:90%;text-align:center;padding:2rem">
        <div style="margin-bottom:.5rem"><img src="/three.svg" alt="three" style="height:3rem;width:3rem"></div>
        <h1 style="font-size:1.5rem;font-weight:700;margin:0 0 .5rem;color:#fff">three.ws rider</h1>
        <p style="color:#94a3b8;font-size:.875rem;margin:0 0 1.5rem">Send <strong style="color:#a78bfa">8,000 $THREE</strong> to access the VR experience.</p>

        <div id="riderVaultAddr" style="display:none;background:#0f172a;border:1px solid #1e293b;border-radius:.5rem;padding:.75rem 1rem;margin-bottom:1.5rem;cursor:pointer">
          <div style="font-size:.7rem;color:#64748b;margin-bottom:.25rem;text-transform:uppercase;letter-spacing:.05em">Send $THREE here</div>
          <span id="riderVaultText" style="color:#7dd3fc;font-size:.8rem;word-break:break-all"></span>
          <span id="riderCopyHint" style="color:#64748b;font-size:.7rem;display:block;margin-top:.25rem">click to copy</span>
        </div>

        <input id="riderAddrInput" type="text" placeholder="Your Solana wallet address"
          style="width:100%;box-sizing:border-box;background:#0f172a;border:1px solid #1e293b;border-radius:.5rem;padding:.75rem 1rem;color:#e2e8f0;font-size:.875rem;outline:none;margin-bottom:.75rem" />
        <button id="riderCheckBtn"
          style="width:100%;background:#7c3aed;color:#fff;border:none;border-radius:.5rem;padding:.75rem 1rem;font-size:.875rem;font-weight:600;cursor:pointer">
          Check Access
        </button>
        <div id="riderStatus" style="margin-top:.75rem;font-size:.875rem;min-height:1.25rem;color:#94a3b8"></div>

        <p style="margin-top:1.5rem;font-size:.75rem;color:#475569">
          CA: <code style="color:#7dd3fc">FeMbDoX7R1Psc4GEcvJdsbNbZA3bfztcyDCatJVJpump</code> · No wallet connection needed
        </p>
      </div>
    </div>

    <script>
      (function () {
        var CACHE_KEY = 'rider_pass_v1';
        var gate = document.getElementById('riderGate');

        if (localStorage.getItem(CACHE_KEY)) { gate.remove(); return; }

        fetch('/api/rider/info').then(function (r) { return r.json(); }).then(function (d) {
          if (d.vault_address) {
            var wrap = document.getElementById('riderVaultAddr');
            document.getElementById('riderVaultText').textContent = d.vault_address;
            wrap.style.display = 'block';
            wrap.addEventListener('click', function () {
              navigator.clipboard.writeText(d.vault_address).then(function () {
                var hint = document.getElementById('riderCopyHint');
                hint.textContent = 'copied!';
                setTimeout(function () { hint.textContent = 'click to copy'; }, 2000);
              });
            });
          }
        }).catch(function () {});

        document.getElementById('riderCheckBtn').addEventListener('click', function () {
          var address = document.getElementById('riderAddrInput').value.trim();
          var status = document.getElementById('riderStatus');
          var btn = document.getElementById('riderCheckBtn');
          if (!address) { status.textContent = 'Enter your wallet address.'; return; }
          btn.disabled = true;
          btn.textContent = 'Checking…';
          status.textContent = '';
          fetch('/api/rider/check?address=' + encodeURIComponent(address))
            .then(function (r) { return r.json(); })
            .then(function (d) {
              if (d.has_pass) {
                localStorage.setItem(CACHE_KEY, '1');
                gate.remove();
              } else {
                status.style.color = '#f87171';
                status.textContent = 'No pass found. Send 8,000 $THREE to the address above, then check again.';
                btn.disabled = false;
                btn.textContent = 'Check Access';
              }
            })
            .catch(function () {
              status.style.color = '#f87171';
              status.textContent = 'Error checking. Please try again.';
              btn.disabled = false;
              btn.textContent = 'Check Access';
            });
        });
      })();
    </script>

    <div id="app"></div>
    <div id="vrButton" title="Enter VR / Fullscreen"><p>Click Here to Enter VR</p></div>

    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-111391431-16"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'UA-111391431-16');
    </script>
  </body>
</html>
