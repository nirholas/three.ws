<!DOCTYPE html>
<html>
  <head>
    <base href="/rider/">
    <meta charset="utf-8">
    <title>three.ws · triple screen</title>
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; color: #e2e8f0; }
      .stage { display: grid; grid-template-columns: 1fr 1.4fr 1fr; width: 100vw; height: 100vh; gap: 4px; background: #000; }
      .pane { position: relative; background: #0b1020; border: 1px solid #1e293b; overflow: hidden; }
      .pane > iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
      .label { position: absolute; top: 8px; left: 12px; font-size: .7rem; letter-spacing: .08em; text-transform: uppercase; color: #94a3b8; background: rgba(0,0,0,.45); padding: 2px 8px; border-radius: 4px; z-index: 2; pointer-events: none; }
      @media (max-width: 900px) { .stage { grid-template-columns: 1fr; grid-template-rows: 1fr 1.4fr 1fr; } }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="pane">
        <span class="label">Subway Surfers</span>
        <iframe
          src="https://www.youtube.com/embed/Tt7bzxurJ1I?autoplay=1&mute=1&loop=1&playlist=Tt7bzxurJ1I&controls=0&modestbranding=1&playsinline=1&rel=0"
          allow="autoplay; encrypted-media; picture-in-picture"
          allowfullscreen></iframe>
      </div>
      <div class="pane">
        <span class="label">rider</span>
        <iframe src="/rider/" allow="xr-spatial-tracking; gamepad; autoplay; microphone; clipboard-read; clipboard-write" allowfullscreen></iframe>
      </div>
      <div class="pane">
        <span class="label">pumpfun</span>
        <iframe src="/pumpfun" allow="clipboard-read; clipboard-write"></iframe>
      </div>
    </div>
  </body>
</html>
