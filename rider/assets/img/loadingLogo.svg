<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 171" width="2000" height="171">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#faf499;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#f672c2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6ff9ea;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <text
    x="1000"
    y="125"
    font-family="'Tw Cen MT', 'Century Gothic', Futura, 'Trebuchet MS', sans-serif"
    font-size="110"
    font-weight="bold"
    letter-spacing="12"
    text-anchor="middle"
    fill="url(#textGrad)"
    filter="url(#glow)">three.ws</text>
</svg>
