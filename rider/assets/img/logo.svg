<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 200" width="1600" height="200">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#faf499;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#f672c2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6ff9ea;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <text
    x="800"
    y="150"
    font-family="'Tw Cen MT', 'Century Gothic', Futura, 'Trebuchet MS', sans-serif"
    font-size="140"
    font-weight="bold"
    letter-spacing="8"
    text-anchor="middle"
    fill="url(#textGrad)"
    filter="url(#glow)">three.ws</text>
</svg>
