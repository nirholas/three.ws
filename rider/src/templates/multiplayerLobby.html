<!--
  Multiplayer lobby panel. Visible while menuActive and multiplayer.lobbyOpen.
  Sits in front of the main menu so users can still pick songs (host) while
  seeing the room status.
-->
<a-entity
  id="multiplayerLobby"
  bind__visible="mpLobbyVisible"
  position="0 1.55 -1.4"
  rotation="0 0 0"
  render-order="menu">

  <!-- Background panel -->
  <a-entity
    id="mpLobbyBg"
    bind-toggle__raycastable="mpLobbyVisible"
    geometry="primitive: plane; width: 1.6; height: 1.05"
    material="shader: panelShader; brightness: 0.18; ratio: 1.52; borderWidth: 0.005; borderRadius: 0.04"
    render-order="menu"
    position="0 0 -0.02"></a-entity>

  <!-- Title -->
  <a-entity
    mixin="font"
    text="align: center; value: MULTIPLAYER; width: 1.4; lineHeight: 50; color: #FFF"
    render-order="menutext"
    position="0 0.45 0"></a-entity>

  <!-- Room code display -->
  <a-entity
    mixin="font"
    bind__text="value: mpRoomCodeText; color: colorSecondaryBright"
    text="align: center; width: 1.4; lineHeight: 80"
    render-order="menutext"
    position="0 0.30 0"></a-entity>

  <!-- Status / instructions line -->
  <a-entity
    mixin="font"
    bind__text="value: mpStatusText; color: colorPrimary"
    text="align: center; width: 1.4; wrapCount: 36"
    render-order="menutext"
    position="0 0.18 0"></a-entity>

  <!-- Player list -->
  <a-entity position="0 -0.05 0">
    <a-entity
      mixin="font"
      text="align: left; value: PLAYERS; width: 1.0; lineHeight: 60; color: #888"
      render-order="menutext"
      position="-0.55 0.10 0"></a-entity>
    <a-entity
      mixin="font"
      bind__text="value: multiplayer.opponentText || 'You'"
      text="align: left; width: 1.0; lineHeight: 50; color: #FFF"
      render-order="menutext"
      position="-0.55 0.00 0"></a-entity>
    <a-entity
      mixin="font"
      bind__text="value: multiplayer.opponentScores"
      text="align: right; width: 1.0; lineHeight: 50; color: #FFF"
      render-order="menutext"
      position="0.55 0.00 0"></a-entity>
  </a-entity>

  <!-- Action buttons row (idle: create / join input; in-room: leave) -->
  <a-entity position="0 -0.36 0">

    <!-- CREATE button: visible when no room joined -->
    <a-entity
      class="mpBtn"
      bind__visible="!multiplayer.roomCode"
      bind-toggle__raycastable="mpLobbyVisible && !multiplayer.roomCode"
      position="-0.40 0 0"
      mixin="modeBackgroundHover"
      geometry="primitive: plane; width: 0.65; height: 0.18"
      material="shader: panelShader; brightness: 0.25; ratio: 3.6; borderWidth: 0.004"
      proxy-event="event: click; as: mpcreate; to: a-scene"
      play-sound__click="event: click; sound: #confirmSound; volume: 0.1">
      <a-entity
        mixin="font"
        text="align: center; value: CREATE ROOM; width: 0.6; lineHeight: 60; color: #FFF"
        render-order="menutext"
        position="0 0 0.001"></a-entity>
    </a-entity>

    <!-- JOIN button: visible when no room joined; uses last typed code -->
    <a-entity
      class="mpBtn"
      bind__visible="!multiplayer.roomCode"
      bind-toggle__raycastable="mpLobbyVisible && !multiplayer.roomCode"
      position="0.40 0 0"
      mixin="modeBackgroundHover"
      geometry="primitive: plane; width: 0.65; height: 0.18"
      material="shader: panelShader; brightness: 0.25; ratio: 3.6; borderWidth: 0.004"
      multiplayer-join-button
      play-sound__click="event: click; sound: #confirmSound; volume: 0.1">
      <a-entity
        mixin="font"
        bind__text="value: multiplayer.joinCodeInput ? ('JOIN ' + multiplayer.joinCodeInput) : 'JOIN ROOM'"
        text="align: center; width: 0.6; lineHeight: 60; color: #FFF"
        render-order="menutext"
        position="0 0 0.001"></a-entity>
    </a-entity>

    <!-- READY toggle when in lobby -->
    <a-entity
      class="mpBtn"
      bind__visible="!!multiplayer.roomCode && multiplayer.status === 'lobby'"
      bind-toggle__raycastable="!!multiplayer.roomCode && multiplayer.status === 'lobby'"
      position="-0.40 0 0"
      mixin="modeBackgroundHover"
      geometry="primitive: plane; width: 0.65; height: 0.18"
      material="shader: panelShader; brightness: 0.25; ratio: 3.6; borderWidth: 0.004"
      multiplayer-ready-button
      play-sound__click="event: click; sound: #confirmSound; volume: 0.1">
      <a-entity
        mixin="font"
        text="align: center; value: READY; width: 0.6; lineHeight: 60; color: #FFF"
        render-order="menutext"
        position="0 0 0.001"></a-entity>
    </a-entity>

    <!-- LEAVE: visible when in a room -->
    <a-entity
      class="mpBtn"
      bind__visible="!!multiplayer.roomCode"
      bind-toggle__raycastable="!!multiplayer.roomCode"
      position="0.40 0 0"
      mixin="modeBackgroundHover"
      geometry="primitive: plane; width: 0.65; height: 0.18"
      material="shader: panelShader; brightness: 0.18; ratio: 3.6; borderWidth: 0.004"
      proxy-event="event: click; as: mpleave; to: a-scene"
      play-sound__click="event: click; sound: #confirmSound; volume: 0.1">
      <a-entity
        mixin="font"
        text="align: center; value: LEAVE; width: 0.6; lineHeight: 60; color: #888"
        render-order="menutext"
        position="0 0 0.001"></a-entity>
    </a-entity>

  </a-entity>

  <!-- Close MP mode entirely -->
  <a-entity
    class="mpBtn"
    bind__visible="mpLobbyVisible"
    bind-toggle__raycastable="mpLobbyVisible && !multiplayer.roomCode"
    position="0 -0.50 0"
    proxy-event="event: click; as: mpclose; to: a-scene">
    <a-entity
      mixin="font"
      text="align: center; value: < back to modes; width: 1.2; lineHeight: 60; color: #555"
      render-order="menutext"></a-entity>
  </a-entity>
</a-entity>


<!-- In-game opponent HUD: small panel on the side showing live opponent scores. -->
<a-entity
  id="mpHud"
  bind__visible="mpHudVisible"
  position="-1.35 1.55 -1.0"
  rotation="0 30 0"
  render-order="menu">
  <a-entity
    geometry="primitive: plane; width: 0.7; height: 0.45"
    material="shader: panelShader; brightness: 0.1; ratio: 1.55; borderWidth: 0.002"
    position="0 0 -0.01"></a-entity>
  <a-entity
    mixin="font"
    text="align: left; value: OPPONENTS; width: 0.6; lineHeight: 70; color: #888"
    position="-0.27 0.18 0"></a-entity>
  <a-entity
    mixin="font"
    bind__text="value: multiplayer.opponentText; color: colorPrimary"
    text="align: left; width: 0.6; lineHeight: 60"
    position="-0.27 0.05 0"></a-entity>
  <a-entity
    mixin="font"
    bind__text="value: multiplayer.opponentScores"
    text="align: right; width: 0.6; lineHeight: 60; color: #FFF"
    position="0.27 0.05 0"></a-entity>
</a-entity>


<!-- Multiplayer results overlay on victory screen. -->
<a-entity
  id="mpResults"
  bind__visible="mpResultsVisible"
  position="0 1.05 -1.6"
  render-order="menu">
  <a-entity
    geometry="primitive: plane; width: 1.4; height: 0.5"
    material="shader: panelShader; brightness: 0.18; ratio: 2.8; borderWidth: 0.004"
    position="0 0 -0.02"></a-entity>
  <a-entity
    mixin="font"
    text="align: center; value: ROOM RESULTS; width: 1.2; lineHeight: 60; color: #FFF"
    position="0 0.18 0"></a-entity>
  <a-entity
    mixin="font"
    bind__text="value: multiplayer.opponentText"
    text="align: left; width: 1.2; lineHeight: 50; color: #FFF"
    position="-0.55 0.02 0"></a-entity>
  <a-entity
    mixin="font"
    bind__text="value: multiplayer.opponentScores"
    text="align: right; width: 1.2; lineHeight: 50; color: #FFF"
    position="0.55 0.02 0"></a-entity>
  <a-entity
    bind__visible="multiplayer.isHost"
    bind-toggle__raycastable="multiplayer.isHost && mpResultsVisible"
    position="0 -0.18 0"
    geometry="primitive: plane; width: 0.7; height: 0.12"
    material="shader: panelShader; brightness: 0.25; ratio: 5.8; borderWidth: 0.003"
    proxy-event="event: click; as: mprematch; to: a-scene">
    <a-entity
      mixin="font"
      text="align: center; value: REMATCH; width: 0.6; lineHeight: 70; color: #FFF"
      position="0 0 0.001"></a-entity>
  </a-entity>
</a-entity>
