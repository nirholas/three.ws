<!--
  Multiplayer lobby panel + in-game HUD + victory results overlay.
-->

{% macro mpRow (i) %}
<a-entity position="0 {{ -i * 0.13 }} 0" bind__visible="multiplayer.row{{i}}Visible">
  <a-entity
    geometry="primitive: plane; width: 1.45; height: 0.115"
    bind__material="opacity: multiplayer.row{{i}}IsMe ? 0.18 : 0.06"
    material="shader: flat; color: #ffffff; transparent: true"
    position="0 0 -0.005"></a-entity>
  <a-entity
    mixin="font"
    bind__text="value: multiplayer.row{{i}}Name; color: multiplayer.row{{i}}IsMe ? colorSecondaryBright : '#ffffff'"
    text="align: left; width: 1.4; lineHeight: 55"
    render-order="menutext"
    position="-0.62 0 0"></a-entity>
  <a-entity
    mixin="font"
    bind__text="value: multiplayer.row{{i}}Score; color: multiplayer.row{{i}}Ready ? '#5dff80' : '#ffffff'"
    text="align: right; width: 1.4; lineHeight: 55"
    render-order="menutext"
    position="0.62 0 0"></a-entity>
</a-entity>
{% endmacro %}

<a-entity
  id="multiplayerLobby"
  bind__visible="mpLobbyVisible"
  position="0 1.55 -1.4"
  render-order="menu">

  <!-- Background -->
  <a-entity
    bind-toggle__raycastable="mpLobbyVisible"
    geometry="primitive: plane; width: 1.7; height: 1.35"
    material="shader: panelShader; brightness: 0.18; ratio: 1.26; borderWidth: 0.005; borderRadius: 0.04"
    render-order="menu"
    position="0 0 -0.02"></a-entity>

  <!-- Title -->
  <a-entity
    mixin="font"
    text="align: center; value: MULTIPLAYER; width: 1.5; lineHeight: 50; color: #FFF"
    render-order="menutext"
    position="0 0.60 0"></a-entity>

  <!-- Room code -->
  <a-entity
    mixin="font"
    bind__text="value: mpRoomCodeText; color: colorSecondaryBright"
    text="align: center; width: 1.5; lineHeight: 80"
    render-order="menutext"
    position="0 0.46 0"></a-entity>

  <!-- Status / instructions -->
  <a-entity
    mixin="font"
    bind__text="value: mpStatusText; color: colorPrimary"
    text="align: center; width: 1.5; wrapCount: 38; lineHeight: 50"
    render-order="menutext"
    position="0 0.34 0"></a-entity>

  <!-- Player rows -->
  <a-entity position="0 0.13 0">
    {{ mpRow(0) }}
    {{ mpRow(1) }}
    {{ mpRow(2) }}
    {{ mpRow(3) }}
  </a-entity>

  <!-- Action button row 1: idle (no room) -->
  <a-entity position="0 -0.42 0">
    <a-entity
      bind__visible="!mpInRoom"
      bind-toggle__raycastable="mpLobbyVisible && !mpInRoom"
      position="-0.40 0 0"
      mixin="modeBackgroundHover"
      geometry="primitive: plane; width: 0.65; height: 0.16"
      material="shader: panelShader; brightness: 0.30; ratio: 4.0; borderWidth: 0.004"
      proxy-event="event: click; as: mpcreate; to: a-scene"
      play-sound__click="event: click; sound: #confirmSound; volume: 0.1">
      <a-entity
        mixin="font"
        text="align: center; value: CREATE ROOM; width: 0.6; lineHeight: 60; color: #FFF"
        position="0 0 0.001"></a-entity>
    </a-entity>

    <a-entity
      bind__visible="!mpInRoom"
      bind-toggle__raycastable="mpLobbyVisible && !mpInRoom"
      position="0.40 0 0"
      mixin="modeBackgroundHover"
      geometry="primitive: plane; width: 0.65; height: 0.16"
      material="shader: panelShader; brightness: 0.30; ratio: 4.0; borderWidth: 0.004"
      multiplayer-join-button
      play-sound__click="event: click; sound: #confirmSound; volume: 0.1">
      <a-entity
        mixin="font"
        bind__text="value: multiplayer.joinCodeInput ? ('JOIN ' + multiplayer.joinCodeInput) : 'JOIN ROOM'"
        text="align: center; width: 0.6; lineHeight: 60; color: #FFF"
        position="0 0 0.001"></a-entity>
    </a-entity>

    <!-- READY (in lobby phase) -->
    <a-entity
      bind__visible="mpInLobbyPhase"
      bind-toggle__raycastable="mpInLobbyPhase"
      position="-0.55 0 0"
      mixin="modeBackgroundHover"
      geometry="primitive: plane; width: 0.50; height: 0.16"
      bind__material="brightness: multiplayer.myReady ? 0.50 : 0.20"
      material="shader: panelShader; ratio: 3.1; borderWidth: 0.004"
      multiplayer-ready-button
      play-sound__click="event: click; sound: #confirmSound; volume: 0.1">
      <a-entity
        mixin="font"
        bind__text="value: multiplayer.myReady ? 'UNREADY' : 'READY'; color: multiplayer.myReady ? '#5dff80' : '#FFF'"
        text="align: center; width: 0.5; lineHeight: 60"
        position="0 0 0.001"></a-entity>
    </a-entity>

    <!-- Share link (in room) -->
    <a-entity
      bind__visible="mpInRoom"
      bind-toggle__raycastable="mpInRoom"
      position="0 0 0"
      mixin="modeBackgroundHover"
      geometry="primitive: plane; width: 0.55; height: 0.16"
      material="shader: panelShader; brightness: 0.20; ratio: 3.4; borderWidth: 0.004"
      proxy-event="event: click; as: mpsharelink; to: a-scene"
      play-sound__click="event: click; sound: #confirmSound; volume: 0.1">
      <a-entity
        mixin="font"
        bind__text="value: mpShareButtonText; color: multiplayer.shareCopied ? '#5dff80' : '#FFF'"
        text="align: center; width: 0.55; lineHeight: 65"
        position="0 0 0.001"></a-entity>
    </a-entity>

    <!-- Name editor (in room) -->
    <a-entity
      bind__visible="mpInRoom"
      bind-toggle__raycastable="mpInRoom"
      position="0.55 0 0"
      mixin="modeBackgroundHover"
      geometry="primitive: plane; width: 0.50; height: 0.16"
      material="shader: panelShader; brightness: 0.20; ratio: 3.1; borderWidth: 0.004"
      multiplayer-name-button
      play-sound__click="event: click; sound: #confirmSound; volume: 0.1">
      <a-entity
        mixin="font"
        text="align: center; value: SET NAME; width: 0.5; lineHeight: 60; color: #FFF"
        position="0 0 0.001"></a-entity>
    </a-entity>
  </a-entity>

  <!-- Action button row 2: leave + back -->
  <a-entity position="0 -0.59 0">
    <a-entity
      bind__visible="mpInRoom"
      bind-toggle__raycastable="mpInRoom"
      position="0 0 0"
      geometry="primitive: plane; width: 0.55; height: 0.13"
      material="shader: panelShader; brightness: 0.10; ratio: 4.2; borderWidth: 0.003"
      proxy-event="event: click; as: mpleave; to: a-scene">
      <a-entity
        mixin="font"
        text="align: center; value: LEAVE ROOM; width: 0.55; lineHeight: 70; color: #888"
        position="0 0 0.001"></a-entity>
    </a-entity>
    <a-entity
      bind__visible="!mpInRoom"
      bind-toggle__raycastable="mpLobbyVisible && !mpInRoom"
      position="0 0 0"
      proxy-event="event: click; as: mpclose; to: a-scene">
      <a-entity
        mixin="font"
        text="align: center; value: < back to modes; width: 1.2; lineHeight: 60; color: #555"
        render-order="menutext"></a-entity>
    </a-entity>
  </a-entity>
</a-entity>


<!-- ===================== IN-GAME COUNTDOWN OVERLAY ===================== -->
<a-entity
  id="mpCountdown"
  bind__visible="mpCountdownVisible"
  position="0 1.7 -2"
  render-order="menu">
  <a-entity
    geometry="primitive: plane; width: 1.4; height: 0.4"
    material="shader: panelShader; brightness: 0.30; ratio: 3.5; borderWidth: 0.005"
    position="0 0 -0.01"></a-entity>
  <a-entity
    mixin="font"
    bind__text="value: multiplayer.countdownText; color: colorSecondaryBright"
    text="align: center; width: 1.3; lineHeight: 30"
    render-order="menutext"></a-entity>
</a-entity>


<!-- ===================== IN-GAME OPPONENT HUD ===================== -->
<a-entity
  id="mpHud"
  bind__visible="mpHudVisible"
  position="-1.45 1.65 -1.0"
  rotation="0 35 0"
  render-order="menu">
  <a-entity
    geometry="primitive: plane; width: 0.85; height: 0.55"
    material="shader: panelShader; brightness: 0.10; ratio: 1.55; borderWidth: 0.002"
    position="0 0 -0.01"></a-entity>
  <a-entity
    mixin="font"
    bind__text="value: 'RANK ' + multiplayer.myRankText; color: colorSecondaryBright"
    text="align: left; width: 0.75; lineHeight: 60"
    position="-0.34 0.22 0"></a-entity>
  <a-entity
    mixin="font"
    bind__text="value: multiplayer.scoreDeltaText; color: multiplayer.scoreDelta >= 0 ? '#5dff80' : '#ff8080'"
    text="align: right; width: 0.75; lineHeight: 65"
    position="0.34 0.22 0"></a-entity>
  <a-entity
    mixin="font"
    text="align: left; value: OPPONENTS; width: 0.75; lineHeight: 80; color: #888"
    position="-0.34 0.10 0"></a-entity>
  <a-entity
    mixin="font"
    bind__text="value: multiplayer.opponentText; color: colorPrimary"
    text="align: left; width: 0.75; lineHeight: 60"
    position="-0.34 -0.02 0"></a-entity>
  <a-entity
    mixin="font"
    bind__text="value: multiplayer.opponentScores"
    text="align: right; width: 0.75; lineHeight: 60; color: #FFF"
    position="0.34 -0.02 0"></a-entity>
</a-entity>


<!-- ===================== VICTORY RESULTS ===================== -->
<a-entity
  id="mpResults"
  bind__visible="mpResultsVisible"
  position="0 1.05 -1.6"
  render-order="menu">
  <a-entity
    geometry="primitive: plane; width: 1.6; height: 0.7"
    material="shader: panelShader; brightness: 0.20; ratio: 2.3; borderWidth: 0.004"
    position="0 0 -0.02"></a-entity>
  <a-entity
    mixin="font"
    bind__text="value: mpWinnerBanner; color: colorSecondaryBright"
    text="align: center; width: 1.5; lineHeight: 30"
    position="0 0.27 0"></a-entity>
  <a-entity
    mixin="font"
    text="align: center; value: ROOM RESULTS; width: 1.4; lineHeight: 70; color: #888"
    position="0 0.13 0"></a-entity>
  <a-entity
    mixin="font"
    bind__text="value: multiplayer.resultsText"
    text="align: left; width: 1.4; lineHeight: 50; color: #FFF"
    position="-0.65 -0.02 0"></a-entity>
  <a-entity
    mixin="font"
    bind__text="value: multiplayer.resultsScores"
    text="align: right; width: 1.4; lineHeight: 50; color: #FFF"
    position="0.65 -0.02 0"></a-entity>
  <a-entity
    bind__visible="multiplayer.isHost"
    bind-toggle__raycastable="multiplayer.isHost && mpResultsVisible"
    position="0 -0.27 0"
    mixin="modeBackgroundHover"
    geometry="primitive: plane; width: 0.7; height: 0.13"
    material="shader: panelShader; brightness: 0.30; ratio: 5.4; borderWidth: 0.003"
    proxy-event="event: click; as: mprematch; to: a-scene">
    <a-entity
      mixin="font"
      text="align: center; value: REMATCH; width: 0.7; lineHeight: 65; color: #FFF"
      position="0 0 0.001"></a-entity>
  </a-entity>
</a-entity>


<!-- ===================== ROOM-CODE KEYBOARD (in-VR) ===================== -->
<a-entity
  id="mpKeyboard"
  bind__super-keyboard="hand: activeHand === 'left' && '#leftHand' || '#rightHand'; show: mpKeyboardOpen"
  super-keyboard="hand: #rightHand; imagePath: assets/img/keyboard; font: assets/fonts/Viga-Regular.json; align: center; model: superkeyboard; keyColor: #fff; injectToRaycasterObjects: false; filters: allupper; keyHoverColor: #fff; maxLength: 4; width: 1.3; label: ENTER ROOM CODE; labelColor: #FAFAFA; inputColor: #fff"
  position="0 1.3 -1.3"
  render-order="menutext"
  multiplayer-keyboard-bridge
  proxy-event__change="event: superkeyboardchange; to: a-scene; as: mpcodeinput"
  proxy-event__submit="event: superkeyboarddismiss; to: a-scene; as: mpkeyboardsubmit"
  bind-toggle__raycastable="mpKeyboardOpen"
  render-order-recursive>
</a-entity>


<!-- ===================== NAME KEYBOARD (in-VR) ===================== -->
<a-entity
  id="mpNameKeyboard"
  bind__super-keyboard="hand: activeHand === 'left' && '#leftHand' || '#rightHand'; show: mpNameKeyboardOpen"
  super-keyboard="hand: #rightHand; imagePath: assets/img/keyboard; font: assets/fonts/Viga-Regular.json; align: center; model: superkeyboard; keyColor: #fff; injectToRaycasterObjects: false; filters: allupper; keyHoverColor: #fff; maxLength: 14; width: 1.3; label: ENTER YOUR NAME; labelColor: #FAFAFA; inputColor: #fff"
  position="0 1.3 -1.3"
  render-order="menutext"
  proxy-event__change="event: superkeyboardchange; to: a-scene; as: mpnameinput"
  proxy-event__submit="event: superkeyboarddismiss; to: a-scene; as: mpnamekeyboardsubmit"
  bind-toggle__raycastable="mpNameKeyboardOpen"
  render-order-recursive>
</a-entity>
